front:
  text: 在家律要廣集序秉無極二五之真精而成人當思全其為人而後無愧於天人各得乎天之全上智而下不能不蔽乎人欲於是本性日漓而天真日失急思有以救之如鏡去滓而光依舊水無風而波自平非增其新惟不減其故耳復性歸真之法聖教曰克明曰日新而至善之區則以佛門本來面目之謂也失其本來便換了面目守此面目則還其本來不加不損不即不離得造上乘即同至誠方其自明而誠時必有修持之力嚴之以三戒範之以五常人事備而天心復一日克己天下歸仁易曰不遠復无祇悔其斯之謂歟士希賢賢希聖聖希天人為萬物靈皆可為堯舜惟品不立而去聖遠流入邪侈加以斵喪良非得已道在早為之所俾人人知嫉邪崇正反本還原同遊熙皡之天此樂何極佛教比邱為尊儒重居士居士者處士也士如處子惟重始威豈有不依名教而得濫稱居土者乎佛制離三毒即儒門三戒之去色鬬得也受五戒即五常之守仁義禮智信也戒色不貪戒鬬不瞋戒得不癡去惡而從善矣仁不殺害義不盜取禮不邪淫智不醉飲信不妄語無欲而見剛矣更進之以發菩提心持菩薩戒輕重威儀一一清淨人咸復其性而不流於逸欲斯為得之夫在家居士欲受五戒先三歸依謂反妄歸真違惡依善受三歸依者梵語稱優婆塞譯曰近事男謂親近三寶廣修眾善也繼之以五戒名曰學處以近事男所應學也亦名學迹以踐此而得大智慧也更稱徑路以一切律儀皆得轉入也復號學本以一切所學此為根本也守是戒者方成優婆塞之名吾杭有大苾芻源洪大師者發殷重慈護大悲心將陳子熙願所增律要廣集校訂而刊行之能令在家珍重得所遵循五眾出家齊遵梵網道共證乎三乘法同登乎五分本然之善胥於是乎在潛不敏承賜茲編謹獻芻蕘現居士身者當不以予言為囈語也道光四年仲冬長至日詔徵孝廉方正前陝西六品軍功受菩薩優婆塞戒仁和弟子芝塘沈起潛了生稽首在家律要者靈峯蕅益大師之所集也大師以慈愍故既集釋子切要之律貽惠後學復念在家二眾遵循有志而尋討維艱乃更集在家律要并各箋注俾奉持者依文解義依義攝心其法施之惠亦溥矣夫律文浩瀚律義深微即吾釋子敬奉毗尼留心講習尚難得一善本體究行持況於在家以初發心之人為素所未習之事乎是此書誠為不可少者惜年久板朽傳本絕少故今之近事不惟止作持犯之義少有精解即問伊何為歸戒何為開遮亦茫無以應真益陳君有慨於此欲因原集增益重梓以商於予予亟慫恿之越數月君以廣集命予校訂見其無義不收無法不備而倫次之間具有道理始於四分歸戒之從來訖於梵網重輕之歸宿其中受三歸五戒略示儀則厭離功德經引入勝義護身經十善業道經戒消灾經俱以護助獎勸明其利益五戒相經委明五戒故誤之相八關齋戒重申敬時加持之典以上諸戒根本律儀似週次入大乘菩薩妙戒若心地觀經無我義經先以菩提心戒為其戒體受戒品威儀經繼以種種戒相示其科條至於梵網之後并附懺儀則以末法眾生障深慧淺難持易犯有此一法使缺者復全失者復得庶幾不甘廢棄之人得其自新之路亦不可少也是集也一一佛祖金科玉律陳君固未甞措一詞即予亦何容贅一語唯其搜羅之際行布之次將陳君微意揭示於此今而後受在家戒者人奉一編以時究心即吾釋子亦宜案置以備問難洵可謂七眾同資三根普被矣因樂為梓行并增其題曰廣集時道光四年甲申仲冬彌陀誕日真寂苾蒭儀潤源洪謹序在家律要廣集目錄序卷第一九經同冊四分律藏節錄陳增附優婆塞受三歸五戒法彚釋三歸五戒慈心厭離功德經陳增灌頂三歸五戒帶佩護身呪經陳增嗟韈曩法天子受三歸依獲免惡道經陳增十善業道經佛說戒消灾經佛說優婆塞五戒相經箋要佛說齋經注卷第二四經同冊大乘本生心地觀經觀心品發菩提心成佛品陳增外道問聖大乘法無我義經陳增優婆塞戒經受戒品箋要菩薩優婆塞五戒威儀經附辯五則卷第三二經同冊佛說梵網經心地品菩薩戒疏注節要梵網經懺悔行法書在家律要廣集後目錄終
