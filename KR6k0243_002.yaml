body:
  text: 大乘本生心地觀經出龍藏興字函録第十十一十二共三品陳增唐罽賓國三藏般若等譯觀心品第十爾時文殊師利菩薩摩訶薩即從座起整衣服偏袒右肩右膝著地曲躬合掌白佛言世尊如佛所說告妙德等五百長者我為汝等敷演心地微妙法門而此道場無量無邊人天大衆皆生渴仰我今為是啓問如來云何為心云何為地惟願世尊無緣大慈無礙大悲為諸衆生分別演說未離苦者令得離苦未安樂者令得安樂未發心者令得發心未證果者令得證果同於一道而得涅槃爾時薄伽梵以無量劫中修諸福智所獲清淨決定勝法大妙智印印文殊師利言善哉善哉汝今真是三世佛母一切如來在修行地皆曾引導初發信心以是因緣十方國土成正覺者皆以文殊而為其母然今汝身以本願力現菩薩相請問如來不思議法諦聽諦聽善思念之吾當普為分別解說唯然世尊我等樂聞爾時薄伽梵妙善成就一切如來最勝住持平等性智種種希有微妙功德已能善獲一切諸佛決定勝法大乘智印已善圓證一切如來金剛祕密殊勝妙智已能安住無礙大悲自然救攝十方有情已善圓滿妙觀察智不觀而觀不說而說是薄伽梵告諸佛母無垢大聖文殊師利菩薩摩訶薩言大善男子此法名為十方如來最勝祕密心地法門此法名為一切凡夫入如來地頓悟法門此法名為一切菩薩趣大菩提真實正路此法名為三世諸佛自受法樂微妙寶宮此法名為一切饒益有情無盡寶藏此法能引諸菩薩衆到色究竟自在智處此法能引詣菩提樹後身菩薩真實導師此法能雨世出世財如摩尼寶滿衆生願此法能生十方三世一切諸佛功德本源此法能銷一切衆生諸惡業果此法能與一切衆生所求願印此法能度一切衆生生死險難此法能息一切衆生苦海波浪此法能救苦惱衆生而作急難此法能竭一切衆生老病死海此法善能出生諸佛因緣種子此法能與生死長夜為大智炬此法能破四魔兵衆而作甲胄此法即是正勇猛軍戰勝旌旗此法即是一切諸佛無上法輪此法即是最勝法幢此法即是擊大法鼓此法即是吹大法螺此法即是大師子王此法即是大師子吼此法猶如國大聖王善能正治若順王化獲大安樂若違王化尋被誅滅善男子三界之中以心為主能觀心者究竟解脫不能觀者永處纏縛譬如萬物皆從地生如是心法生世出世善惡五趣有學無學獨覺菩薩及於如來以是因緣三界唯心心名為地一切凡夫親近善友聞心地法如理觀察如說修行自作教他讚勵慶慰如是之人能斷二障速圓衆行疾得阿耨多羅三藐三菩提爾時大聖文殊師利菩薩白佛言世尊如佛所說唯將心法為三界主心法本元不染塵穢云何心法染貪瞋癡於三世法誰說為心過去心已滅未來心未至現在心不住諸法之內性不可得諸法之外相不可得諸法中間都不可得心法本來無有形相心法本來無有住處一切如來尚不見心何況餘人得見心法一切諸法從妄想生以何因緣今者世尊為大衆說三界唯心願佛哀愍如實解說爾時佛告文殊師利菩薩言如是如是善男子如汝所問心心所法本性空寂我說衆喻以明其義善男子心如幻法由遍計生種種心想受苦樂故心如水流念念生滅於前後世不暫住故心如大風一剎那間歷方所故心如燈焰衆緣和合而得生故心如電光須臾之頃不久住故心如虗空客塵煩惱所覆障故心如猿猴遊五欲樹不暫住故心如畫師能畫世間種種色故心如僮僕為諸煩惱所䇿役故心如獨行無第二故心如國王起種種事得自在故心如怨家能令自身受大苦故心如埃塵坌污自身生雜穢故心如影像於無常法執為常故心如幻夢於我法相執為我故心如夜叉能噉種種功德法故心如青蠅好穢惡故心如殺者能害身故心如敵對常伺過故心如盜賊竊功德故心如大鼓起鬬戰故心如飛蛾愛燈色故心如野鹿逐假聲故心如羣豬樂雜穢故心如衆蜂集蜜味故心如醉耽象牝觸故善男子如是所說心心所法無內無外亦無中間於諸法中求不可得去來現在亦不可得超越三世非有非無常懷染著從妄緣現緣無自性心性空故如是空性不生不滅無來無去不一不異非斷非常本無生處亦無滅處亦非遠離非不遠離如是心等不異無為無為之體不異心等心法之體本不可說非心法者亦不可說何以故若無為是心即名斷見若離心法即名常見永離二相不著二邊如是悟者名見真諦悟真諦者名為賢聖一切賢聖性本空寂無為法中戒無持犯亦無大小無有心王及心所法無苦無樂如是法界自性無垢無上中下差別之相何以故是無為法性平等故如衆河水流入海中盡同一味無別相故此無垢性非實非虗此無垢性是第一義無盡滅相體本不生此無垢性常住不變最勝涅槃我所淨故此無垢性遠離一切平等不平等體無異故若有善男子善女人欲求阿耨多羅三藐三菩提者應當一心修習如是心地觀法爾時世尊欲重宣此義而說偈言三世覺母妙吉祥請問如來心地法我今於此大會衆開演成佛觀行門此法難遇過優曇一切世間應渴仰十方諸佛證大覺無不從此法修成我是無上調御師轉正法輪周世界化度無量諸衆生當知由悟心地觀一切有情聞此法欣趣菩提得授記一切有緣得記人修此觀門當作佛諸佛自受大法樂住心地觀妙寶宮受職菩薩悟無生觀心地門遍法界後身菩薩坐覺樹入此觀行證菩提此法能雨七聖財滿衆生願摩尼寶此法名為佛本母出生三世三佛身此法名為金剛甲能敵四衆諸魔軍此法能作大舟船令渡中流至寶所此法最勝大法鼓此法高顯大法幢此法金剛大法螺此法照世大法炬此法猶如大聖主賞功罰過順人心此法猶如沃潤田生成長養依時候我以衆喻明空義是知三界唯一心心有大力世界生自在能為變化主惡想善心更造集過現未來生死因依止妄業有世間愛非愛果恆相續心如流水不暫住心如飄風過國土亦如猿猴依樹戲亦如幻事依幻成如空飛鳥無所礙如空聚落人奔走如是心法本非有凡夫執迷謂非無若能觀心體性空惑障不生便解脫爾時如來於諸衆生起大悲心猶如父母愛念一子為滅世間大力邪見利益安樂一切有情宣說觀心陀羅尼曰唵一室他二波羅二合底三吠憚四迦盧弭五爾時如來說真言已告文殊師利菩薩摩訶薩如是神呪具大威力若有善男子善女人持此呪時舉清淨手左右十指更互相叉以左壓右更相豎握如縛著形名金剛縛印成此印已習前真言盈滿一遍勝於讀習十二部經所獲功德無有限量乃至菩提不復退轉發菩提心品第十一爾時薄伽梵已能善獲一切如來灌頂寶冠超過三界已得圓滿陀羅尼自在已善圓證三摩地自在妙善成熟一切智智一切種智能作有情種種差別是薄伽梵為諸衆生宣說觀心妙門已告文殊師利菩薩摩訶薩言大善男子我為衆生已說心地亦復當說發菩提心大陀羅尼令諸有情發阿耨多羅三藐三菩提心速圓妙果爾時文殊師利菩薩白佛言世尊如佛所說過去已滅未來未至現在不住三世所有一切心法本性皆空彼菩提心說何名發善哉世尊願為解說斷諸疑網令趣菩提佛告文殊師利善男子諸心法中起衆邪見為欲斷除六十二見種種見故心心所法我說為空如是諸見無依止故譬如叢林蒙密茂盛師子白象虎狼惡獸潛住其中毒發害人迥絶行跡時有智者以火燒林因林空故諸大惡獸無復遺餘心空見滅亦復如是又善男子以何因緣立空義耶為滅煩惱從妄心生而說是空善男子若執空理為究竟有空性亦空執空作病亦應除遣何以故若執空義為究竟者諸法皆無因無果路伽耶陀有何差別善男子如阿伽陀藥能療諸病若有病者服之必差其病既愈藥隨病除無病服藥藥還成病善男子本設空藥為除有病執有成病執空亦然誰有智者服藥取病善男子若起有見勝起空見空治有病無藥治空善男子以是因緣服於空藥除邪見已自覺悟心能發菩提此覺悟心即菩提心無有二相善男子自覺悟心有四種義云何為四謂諸凡夫有二種心諸佛菩薩有二種心善男子凡夫二心其相云何一者眼識乃至意識因緣自境名自悟心二者離於五根心心所法和合緣境名自悟心善男子如是二心能發菩提善男子賢聖二心其相云何一者觀真實理智二者觀一切境智善男子如是四種名自悟心爾時文殊師利菩薩白佛言世尊心無形相亦無住處凡夫行者最初發心依何等處觀何等相佛言善男子凡夫所觀菩提心相猶如清淨圓滿月輪於𮌎臆上明朗而住若欲速得不退轉者在阿蘭若及空寂室端身正念結前如來金剛縛印冥目觀察臆中明月作是思惟是滿月輪五十由旬無垢明淨內外澄徹最極清涼月即是心心即是月塵翳無染妄想不生能令衆生身心清淨大菩提心堅固不退結此手印持念觀察大菩提心微妙章句一切菩薩最初發心清淨真言唵一菩地二室多三牟致波四陀耶五弭此陀羅尼具大威德能令行者不復退轉去來現在一切菩薩在於因地初發心時悉皆專念持此真言入不退地速圓正覺善男子時彼行者端身正念都不動搖繫心月輪成熟觀察是名菩薩觀菩提心成佛三昧若有凡夫修此觀者所起五逆四重十惡及一闡提如是等罪盡皆消滅即獲五種三摩地門云何謂五一者剎那三昧二者微塵三昧三者白縷三昧四者起伏三昧五者安住三昧云何名為剎那三昧謂暫想念滿月而住譬如獼猴身有所繫遠不得去近不得停唯困饑渴須臾住止凡夫觀心亦復如是暫得三昧名為剎那云何名為微塵三昧謂於三昧少分相應譬如有人常自食苦未曾食甜於一時中得一虗蜜到於舌根增勝歡喜倍生踴躍更求多蜜如是行者經於長劫食衆苦味而今得與甘甜三昧少分相應名為微塵云何名為白縷三昧謂凡夫人自無始時盡未來際今得此定譬如染皂多黑色中見一白縷如是行者於多生死黑暗夜中而今方得白淨三昧名之為縷云何名為起伏三昧所謂行者觀心未熟或善成立未善成立如是三昧猶稱低昂名為起伏云何名為安住三昧修前四定心得安住善能守護不染諸塵如人夏中遠涉沙磧備受炎毒其心渴乏殆無所堪忽得雪山甘美之水天酥陀等頓除熱惱身意泰然是故三昧名為安住入此定已遠離惑障發生無上菩提之芽速登菩薩功德十地爾時會中無量人天聞此甚深諸菩薩母不可思議大陀羅尼已九萬八千諸菩薩等證歡喜地無量衆生發阿耨多羅三藐三菩提心成佛品第十二爾時薄伽梵能善安住清淨法界三世平等無始無終不動凝然常無斷盡大智光明普照世界善巧方便變現神通化十方土靡不周遍是薄伽梵告文殊師利菩薩摩訶薩言瑜伽行者觀月輪已應觀三種大祕密法云何為三一者心祕密二者語祕密三者身祕密云何名為心祕密法瑜伽行者觀滿月中出生金色五鈷金剛光明煥然猶如鎔金放於無數大白光明以是觀察名心祕密云何名為語言祕密唵一地室多二合婆爾羅二合二此陀羅尼具大威力一切菩薩成佛真言是故名為語言祕密云何名為身祕密法於道場中端身正念手結引導無上菩提最第一印安置𮌎臆心月輪中善男子我當為汝說其印相先以左右二大拇指各入左右手掌之內各以左右頭指中指及第四指緊握拇指作於手拳即是堅牢金剛拳印次不改拳舒左頭指直豎虗空以其左拳著於心上右拳小指緊握左拳頭指一節次以右拳頭指之頭即指右拳拇指一節亦著心前是名引導無上菩提第一智印亦名能滅無明黑暗大光明印以結此印加持力故十方諸佛摩行者頂授大菩提勝決定記是大毗盧遮那如來無量福聚大妙智印爾時行者結此印已即作此觀一切有情共結此印持念真言十方世界無三惡道八難苦果同受第一清淨法樂我今首上有天寶冠其天冠中五佛如來結跏趺坐我是毗盧遮那如來圓滿具足三十二相八十種好放大光明照十方界利益安樂一切衆生如是觀察名入毗盧遮那如來最勝三昧譬如有人悟迦盧微妙觀門自作是觀我身即是金翅鳥王心意語言亦復如是以此觀力能消毒藥一切惡毒不能為害凡夫行者亦復如是作降伏坐身不動搖手結智印密念真言心入此觀能滅三毒消除業障增長福智世出世願速得圓滿八萬四千諸煩惱障不能現起恆河沙等所知重障漸漸消滅無漏大智能斷金剛般若波羅蜜現前圓滿速得阿耨多羅三藐三菩提爾時文殊師利菩薩白佛言希有世尊希有善逝如來出世過優曇華假使出世說是法難如是心地三種祕密無上法輪實能利樂一切衆生入如來地及菩薩地真實正路若有衆生不惜身命修行此法速證菩提爾時佛告文殊師利菩薩言若有善男子善女人欲得修習三種祕密成佛妙門早獲如來功德身者當著菩薩三十二種大金剛甲修此妙觀必證如來清淨法身云何名為三十二甲一者於無量劫為衆生故不厭生死受苦大甲二者誓度無量有情乃至螻蟻不捨大甲三者覺悟衆生生死長夢安置三種祕密大甲四者擁護佛法於一切時猶如響應護法大甲五者永滅能起有無二見一切煩惱金剛大甲六者頭目髓腦妻子珍寶有來求者能捨大甲七者家中所受一切樂具永不貪著能施大甲八者能持菩薩三聚淨戒及不捨離頭陀大甲九者著忍辱衣遇諸違緣毀罵鞭打不報大甲十者教化所有一切緣覺聲聞令趣一乘回心大甲十一者譬如大風晝夜不歇度諸有情精進大甲十二者身心寂諍口無過犯修行解說三昧大甲十三者生死涅槃無有二見饒益衆生平等大甲十四者無緣大慈利益羣品恆無厭捨與樂大甲十五者無礙大悲救攝一切無有限量拔苦大甲十六者於諸衆生無有怨結恆作饒益大喜大甲十七者雖行苦行不憚劬勞恆無退轉大捨大甲十八者有苦衆生來菩薩所代彼受苦不厭大甲十九者如觀掌中阿摩勒果如是能見解脫大甲二十者見五蘊身如旃陀羅損害善事無著大甲二十一者見十二入如空聚落常懷恐怖厭捨大甲二十二者見十八界猶如幻化無有真實大智大甲二十三者見一切法同於法界不見衆相證真大甲二十四者掩他人惡不藏己過厭離三界出世大甲二十五者如大醫王應病與藥菩薩隨宜演化大甲二十六者見彼三乘體本不異究竟回心歸一大甲二十七者紹三寶種使不斷絶轉妙法輪度人大甲二十八者佛於衆生有大恩德為報佛恩修道大甲二十九者觀一切法本性空寂不生不滅無垢大甲三十者悟無生忍得陀羅尼樂說辨才無礙大甲三十一者廣化有情坐菩提樹令證佛果一味大甲三十二者一剎那心般若相應悟三世法無餘大甲是名菩薩摩訶薩三十二種金剛大甲文殊師利菩薩若有善男子善女人身被如是金剛甲胄當勤修習三種祕密於現世中具大福智速證無上正等菩提爾時大聖文殊師利菩薩摩訶薩及諸大衆聞佛所說三種祕密心地妙法及三十二金剛甲胄一切菩薩所應學處各脫無價瓔珞寶衣供養毗盧遮那如來及十方尊而讚佛言善哉善哉薄伽梵演說無邊菩薩行願利益安樂一切衆生捨凡夫身使入佛地今者我等海會大衆為報佛恩不惜身命為諸衆生遍諸佛土分別演說此微妙法受持讀誦書寫流布令不斷絶惟願如來遙垂護念爾時大會聞此妙法得大饒益不可稱計無數菩薩各得證悟不轉退位一切人天皆獲勝利乃至五趣一切有情斷諸重障得無量樂悉皆當得阿耨多羅三藐三菩提大智度論卷十三持戒之人單遊獨行無所畏難持戒之人命欲終時其心安樂無疑無悔若生天上若人在中常得長壽是為得道因緣乃至得佛住壽無量心地觀經卷一序品集聲聞菩薩天龍八部為證信序世尊入心瓔珞寶莊嚴王定天雨寶華地六震動一切衆生念報佛恩來供養佛佛放金色光名菩薩遊戲神通普現三世依正及現如來行六度種種相貌會中有菩薩名師子吼白衆謂如來放光出定當演說心地觀門及廣重頌卷二報恩品上佛為五百長者等廣說四恩一父母恩二衆生恩三國王恩四三寶恩卷三報恩品下佛為智光長者重頌四恩卷四厭捨品佛為智光長者廣讚出家菩薩勝於在家不可為比何以故出家菩薩以正慧力觀察在家所有種種過失所謂世間一切舍宅等然舍宅有二種一依報即屋宇田産等二正報即自他五蘊身其宅主者即汝本識誰有智者樂有為宅唯有菩提安樂寶宮離老病死憂悲苦惱若有利根淨信深厚善男子等欲度父母妻子眷屬令入無為甘露宅者須歸三寶出家共十二翻長行重頌廣說舍宅過失不染世間諸五欲樂厭離三界生死苦難得入清涼安樂大城卷五無垢性品智光長者出家已請問出家菩薩應云何住云何修習無垢之業云何調伏有漏之心佛答大意觀苦空無常懺罪持戒知足忍辱不貪衣服臥具飲食湯藥讚歎袈裟有十勝利乞食有十勝利恆服棄藥有十勝利住阿蘭若有十勝德次阿蘭若品梵語阿蘭若此云寂靜處此品廣讚住寂靜處能圓滿萬行卷六離世間品有菩薩名樂遠離行承佛威力普告大衆分別種種住阿蘭若事次厭身品佛為彌勒等廣說觀身不淨等事卷七波羅蜜多品廣說十度次功德莊嚴品說種種功德莊嚴法卷八共四品前三品即今所録末囑纍品廣讚持經勝妙功德終也外道問聖大乘法無我義經出龍藏則字函陳增宋西天三藏朝散太夫試鴻臚少卿傳教大師法天奉詔譯如是我聞一時佛在大衆中爾時外道有疑欲決迷大乘行來至佛所稽首恭重合十指掌問無我義大丈夫是一切智常說此身無我若身無我本性亦無云何說有哀啼戲笑憎愛兩舌等事當何所生是我所疑願賜除斷如來所言身與本性有無云何佛言外道諦聽諦受當為汝說佛言身與本性體本空故說或有或無斯成二法言是有者斯更虗妄佛言當觀全身髮甲皮毛兩手雙足至於脂筋脾腸骨髓等事周遍內外不見本性外道言大丈夫若彼不見本性以我肉眼云何能見或以天眼而能見乎佛言天眼見彼無色無相無住此見非見外道言若如是說大聖妄語若彼非者云何現見有此啼笑嬉戲瞋怒憎愛兩舌等事以如是故何得說無又說或有或無斯成二義又言大丈夫若彼有無不得說者云何說言彼有所著彼無所著又言空者當何所如佛言如是如是空非所如體不可得故外道言若此者笑哭嬉戲瞋怒憎愛兩舌等事當何所見佛言如夢如幻如化如影像相外道言云何夢相云何幻化相云何影像相佛言幻化非相空非執持夢本體空如陽焰故影像無色虗假不實如是所見乃至一切事皆如幻如化如夢如影當如是見復次有二種見莊嚴真如彼莊嚴者此即名我此即名他是名人補特伽羅名人世間思惟至於資財男女兄弟妻妾等名心所思惟莊嚴彼如是法無自無他無人無命無補特伽羅無有情無世間無見者無資財無男女無朋友無妻妾等彼一切事不見自性云何彼出世間莊嚴果報善惡生滅彼真如莊嚴果報無善無惡不生不滅無煩惱無快樂而彼諸法各各如是又彼世間及出世間二種莊嚴令諸有情因莊嚴故而生煩惱處於輪回久久展轉不知真如彼知法者思惟莊嚴疑此苦受彼苦受惡遠離解脫而不見道愚癡有情以迷執故輪轉生死墮於惡趣行世間法不見真如盡彼輪回猶如織網用線展轉復去復來又如日月二種行往晝夜隱顯出沒世間諸行無常不久破壞輪轉生死來往亦然而真如體離莊嚴句又彼天人乾闥婆等及彼女等住彼天上次彼莊嚴果報墮一切有復有持明成就夜義緊那羅摩睺羅伽彼以一切莊嚴果報復墮地獄惡精進天以彼神通而作功德以彼一切莊嚴果報或墮彼天又若帝釋及轉輪王具最上德及最上句以彼一切莊嚴果報復生旁生智者於一切時宜應遠離天上最上大樂恆觀菩提之心靈明廓徹無自性無礙亦無所住一切皆空亦復遠離一切戲論外道菩提心相不硬不軟不熱不冷無觸無執又菩提心相非長非短不圓不方不肥不瘦又菩提心相不白不黑不赤不黃非色非相彼菩提心不作相非顯耀無性無纏縛由如虗空而無色故菩提心相而離觀察外道而汝不知菩提心相與般若波羅蜜多而相應故又菩提心相自性清淨無物無喻不可覩視是最上句又菩提心相非諸物像無相似者如水成漚雖覩非有如幻化如陽焰喻如泥團作諸坯器衆名雖具咸成戲論貪瞋癡等亦幻化有一味空故如電之住剎那不見觀於般若波羅蜜多及作諸善亦復如是至於談笑嬉戲歌舞歡樂飲食愛欲一切如夢有情諸行畢竟體空心喻虗空疑當何立行般若行恆若此觀了一切性自然解脫得最上句諸佛所說無上菩提由斯生出當作是觀作此觀者得最上涅槃乃至往昔造作諸過咸悉除減生無量德而於此生不染諸過專精觀行決定成就若與真如不相應者應念非真如呪及金剛鈴真如無生印而起真如相應之行決定圓滿如上功德爾時外道聞是語已審諦觀察而彼疑網皆悉除斷作是觀已獲住大乘瞻奉歡喜作禮而退外道問聖大乘法無我義經終問既名在家律要當純集律中之經何得集此經中二經耶答前第一卷已明頓漸二種歸戒則自利已周茲第二卷將欲受持大乘戒相當須先發菩提心以為持戒之體故律中將受菩薩戒之前戒師先問言諸佛子聽汝是菩薩否答言是菩薩又問汝發菩提心未答言已發菩提心須知此兩問答當先識其來源方令答之真實不然依樣畫葫蘆於問答有何用欲識菩提心之來源應先知此二經之義故直名心地觀經觀心品發菩提心品成佛品聖大乘法無我義經悟此題名則二經大旨已了了矣又菩提心者非止一發惟應數發令菩提心相續不斷當與戒相同一受持故先冠於大乘戒之卷首以便時習也又律藏中有自誓受菩提心戒儀一卷謂西土普賢瑜伽阿闍黎集唐特試鴻臚卿三藏沙門大廣智不空奉詔譯大意與下梵網懺相類不若心地觀經及無我義經之切實故首冠此二經為發菩提心之本即大乘戒體也又此經名聖大乘法無我義者此無我義當體即空所謂今所發覺心遠離諸性相蘊處及界等能取所取執諸法悉無我平等如虗空自心本不生空性圓寂故如諸佛菩薩發大菩提心我亦如是發受持菩提戒此偈文簡義周包括二經要義出發菩提心戒儀中既知戒性當識戒相故次之以受戒品箋要但此品藏本與箋要每段節次雖文義宛然而鈍根初學終難記憶於是儀潤特加標目使其眉目清楚一觀瞭然便於記憶而已故於經前另行低二格寫下五戒威儀經標目例此可知又此集便於簡約易持故但録受戒品一品若欲廣知當自悉優婆塞戒經全部優婆塞戒經受戒品第十四出龍藏定字函北涼天竺三藏曇無讖譯古吳蕅益沙門智旭箋要古杭源洪沙門儀潤標目先啓求聽許若人欲受優婆塞戒增長財命先當咨啓所生父母父母若聽次報妻子奴婢僮使此輩若聽次白國主國主聽已誰有出家發菩提心者便往其所頭面作禮軟言問訊作如是言大德我是丈夫具男子身欲受菩薩優婆塞戒唯願大德憐愍故聽按此經佛為善生長者而說故亦名善生經凡七卷二十八品一集會品二發菩提心品三悲品四解脫品五三種菩提品六修三十二相業品七發願品八名義菩薩品九義菩薩心堅固品十自利利他品十一自他莊嚴品十二二莊嚴品十三攝取品十四受戒品十五淨戒品十六息惡品十七供養三寶品十八六波羅蜜品十九雜品二十淨三歸品二十一八戒齊品二十二五戒品二十三尸波羅蜜品二十四業品二十五羼提品二十六毗梨耶品二十七禪品二十八般若品今即第十四品文也本因善生請問外道禮六方法佛以六波羅蜜答之於此品初復明東方即是父母南方即是師長西方即是妻子北方即善知識下方即是奴婢上方即是沙門婆羅門等若有供養是六方者是人則得增長財命能得受持優婆塞戒二問七遮難是時比邱應作是言汝父母妻子奴婢國主聽不若言聽者復應問言汝不負佛法僧物及他物耶若言不負復應問言汝今身中無內外身心病耶若言無者復應問言汝不於比邱比邱尼所作非法耶若言不作復應問言汝不作五逆罪耶若言不作復應問言汝不作盜法人耶謂盜聽比邱比邱尼戒法若言不作復應問言汝非二根壞八戒齊父母師病不棄去耶不殺發菩提心人盜現前僧物兩舌惡口於母姊妹作非法耶不於大衆作妄語耶問此優婆塞戒法似被界內菩薩何故種種遮難皆不許受梵網戒法是別圓菩薩何故惟除七逆餘但解法師語盡受得戒豈藏通法門反難於別圓耶答此六重二十八輕律行別被一種根機故下文云出家菩薩得畜二種弟子謂出家弟子在家弟子在家菩薩亦得畜一種弟子謂在家弟子既有為師作範之義殊非泛常優婆塞可比則遮難安得不嚴又由界內教法扶事為急必事境不虧然後理諦可發也若梵網是界外教收機則廣故惟除七遮餘皆不揀但所謂解法師語亦非易易如經云大衆心諦信汝是當成佛我是已成佛常作如是信戒品已具足有此信者方能解法師語則似易而實難矣三問能受若言無者復應語言善男子優婆塞戒極為甚難何以故是戒能為沙彌戒大比邱戒及菩薩戒乃至阿耨多羅三藐三菩提而作根本至心受持優婆塞戒則能獲得如是等戒無量利益若有毀破如是戒者則於無量無邊世中處三惡道受大苦惱汝今欲得無量利益能至心受不受此戒者亦可出家為沙彌亦可出家為比丘亦可進受梵網戒亦可成無上菩提譬如本立道生故得無量利益若毀破者罪亦無量也四問能歸三寶若言能者復應語言優婆塞戒極為甚難若歸佛已寧捨身命終不依於自在天等若歸法已寧捨身命終不依於外道典籍若歸僧已寧捨身命終不依於外道邪衆汝能如是至心歸依於三寶不問菩薩戒經云菩薩尚聽外道異論又云若於日日常以二分受學佛經一分外典是名不犯此義云何又復今時寺院往往莊飾神像朝暮禮拜為有過不答聽學外典為欲降伏外人非依外典修行也護伽藍神理可莊飾然比邱沙彌決定不應禮拜近時叢林陋習不足挂齒但當依律行持天神自然喜悅若大自在天護正法者優婆塞致禮亦自不妨彼亦歸依三寶不異法門昆仲也五問能施無畏若言能者復應語言善男子優婆塞戒極為甚難若人歸依於三寶者是人則為施諸衆生無怖畏已若人能施無怖畏者是人則得優婆塞戒乃至阿耨多羅三藐三菩提汝能如是施諸衆生無怖畏不六說犯戒過分二先標若言能者復應語言人有五事現在不能增長財命何等為五一者樂殺二者盜三者邪淫四者妄語五者飲酒次釋又分六一殺生過一切衆生因殺生故現在獲得惡色惡力惡名短命財物耗減眷屬分離賢聖訶責人不信用他人作罪橫罹其殃是名現在惡業之果捨此身已當墮地獄多受苦惱饑渴長命惡色惡力惡名等事是名後世惡業之果若得人身復受惡色短命貧窮是一惡人因緣力故令外一切五穀果蓏悉皆減少是人殃流及一天下五穀黍菽麻麥稻也果木實蓏草實問一人惡業與天下何干若是同業相感何為歸罪一人若一人惡業如是力強今作惡者不可勝數世界云何安立答然旃檀而香味遠聞動糞廁而臭氣四達善惡業力亦復如是今作惡者雖多而修善者亦自不少所以世界苦樂相參若無惡人因緣力故應成淨土若無善人因緣力故惡道充滿矣二偷盜過善男子若人樂偷是人亦得惡色惡力惡名短命財物耗減眷屬分離他人失物於己生疑雖親附人人不見信常為賢聖之所訶責是名現在惡業之果捨此身已墮於地獄受得惡色惡力惡名饑渴苦惱壽命長遠是名後世惡業之果若得人身貧於財物雖得隨失不為父母兄弟妻子之所愛念身常受苦心懷愁惱是一惡人因緣力故一切人民凡所食噉不得色力是人惡果殃流萬姓三妄語過善男子若復有人樂於妄語是人現得惡口惡色所言雖實人不信受衆皆憎惡不喜見之是名現世惡業之報捨此身已入於地獄受大苦楚饑渴熱惱是名後世惡業之報若得人身口不具足所說雖實人不信受見者不樂雖說正法人不樂聞是一惡人因緣力故一切外物資産減少四飲酒過善男子若復有人樂飲酒者是人現世喜失財物身心多病常樂鬬諍惡名遠聞喪失智慧心無慚愧得惡色力常為一切之所訶責人不樂見不能修善是名飲酒現在惡報捨此身已處在地獄受饑渴等無量苦惱是名後世惡業之報若得人身心常狂亂不能繫念思惟善法是一惡人因緣力故一切外物資産臰爛五邪淫過善男子若復有人樂為邪淫是人不能護自他身一切衆生見皆生疑所作之事妄語在先於一切時常受苦惱心常散亂不能修善喜失財物所有妻子心不戀慕壽命短促是名邪淫現在惡果捨此身已處在地獄受惡色力饑渴長命無量苦惱是名後世惡業果報若得人身惡色惡口人不喜見不能守護妻妾男女是一惡人因緣力故一切外物不得自在六問離四虗善男子是六惡法汝今真實能遠離不若言能者復應語言善男子受優婆塞戒有四事法所不應作何等為四為貪因緣不應虗妄為瞋恚癡恐怖因緣不應虗妄是四不應法汝能離不貪恚怖癡四法種子惟阿羅漢乃能斷盡然一受戒即須折伏令斷不應以此因緣而作虗妄事也七問離五遊若言能者復應語言善男子受優婆塞戒有五處所所不應遊屠兒淫女酒肆國王旃陀羅舍如是五處汝能離不旃陀羅此翻屠者或翻嚴幟謂惡業自嚴行時搖鈴持竹為幖幟故即今打狗及劊子手之類是也問屠兒淫女酒肆旃陀羅舍不遊可矣國王處亦不應遊豈優婆塞并不許出仕耶答菩薩優婆塞戒既從二十僧中秉受理應清淨自居樂道忘勢何得更遊國王類彼趨炎附勢者耶古來儒者亦有不事王侯高尚其志如子思孟子段干薛柳之屬不一而足既受菩薩優婆塞戒自應如是矣八問離五不應若言能者復應語言善男子受優婆塞戒有五事所不應作一者不賣生命二者不賣刀劍三者不賣毒藥四者不沽酒五者不壓酒如是五事汝能離不賣生命則傷慈悲賣刀劍毒藥則近殺業沽酒則招呼引召亂性迷魂西域壓油亦多損害蟲命故均名惡律儀也此方壓油不令先出蟲者無罪九問離三不作若言能者復應語言善男子受優婆塞戒復有三事所不應為一者不作羅網二者不作藍染三者不作釀皮如是三事汝能離不西土藍染亦多殺蟲名惡律儀此土不然亦應無罪也釀皮者以硝製皮然後可用既傷慈悲又復臭穢故不應作十問離二事若言能者復應語言善男子受優婆塞戒復有二事所不應為一者摴蒲圍碁六博二者種種歌儛伎樂如是二事汝能離不此等皆屬無記散亂邪業妨廢正道故不應為十一問離四人若言能者復應語言善男子受優婆塞戒有四種人不應親近一者碁博二者飲酒三者欺誑四者沽酒如是四人汝能離不十二問離放逸若言能者復應語言善男子受優婆塞戒有法放逸所不應作何等放逸寒時熱時饑時渴時多食飽時清旦暮時懅時懅音渠懼怯也又心急也亦音據慚懼也作時初欲作時失時得時怖時喜時賊難穀貴時病苦少壯年衰老時富時貧時為命財時如是時中不修善法是名放逸汝能離不十三問能作世事若言能者復應語言善男子受優婆塞戒先學世事既學通達如法求財若得財物應作四分一分應供父母己身妻子眷屬二分應作如法販轉留餘一分藏積俟用如是四事汝能作不十四問離四寄若言能者復應語言善男子財物不應寄付四處一者老人二者遠處三者惡人四者大力如是四處不應寄付汝能離不十五問離四惡若言能者復應語言善男子受優婆塞戒有四惡人常應離之一者樂說他過二者樂說邪見三者口軟心惡四者少作多說是四惡人汝能離不問菩薩應勸化一切惡人皆令修善今誡遠離四種惡人寧不違失菩提心耶答久修大士力堪化人初心菩薩應先自護若不遠離惡友必至受其熏染既遠離已令菩提心修習增長不患不能化度此輩也十六時僧兩滿若言能者應令是人滿六月日親近承事出家智者智者復應至心觀其身四威儀若知是人能如教作過六月已和合衆僧滿二十人作白羯磨白者秉白也羯磨此翻為業亦翻所作亦翻辦事亦翻作法謂白衆作法為其成辦受戒事業也問外道求出家但制四月共住沙彌受具戒止須三師七證今此善人欲受優婆塞戒何故必令滿六月日觀四威儀能如教作方於二十僧中作白授戒豈出家尚易此反難耶又設有他緣不滿六月無二十僧亦可受否答此一種菩薩優婆塞乃是居士中尊與比邱內外夾輔共興佛法者故授法獨加慎重他緣既無開聽恐難輕許止可授通途五戒并梵網地持等戒耳梵網即流通心地品地持即菩薩戒本經十七正白羯磨大德僧聽是某甲今於僧中乞受優婆塞戒滿六月中淨四威儀至心受持淨莊嚴地是人丈夫具男子身若僧聽者僧皆默然不聽者說此正作白羯磨文也由僧默然即是共許彼人作優婆塞從此便得為優婆塞故云成辦事業也十八勸持受歸僧若聽者智者復應作如是言善男子諦聽諦聽僧已和合聽汝持作優婆塞戒是戒即是一切善法根本若有成就如是戒者當得須陀洹果乃至阿那含果若破是戒命終當墮三惡道中善男子優婆塞戒不可思議何以故受是戒已雖受五欲而能不障須陀洹果至阿那含果是故名為不可思議汝能憐愍諸衆生故受是戒不若言能受爾時智者次應為說三歸依法第二第三亦如是說受三歸已名優婆塞問雖受五欲不障聖果與惡邪見中所謂淫不障道何異答佛為出家人制斷淫欲彼乃妄云淫不障道故名惡邪見也今佛為在家人但制邪淫不制非時食殘宿食等然苟依戒行持遵修念處便得證於初二三果故云雖受五欲而能不障初果等也然彼設證阿那含果則正淫亦必永斷豈淫不障道之邪說哉問優婆塞何故不證第四阿羅漢果答由尚居家未斷殘宿食故不成應供德故問沙彌亦無殘宿食戒何故得證四果答沙彌雖未受殘宿戒而住僧伽藍內即可斷殘宿食故亦得證四果證四果已無漏戒與律儀戒共發即得名比邱也問斷邪已受三歸尋常五戒亦受三歸今既滿六月後二十僧中作白羯磨何須又受三歸答三歸是一切戒之本源故一切戒並由三歸而得但由期心各別故令所發無作亦各不同今正依此三歸得名菩薩優婆塞也十九問定所持爾時智者復應語言善男子諦聽諦聽如來正覺說優婆塞或有一分或有半分或有無分或有多分或有滿分若優婆塞受三歸已不受五戒是名優婆塞但三歸菩薩優婆塞也若受三歸受持一戒是名一分一分戒菩薩優婆塞受三歸已受持二戒是名少分少分戒菩薩優婆塞也更有受三戒者名半分菩薩優婆塞前標半分今不重出但淨身三故僅名半也若受三歸持二戒已若破一戒是名無分受一戒而破亦名無分受三戒四戒五戒而破一戒亦名無分此略不說可以例知若受三歸受持四戒是名多分若受三歸受持五戒是名滿分汝今欲作一分優婆塞作滿分耶若隨意說爾時智者當隨意授問菩薩優婆塞戒云何得有一分乃至滿分不同既有一分乃至滿分不同云何授已復說六重二十八輕戒法答此義今當辨佛之正法重在責實不重虗名以其雖是在家能發無上大菩提心滿六月中淨四威儀悅可僧意故於二十僧中作白羯磨受三歸依爾時即名為菩薩優婆塞縱令不受五戒亦必於此六重二十八輕應學應持但五種淨戒位粗實細似易實難故教令諦審思維寧可少受多持不可多受少持不受則已受則必持持則必當充類至義之盡極其精細方得名為一分優婆塞等當知始從不受五戒優婆塞一分優婆塞乃至滿分優婆塞總當學持六重二十八輕戒法縱使六重二十八輕悉皆無犯僅稱滿分乃至一分以一分戒求其微細無缺亦甚不易故也故一一戒並攝六重二十八輕一一戒並能克證初二三果乃至遠階無上菩提惟佛方能圓滿不殺不盜不淫不妄不飲功德惟佛方名究竟一切究竟二分乃至究竟滿分戒耳縱令此生未即證果而但三歸定生人道一分戒定生四王天二分戒定生忉利天三分戒定生夜摩天四分戒定生兜率天滿分戒定生化樂他化等天若以此但三歸及一分戒等回向淨土定生極樂世界隨功力之淺深分蓮華之九品約因辨果分毫不濫不啻如鏡寫形也願受持者圖此實益勿掛虗名二十正授六重既授戒已復作是言優婆塞者有六重法謂從但三歸優婆塞乃至滿分皆有此六重法也二十一分列輕戒第一不殺生善男子優婆塞戒雖為身命乃至蟻子悉不應殺若受戒已若口教授若身自殺是人即失優婆塞戒是人尚不能得暖法況須陀洹至阿那含是名破戒優婆塞臭優婆塞旃陀羅優婆塞垢優婆塞結優婆塞是名初重雖為身命舉重以況輕也為身命尚不應殺況餘事耶乃至蟻子舉輕以況重也蟻子至微尚不應為身命殺況他物乎若准五戒相經則殺人犯不可悔即失優婆塞戒殺非人犯中可悔殺畜生犯下可悔不名失戒悔則犯戒罪滅性罪不滅不悔則雖犯小罪亦墮三塗細玩今文似殺蟻子亦即失戒應更分別若但受三歸或受盜等一分二分戒者宜依五戒相經結判輕重若正受此一分殺戒或兼餘分或受滿分者則依此經結判也暖法者內凡四善根之初位從四念處觀發得相似智慧得善有漏五陰伏見思惑如鑽火先覺暖相故名暖位依於淨戒而修念處由四正勤修如意足方得暖法乃至世第一法而階無漏若破淨戒一切念處慧等悉不成就如樹無根不發芽莖如屋無基不立堂構也所受無作戒品清淨道器今已毀壞故名破戒譬如死尸無復香氣故名為臭墮在下賤種姓故名為旃陀羅遠清淨道故名為垢難得解脫故名為結問倘能無覆藏心誠懇發露通懺悔否若通懺悔法式云何答本經無懺悔法設欲懺悔須依梵網或依方等及觀虗空藏占察經等諸大乘法隨用一法畢志行持心極殷重事極懇到乃克有濟殊非可草率也下五例知第二不偷盜優婆塞戒雖為身命不得偷盜乃至一錢若破是戒是人即失優婆塞戒是人尚不能得暖法況須陀洹至阿那含是名破戒優婆塞臭旃陀羅垢結優婆塞是名二重不受此一分戒者五錢為不可悔四錢以下為中可悔一錢為下可悔受此一分戒者一錢亦不可悔餘如上文例知第三不虗說優婆塞戒雖為身命不得虗說我得不淨觀至阿那含若破是戒是人即失優婆塞戒是人尚不能得暖法況須陀洹至阿那含是名破戒優婆塞臭旃陀羅垢結優婆塞是名三重此戒受與不受其罪是均或不受者為身命故萬不得已而偶虗說猶為中可悔也第四不邪淫優婆塞戒雖為身命不得邪淫若破是戒是人即失優婆塞戒是人尚不能得暖法況須陀洹至阿那含是名破戒優婆塞臭旃陀羅垢結優婆塞是名四重此戒受與不受罪亦是均或不受者為身命故惡女以死相逼而強從之猶為中可悔也第五不說四衆過罪優婆塞戒雖為身命不得宣說比邱比邱尼優婆塞優婆夷所有罪過若破是戒是人即失優婆塞戒是人尚不能得暖法況須陀洹至阿那含是名破戒優婆塞臭旃陀羅垢結優婆塞是名五重口宣人過如吐蛆蟲已是惡口兩舌之業況宣如來四衆弟子過罪豈非惡口之最重者不論實與不實但令陷沒治罰心說必皆失戒若獎勸心及僧差說過並名非犯若有瞋心亦犯輕垢也第六不酤酒上分重戒竟優婆塞戒雖為身命不得酤酒若破是戒是人即失優婆塞戒是人尚不能得暖法况須陀洹至阿那含是名破戒優婆塞臭旃陀羅垢結優婆塞是名六重問酤酒一事資生之業不貪不飲何故反重若貪飲酒斷智慧種為愚癡人何故反輕答飲酒但自迷惑酤酒迷惑一切是故罪重資生自有正業所謂商估如法求利不應作此惡律儀也無論但三歸依一分滿分犯此皆失菩薩優婆塞戒二十二結重起輕善男子若受如是優婆塞戒能至心持不令毀犯則能獲得如是戒果善男子優婆塞戒名為瓔珞名為莊嚴其香微妙熏無不遍遮不善法為善法律即是無上妙寶之藏上族種姓大寂靜處是甘露味生善法地直發是心尚得如是無量利益況復一心受持不毀此結歎受持功德也瓔珞莊嚴對破戒而言之破戒則無慚愧如裸露故妙香遍熏對臭言之遮不善法乃至上族種姓對旃陀羅言之旃陀羅名惡律儀罪業之藏下賤種姓今受戒則任運止惡行善出生無上菩提妙寶堪紹諸佛種姓也大寂靜處對垢言之是甘露味對結言之生善法地總歎戒為平地也又瓔珞莊嚴是樂德香遮不善是淨德上族寂靜是我德甘露不死是常德初發菩提受戒之時便得如是四德無作戒體念念受持則念念具足四德利益上說六重戒竟下說二十八輕二十三分列輕戒第一不能供養父母師長善男子如佛說言若優婆塞受持戒已不能供養父母師長是優婆塞得失意罪不起墮落不淨有作此下二十八種失意之罪亦名違無作罪亦名不淨有作倘一犯之即應懺悔若不懺悔皆能墮落三塗不論但三歸菩薩優婆塞一分乃至滿分無不爾也世人雖不歸依三寶為優婆塞亦須供養父母師長若不供養亦必有罪況為菩薩優婆塞耶言失意者謂失菩提正意念亦失世間善意念也言不起者改過自新名之為起起則不致墮落不起則當墮落也言不淨有作者善惡皆論無作有作今是有作惡故名不淨有作也未受戒前未得無作戒體則善名有作已受戒後已得無作戒體雖犯失意之罪僅名有作不淨以例未受惡戒未發無作惡律儀時則惡名有作已受惡戒已發無作雖或有時遇生不殺遇物不盜等僅名有作善也夫初受戒時即發無作妙戒所有功德念念無量故於二十八種失意之罪雖或偶犯但違無作名為有作如人偶病服藥則痊惟不服藥則能致重或復致死倘不受戒縱發菩提如中陰未曾受身依何行菩提道紹佛種姓也哉第二耽樂飲酒若優婆塞受持戒已耽樂飲酒是優婆塞得失意罪不起隨落不淨有作滿分菩薩一滴入口亦失意罪四分以下耽樂方成失意罪也以酒為藥以酒塗瘡並名非犯第三惡心不能瞻視病苦若優婆塞受持戒已惡心不能瞻視病苦是優婆塞得失意罪不起墮落不淨有作惡心故得罪有慈心而力不逮者非犯第四有乞者不與若優婆塞受持戒已見有乞者不能多少隨宜丐音蓋乞取也行請也分與空遣還者是優婆塞得失意罪不起墮落不淨有作所乞非宜或自實缺乏此物無以應之非犯第五見四衆不能迎拜問訊若優婆塞受持戒已若見比邱比邱尼長老先宿優婆塞優婆夷等不起承迎禮拜問訊是優婆塞得失意罪不起墮落不淨有作或有重病或在說法衆中或坐禪入定非犯第六見四衆毀戒心生憍慢若優婆塞受持戒已若有比邱比邱尼優婆塞優婆夷毀所受戒心生憍慢言我勝彼彼不如我是優婆塞得失意罪不起墮落不淨有作見他毀戒應生大悲又應自省何可生憍慢耶第七月六齊不加受八戒供三寶若優婆塞受持戒已一月之中不能六日受持八戒供養三寶是優婆塞得失意罪不起墮落不淨有作不敬好時則善法衰損故有罪也重病非犯第八不往聽法若優婆塞受持戒已四十里中有講法處不能往聽是優婆塞得失意罪不起墮落不淨有作或自修勝業或有重病或彼顛倒說法不往非犯第九受僧用物若優婆塞受持戒已受招提僧此云四方僧物亦翻別房施臥具牀坐是優婆塞得失意罪不起落墮不淨有作未入僧數故不應受也或於寺中暫用非犯第十飲有蟲水若優婆塞受持戒已疑水有蟲故便飲之是優婆塞得失意罪不起墮落不淨有作疑則應諦視應用漉囊或諦視無蟲方可飲用十一險難獨行若優婆塞受持戒已險難之處無伴獨行是優婆塞得失意罪不起墮落不淨有作冒難遊行非明哲保身之道也或先無險難至中道時忽有險難非犯或有伴同行伴忽命過非犯或為佛法或為父母師長不避險阻非犯十二獨宿尼寺若優婆塞受持戒已獨宿尼寺是優婆塞得失意罪不起墮落不淨有作防過遠嫌也設有不得已事須得好伴同宿非犯十三為財打人若優婆塞受持戒已為於財命打罵奴婢僮僕外人是優婆塞得失意罪不起墮落不淨有作奴婢僮僕以德化之恩而有威何須打罵縱彼無道亦應依法折伏不宜輒自動身發口也十四殘食施僧若優婆塞受持戒已若以殘食施於比邱比邱尼優婆塞優婆夷是優婆塞得失意罪不起墮落不淨有作乞士資身雖無揀擇善信設供理應精虔若以殘食施於四衆則輕慢良田自招不如意報也十五畜猫狸若優婆塞受持戒已若畜猫狸是優婆塞得失意罪不起墮落不淨有作傷害鼠類違於慈悲雖不失戒性罪不輕十六畜牛羊等若優婆塞受持戒已畜養象馬牛羊駝驢一切畜獸不作淨施求受戒者是優婆塞得失意罪不起墮落不淨有作問比邱乞食四方故不可畜奴婢畜生今優婆塞未離家業如何不許畜象馬等又淨施之法當如何作答此菩薩優婆塞雖尚居家已作人天標榜故一切畜生皆須淨施淨施之法經未申明然以理揆之應同比邱淨施財寶雖不畜持仍得作法受用謂以象馬等物皆作委寄親友之心代彼看養騎用十七不儲畜三衣鉢杖若優婆塞受持戒已若不儲畜僧伽梨衣鉢錫杖是優婆塞得失意罪不起墮落不淨有作僧伽梨此翻重復衣亦翻大衣問既許儲畜亦許著用否若許著用與比邱何別或衣制不同當云何造或著時有別復在何時答三衣鉢杖本是出家器具此經但說儲畜不說著用惟方等陀羅尼經制在家二衆入壇行道應著無縫三衣無縫即是縵條不同割截入壇時著則非一切時矣十八田須淨水若優婆塞受持戒已若為身命須田作者不求淨水及陸種處是優婆塞得失意罪不起墮落不淨有作或求無蟲淨水或求陸種不須用水皆不損生也十九物價令平若優婆塞受持戒已為於身命若作市易斗稱賣物一說價已不得前却捨賤趣貴斗稱量物任前平用如其不平應語令平若不如是是優婆塞得失意罪不起墮落不淨有作二十非時處欲若優婆塞受持戒已若於非處非時行欲是優婆塞得失意罪不起墮落不淨有作雖是自己妻妾不得非處非時也除臥室中名為非處或於日中或産前産後皆名非時二十一偷官稅若優婆塞受持戒已商估販賣不輸官稅盜棄去者是優婆塞得失意罪不起墮落不淨有作據五戒相經違稅五錢犯不可悔此云爾者或是尋常市中賣物不同偷度關津或雖為菩薩優婆塞未受此一分戒故稍輕耳二十二犯國制若優婆塞受持戒已若犯國制是優婆塞得失意罪不起墮落不淨有作入國問禁世法尚然況佛弟子何得不自慎耶二十三新食不供養三寶若優婆塞受持戒已若得新穀果蓏菜茹音如茅根也又乾也不先奉獻供養三寶先自受者是優婆塞得失意罪不起墮落不淨有作二十四不聽僧止作若優婆塞受持戒已僧若不聽說法讚歎輒自作者是優婆塞得失意罪不起墮落不淨有作給孤長者每為新學比邱教讀說法然必先禮比邱足已然後授法不以師禮自居又是僧聽教授方敢為之不敢輒自作也二十五不路讓僧前若優婆塞受持戒已道路若在比邱沙彌前行是優婆塞得失意罪不起墮落不淨有作二十六僧食不公分若優婆塞受持戒已僧中付食若偏為師選擇美好過分與者是優婆塞得失意罪不起墮落不淨有作師與衆僧本應平等偏好偏多是陷師於不義也二十七養蠶若優婆塞受持戒已若養蠶者是優婆塞得失意罪不起墮落不淨有作養蠶是殺方便故結輕若煮繭害命則結重矣二十八路遇病不能視囑上分輕戒竟若優婆塞受持戒已行路之時遇見病者不往瞻視為作方便付囑所在而捨去者是優婆塞得失意罪不起墮落不淨有作有暇則應往瞻視無暇則應作方便或付囑已然後可去若置之度外則失慈悲故得罪也不犯者或自有病或無力或彼自有力有瞻病人二十四勸讚善持善男子若優婆塞至心能受持如是戒是人名為優婆塞中分陀利華優婆塞中微妙上香優婆塞中清淨蓮華優婆塞中真實珍寶優婆塞中丈夫之人分陀利此翻白蓮華出汙泥而不染故以為喻也戒德遠熏故為微妙上香能契實相因果故為清淨蓮華自利利他故為真實珍寶雄猛威力能勝煩惱故名丈夫之人二十五結讚甚難善男子如佛所說菩薩二種一者在家二者出家出家菩薩名為比邱二百五十戒皆是摩訶衍在家菩薩名優婆塞始從但三歸乃至滿分戒各當持此六重二十八輕出家菩薩持出家戒是不為難在家菩薩持在家戒是乃為難何以故在家之人多惡因緣所纏繞故今時欲求如法比邱僧二十人殆不易得則此優婆塞戒殆未可受姑略釋之以顯正法或肯如說行持亦即分陀利華矣優婆塞戒經受戒品箋要畢附優婆塞戒經中前後摘要發菩提心有五事一者親近善友二者斷瞋恚心三者隨師教誨四者生憐愍心五者勤修精進復有五事一者不見他過二者雖見他過而心不悔三者得善法已不生憍慢四者見他善業不生妬心五者觀諸衆生如一子想若人不能一心觀察生死過咎涅槃安樂如是之人雖復惠施持戒多聞終不能得解脫分法夫菩提者有四種子一者不貪財物二者不惜身命三者修行忍辱四者憐愍衆生具足三事則得名為法財長者一者心不甘樂外道典籍二者心不貪著生死之樂三者常樂供養佛法僧寶復有三事一者為人受苦心不生悔二者具足微妙無上智慧三者具善法時不生憍慢復有三事一者多聞無厭二者能忍諸惡三者教他修忍復有三事一者自省己過二者善覆他罪三者樂修慈心復有三事一者至心奉持禁戒二者四攝攝取衆生布施愛語利行同事三者口言柔軟不粗我於往昔為四事故捨離身命一者為破衆生諸煩惱故二者為令衆生受安樂故三者為自除壞貪著身故四者為報父母生養恩故不清淨說法有五事一為利故說二為報而說三為勝他說四為世報說五疑說清淨說法有五事一先施食然後為說二為增長三寶故說三斷自他煩惱故說四為分別邪正故說五為聽者得最勝故說菩薩若欲為衆生說法界深義先當為說世間之法然後乃說甚深法界何以故為易化故乃至小罪雖為身命尚不毀犯是故名為戒波羅蜜如人重病要須衆藥和合治之若少一種則不能治何以故其病重故一切衆生亦復如是具諸惡故要須衆戒然後治之若少一戒則不能治已録受戒品箋要竟次當略序五戒威儀經大義按威儀經係西土聖賢所集應入論藏今亦稱經者稟佛制故經內言戒本應稱律今云威儀者前有六重二十八輕及梵網菩薩戒故此但專為在家應止持故也此經前半為菩薩優婆塞放逸戒威儀後半為離欲戒威儀要而言之發菩提心為本若不發菩提心縱能嚴持淨戒止名俗戒此中云捨菩薩願即為失戒故此威儀戒法當與心地觀經合持則一切戒法清淨矣開首偈讚佛法僧凡從佛教集述例多如此正文開章用諸大德三字此即稱呼諸閲讀此經及受持此戒法者推本諸佛菩薩言此戒非自造亦非一佛一菩薩之教如此故云我今欲說三世諸佛菩薩成就利益一切衆生功德戒此中先說四波羅彝者以是極重垢罪故先總說之明蕅益師云梵網具明十重今秪列後四者凡有三義一者殺盜淫妄名為根本戒法無論在家出家欲受菩薩戒者必已先受五戒十戒具足戒等何勞更宣今但申明上宏下化增上律儀而已二者根本戒法七衆設犯不通懺悔縱令大乘許其懺悔須見好相今此四戒若軟中品纏犯止許懺除上品纏犯猶容重受故不可以根本四戒相濫同也三者菩薩之行或順或逆方便甚多故殺盜淫妄容有開遮惟此四戒於一一方所一一趣中悉不得犯故獨明之下四十戒輕重開遮經文自明不須注釋又威儀經康熙癸丑年潞河居士雷湛雨有注釋七卷行世惜其文字訛舛甚多有誤後學須依藏本為正不可不悉也菩薩優婆塞五戒威儀經出龍藏言字函劉宋罽賓三藏法師求那跋摩譯古杭源洪沙門儀潤標目歸讚三寶分第一此經西土聖賢所集故先皈讚三寶以求加被佛者衆聖尊神通應自在隨類處身形音聲亦復爾見聞獲安隱莫不信向心是故我歸命願普如世尊甚深菩薩戒功德難思議受者獲安隱福慧日夜生諸佛常護念萬行漸滿盈六度四等意普度諸羣盲手足初莫犯節言順所行常樂在定意是名真比邱質直離諂曲常與賢聖俱愛衆猶養己是名真菩薩戒四棄法分第二梵語波羅彝此土翻棄謂犯此四事當棄佛法外也諸大德一心諦聽諦聽善思念之我今欲說三世諸佛菩薩成就利益一切衆生功德戒如是住菩薩戒者有四波羅彝法何等為四若菩薩為利養故自讚毀他是名菩薩波羅彝若菩薩多饒財物貧苦之人來從乞索菩薩慳貪無有慈心乃至不施一錢之物有求法者乃至不為說於一偈是名菩薩波羅彝若菩薩瞋於前人惡言罵辱加以手打及以杖石意猶不息前人求悔善言懺謝菩薩猶瞋憤結不解是名菩薩波羅彝若菩薩自謗菩薩法藏若見人謗善可其言既自不信反助他言若心自解或從他受是名菩薩波羅彝如是菩薩四波羅彝菩薩於中不應犯一何況具犯若有犯者不名菩薩現身不能莊嚴菩提又復不能令心寂靜是似菩薩非實菩薩犯有三種有軟中上若軟中心犯是不名失若是增上心犯是名為失何者是上若犯上四數數樂犯心無慙恥不自悔責是名上犯菩薩雖犯於上四事不即永失如比邱犯四即為永棄菩薩不爾何以故比邱犯四更無受路菩薩雖犯脫可更受是故不同略有二事失菩薩戒一捨菩提願二增上惡心除是二事若捨此身戒終不失從是以後生生之處常有此戒若不憶念更遇善友而更受者不名新得如是菩薩戒者應當識知犯不犯事輕重之相軟中上異輕重開遮分第三內有四十一供養三寶如是住菩薩戒者日應供養諸佛若塔若像次供養法若行法人及菩薩藏大乘經典供養衆僧及十方土住於大地諸菩薩等於日夜中供養三寶隨其力能乃至一念一禮一四句誦信心供養勿令有廢若不恭敬慢惰心者犯重垢罪若忘誤者犯輕垢罪不犯者若病若狂若有淨心逮菩薩地如須陀洹得不壞淨心常能供養三寶不絶是名不犯二除貪知足菩薩不知厭足貪著利養不制心者犯重垢罪不犯者雖貪利養常生悔心我當精進斷除是意極自制御貪心猶起若取小利助斷大貪是名不犯三恭敬尊長菩薩見上座尊長耆年宿德同師同學生憍慢心及瞋惡心不起承迎禮拜避坐設有言語餘談不聽若有所問不如實答者犯重垢罪若無慢瞋恚癡之意直以懶惰無記散心犯輕垢罪不犯者若病若狂若時睡眠若聽法說法若先共他人語若為調伏滅惡增善若有僧限護多人意是名不犯四隨請受施菩薩檀越來請若於自舍若僧寺內給施所須菩薩憍慢瞋恚輕賤不往受者犯重垢罪若懶惰不往犯輕垢罪不犯者若病若狂若遠若道險難若為調伏滅惡增善若失受請若為修善若聽未聞若知請主欲相惱故若有僧限護多人意是名不犯五取物轉施菩薩從他人邊得金銀琉璃種種雜寶所須之物及地中伏藏無主財物皆應取之念當轉施若惡心瞋故不取者犯重垢罪若作是心我不與人而作因緣若懶惰心犯輕垢罪不犯者若是狂心若為調伏滅惡增善若知受已必生愛著若知施已生悔若知施主施故發狂若慮施主施已窮苦若知施物三寶所有若知施物劫盜所得若知受已多得苦惱所謂王難賊盜死亡繫閉惡聲流布擯令出境界是名不犯六隨宜說法菩薩他來求法以瞋惡心憎嫉他故不與說者犯重垢罪若懶惰心不與說者犯輕垢罪不犯者若外道求法慮還譏刺若病若狂若為調伏滅惡增善若知前人不解其義若前人不敬不如法事若前人鈍根不解深法恐生邪見若知聞已破失本心壞滅正法若知聞已必向非器宣說其事是名不犯七悲心教誡菩薩見惡衆生犯戒毀禁作衆罪行菩薩自知能化為善若惡心瞋心捨不教者犯重垢罪何以故菩薩不於身口意淨持戒人邊起於悲心若見惡人犯戒毀禁作衆罪行極生悲心是故有犯不犯者若狂若為調伏滅惡增善若有僧限護多人意是名不犯八權受利人菩薩如佛所制波羅提木叉及結毗尼欲使不信者信已信者增此聲聞戒及菩薩戒等無有異何以故聲聞之人順常自為猶欲學令不信者信信者增何況菩薩所修學常為衆生豈不能爾是故名同不犯如佛所制聲聞之人應少欲作少因緣事菩薩不爾何以故順求自利不為他人是聲聞好菩薩若爾則不名菩薩為他人故所可受衣乃至百千從非親里婆羅門居士盡力所求如衣鉢亦如是為他人故及應乞縷教織師織畜憍奢耶衣受取金銀乃至百千如是之事與聲聞異若菩薩本為衆生而瞋惡心少作少因緣事放捨衆生獨居其所者犯重垢罪若懶惰心少欲少事居其所者犯輕垢罪九戒息五事菩薩有五非法一諂二華三相四以利求利五邪命有此五事以不為愧不制不息者犯重垢罪不犯者覺是非法常欲制之是名不犯十威儀自重菩薩戲笑散亂高聲唱說作非威儀令他人笑為衆所輕者犯重垢罪若是宿習忘誤作者犯輕垢罪不犯者覺是非法常欲制之若外人瞋恚欲調伏故若人苦惱為令懌故若欲攝取戲笑故若二人共諍為和合故是名不犯十一語須決定菩薩如是見如是語菩薩不應樂於涅槃不應背涅槃不應畏煩惱不應滅煩惱何以故菩薩三阿僧祗往來生死故如是語者犯重垢罪何以故如菩薩樂於涅槃畏於煩惱比於聲聞千萬倍不可為喻何以故聲聞之人順自為己菩薩常為一切衆生故菩薩雖處有漏於滅煩惱而得自在過於羅漢處無漏者上十二自護身口若菩薩起身口業應自防護莫使他人慢墮罪若故不自護使他墮罪者犯重垢罪若不作意自護放散所作生他罪者犯輕垢罪不犯者若外道若隨出家如法所作若值多瞋惡人是名不犯十三隨權行杖菩薩見前衆生須加杖痛然後有利自護不治者犯輕垢罪不犯者若利少苦多是名不犯十四戒報讐菩薩以罵報罵以瞋報瞋以打報打以牽挽者犯重垢罪十五鬬即懺悔菩薩與他共鬬及共相嫌惡心瞋心若憍慢心不如法悔者犯重垢罪若懶惰放逸一不求悔者犯輕垢罪不犯者若為調伏滅惡增善若彼外道要作非法若彼喜鬬怨更增上若知彼人終不受悔若向彼悔起彼重慢是名不犯十六允受彼悔菩薩共他嫌恨他如法求悔菩薩惡心不受為惱他者犯重垢罪若無瞋心不受他悔犯輕垢罪不犯者若為調伏滅惡增善若惡非法是名不犯十七修忍不瞋菩薩瞋他受者瞋事不休息者犯重垢罪不犯者若常制之瞋心猶起是名不犯十八權畜徒衆菩薩受畜徒衆但為給事及與衣食是名不犯十九勤護齊戒菩薩起懶惰意樂於非時食貪著睡眠若倚若臥者犯重垢罪不犯者若病若犯無巧便若道路行極若常制之是名不犯二十不說世樂菩薩以染著心談說世樂事者犯重垢罪若忘誤說犯輕垢罪不犯者若有人問正心少說若談異聞若談論法事是名不犯二十一為法謙求菩薩樂欲坐禪知他有法以瞋慢心不能下意從他求受法者犯重垢罪若懶惰心不求受者犯輕垢罪不犯者若病若無巧便若知彼人不順法教若自有巧便多聞攝其心者是名不犯二十二勤觀對治菩薩起欲界欲不觀對治疾除滅者犯重垢罪不犯者常勤欲滅欲心猶起是名不犯如欲餘蓋亦爾二十三不著禪定若菩薩貪味於禪著功德者犯重垢罪不犯者常欲捨著著心猶起是名不犯二十四不輕二乘菩薩如是見如是語菩薩不應聽受誦學聲聞法藏菩薩之人用學是為作是語者犯重垢罪何以故菩薩於外道經書尚應當學何況佛語不犯者為欲調伏聲聞入大乘故是名不犯二十五不學二乘菩薩法藏一向捨置貪學讀誦聲聞經者犯輕垢罪二十六不習外典菩薩有佛經藏不能勤學乃更勤學外道俗典犯重垢罪不犯者若極根利一聞能持同佛語者取用助化以彼妙辭助明佛法於佛法於佛經義意不傾動是名不犯菩薩欲學外道經典應如上學若於中受樂生著心不如服苦藥者犯重垢罪二十七不謗深義菩薩若聞菩薩法藏甚深祕密第一實義不思議事純是諸佛菩薩境界於此義中生誣謗心言此義無益非佛所說不能佑利一切衆生作是謗者犯重垢罪不犯者若思惟定義若方便說菩薩聞於甚深義時若不生信以不諂心為生信故應作是念我不應爾我如盲者無有慧眼佛口所說我云何謗如是菩薩自責由癡是佛境界非我所及若能如是是為正行若意不解不生誹謗是名不犯二十八不毀他人菩薩為飲食故以瞋惡心自讚毀他犯重垢罪不犯者若為伏外道若伏憍慢增長佛法若為不信者信已信者增是名不犯二十九隨宜聽法菩薩有說法家若說毗尼處大法會處瞋嫉慢心不往聽者犯重垢罪若懶惰心不往聽者犯輕垢罪不犯者若自不聞又無人喚若病若無巧便若知彼說法不順義理若知說者於己有難若知彼說更無異聞若得總持自多聞若勤修善根是名不犯三十任倩共作菩薩有人來倩我有事緣當為營辦所謂共去共還營佐衆事有所營了守護財物和合鬬訟經辦飲食修福德業若一二事不為作者犯重垢罪若懶惰不為犯輕垢罪不犯者若病若無巧便若自有事若彼能辦若不相倩若無益事若為調伏滅惡增善若無他倩若報他作勤修善根若自暗鈍恐失業次若有僧限護多人意是名不犯三十一慈心瞻病若菩薩見病衆生以惡心瞋心不贍養者犯重垢罪若懶惰不養犯輕垢罪不犯者若自有病若無巧便若倩他看若彼病者自有眷屬若知病者能自經給若久病若人猶能起止若欲勤修增上善根若極自暗鈍恐失黨次若失看病如病餘貧窮苦惱亦復如是是名不犯三十二隨宜教示菩薩見前衆生應有利宜無有方便而能發起菩薩惡心瞋心不教示者犯重垢罪若懶惰不教犯輕垢罪不犯者若無方便若使他教若彼自有善知識若為調伏滅惡增善若示彼方便更瞋反戾無有敬愛心強得自用是名不犯三十三念報施恩菩薩衆生給施所須應念其恩若惡心瞋心不念恩報恩者犯重垢罪若懶惰不報犯輕垢罪不犯者若自無力若無巧便若為調伏滅惡增善若欲念報施主不受是名不犯三十四慰喻亡失菩薩見人親里死亡若亡失財物種種憂苦若惡心瞋心不往慰喻者犯重垢罪不犯者如前倩菩薩中說三十五索物須與菩薩有人從索飲食所須不與者犯重垢罪不犯者若自無物若索不淨物若為調伏滅惡增善若王所制若護僧限是名不犯三十六誨給弟子菩薩弟子應隨時教誨若弟子有乏應從篤信人邊勸索供給若惡心瞋心不教誨不供給者犯重垢罪若懶惰心不教供給犯輕垢罪不犯者若為調伏滅惡增善若護僧限若病若無巧便若倩人教若弟子福德能致供養若弟子本是外道無好善心是名不犯三十七慈心護他菩薩以瞋心惡心不護他意者犯重垢罪若懶惰放逸不護他意犯輕垢罪不犯者若非法事若病若有僧限護多人意若外道若為調伏滅惡增善是名不犯三十八讚揚他善菩薩見他德行不能稱讚以惡心瞋心隱藏他善者犯重垢罪若懶惰放逸不稱他善者犯輕垢罪不犯者若知彼人不樂讚歎若病若無巧便若為調伏滅惡增善若護僧限若知聞讚更生驕慢若彼無實德若言似善實無善義若為外道若讚時未到是名不犯三十九如法治衆菩薩為多人頭首見諸眷屬不如法事應呵應擯若瞋心惡心捨不呵治者犯重垢罪若懶惰放逸不教呵者犯輕垢罪不犯者若知彼人惡性健瞋不受教呵若待時教呵若畏破僧若知彼質直宿習少羞喜數犯悔是名不犯四十隨機應現菩薩有神通變化應為衆生隨時變現或方便恐怖令生信心若畏信施不現變化者犯輕垢罪不犯者若人深著惡法邪見若是外道若罵賢聖若著邪見若狂苦痛是名不犯持戒獲益分第四菩薩戒聚成就具足無量妙果以是戒聚因緣力故具足尸波羅蜜受者雖未得阿耨多羅三藐三菩提以得具足五事功德一者常為諸佛菩薩所護念二者受常淨樂三者臨終無悔四者捨身得生諸佛世界五者莊嚴阿耨多羅三藐三菩提菩薩受持菩薩戒者不自為身唯為利他及莊嚴阿耨多羅三藐三菩提是菩薩戒悉是過去未來現在恆河沙等諸佛菩薩之所成就乃至十方諸佛菩薩亦復如是菩薩弘慈普恩及六道衆生三塗八難苦惱十方無不蒙益功德不可計福慧如虗空略說其要竟歡喜禮奉行普發菩提心福慧命得成慈悲男女長喜捨次第生一切成佛道永盡無有餘十方同其願巍巍無極尊無師自受分第五欲為菩薩優婆塞放逸五戒威儀者若無師從受處爾時受者若無師應向佛像前自誓受菩薩優婆塞威儀應如是作禮偏袒右肩胡跪合掌應如是言我某甲白十方佛及住大地諸菩薩等今於諸佛前欲受一切戒學一切菩薩戒優婆塞五戒威儀攝一切善法菩薩戒為利衆生戒是戒過去諸菩薩已學未來諸菩薩當學現在諸菩薩今學我亦如是學第二第三亦如是說竟其餘諸事應如前廣說具五遠離分第六離欲優婆塞具行五戒遠離身四惡一者殺二者盜三者淫四者飲酒遠離口五惡一者妄語二者惡口三者兩舌四者無義語五者綺語遠離五邪命一者賣肉二者沽酒三者賣毒四者賣衆生五者賣兵仗遠離嚴飾五事一者香二者華三者瓔珞四者香油塗身五者香薰衣遠離放逸五事一者歌二者舞三者作樂四者嚴飾樂器五者不往觀聽此五戒隨力所堪若能終身具持五為上若不能隨持多少年月日夜乃至須臾亦得暫持不但如持全念佛臨涅槃敕四大聲聞及六應真吾滅度後如是真法之中若出家二衆淨持禁戒及在學二衆隨力多少心次近持上戒者若造房舍牀蓐衣服飲食一切順道資生之具施四方僧及諸賢聖汝等盡應受請若不受者得罪以此觀之賢聖不遠感至則應若作功德先當竭力受持上戒然後至心請四方僧及諸賢聖若不能終身至一日一夕者善若不能者設供之時便受罷便止此諸賢聖皆來受請如法懺悔分第七若有所犯即如法悔此一切菩薩犯當突吉羅罪當向大小乘人能解說能受悔者如法懺悔若菩薩以增上煩惱犯波羅彝處法者失律儀戒應當更受若中煩惱犯波羅彝處法者當向三人若過三人長跪合掌作突吉羅懺悔所犯罪多作是說言大德憶念我某甲捨菩薩毗尼如所稱事犯突吉羅罪餘如比邱突吉羅罪懺悔法說若下煩惱犯波羅彝處法及餘所犯向一人懺此下有禮三寶並發心立願禮四方佛儀則及受繩牀法受錫杖法結座移行受食等法以係戒外餘文未録閲藏自悉附辨五則一辨稟戒按諸律部戒分七衆名位各別在家出家倫次不同其出家五衆俱可作在家稟戒之師其義有二一謂發心定期恐大僧難遇有失利益若有比邱當從求受若無比邱即於比邱尼前求受若二部大僧俱無即於式叉摩那尼受若式叉亦無即於沙彌前受若上四衆無者即於沙彌尼前受此則約應期開受二謂雖有比邱而不持戒可從持戒比邱尼所受或雖有比邱尼儻持戒亦未潔乃至從持戒沙彌尼所受此則開聽從人若有比邱而復持戒別從餘衆乞受戒者此則不開須依大僧所受為正五戒如此八關齊戒亦然乃至菩薩大戒在出家五衆菩薩受例此可推又菩薩戒有二種一梵網二本部當隨宜受一二辨稱禮夫佛門之有七衆如儒職之有九品雖同一臣屬而尊卑不失其次此乃住世大禮不可紊亂也邇來緇素名位不別冒認法屬或曾歸依起名或曾稟受戒品謬與出家同派遂以師兄弟稱至在下者呼之為師姪輩詎止僧俗違制抑且反索禮敬甚至罵辱等事按地藏十輪經云於歸我法而出家者若是法器若非法器剃除鬚髮被服袈裟諸弟子所不生恭敬惱亂呵罵或加楚撻或閉牢獄乃至斷命此於三世諸佛犯諸大罪斷滅善根乃至決定當生無間城獄究斯源委皆由為師者多存情愛苟就利養以違法致居家者不聆嚴訓憍矜富貴以慢僧嗚呼魔風日作法道陵夷冀諸緇素欽遵佛制恪理僧倫三辨衣制按律所制在家男女稟受優婆塞優婆夷戒者準成實論聽蓄一禮懺衣名曰鉢吒梵語鉢吒唐言縵條縵謂無文即一幅㲲也唯異俗服染作壞色不同僧衣割截縫成以表田相縵條而言禮懺衣者但令禮敬三寶旋繞殿塔讀誦經典熏修懺法一一許著善業一畢應隨即去之若家庭飲食市里遊行一切時中皆不許著邇來居家受戒者多形是俗侶濫著田衣出入城市往來伽藍壞僧伽之表相違法王之制儀如斯披著豈罪受者謬行仍歸師家若遵梵網明條在家二衆菩薩全無三衣鉢杖之說若依優婆塞戒經但云儲畜僧伽黎衣鉢錫杖亦無言其披者殆預備施僧耳施已即更造新儲畜冀諸仁者見家在善信欲受戒者先當將此衣制而為諄誨仰遵佛敕光樹正法四辨懺誦按律中在家二衆受戒或有毀犯者逢月十四二十九初夜當往僧中懺悔黑白半月每月三十名黑月十五日名白月正布薩日梵語布薩此翻說戒應誦戒經其小乘在自舍誦五戒相經及戒消災經其大乘在家二衆所受戒相有殊一是梵網十重四十八輕此則僧俗菩薩七衆同受一是優婆塞戒經六重二十八輕唯攝居家不收出家此世尊應機制止施法由人若受十重四十八輕者半月布薩當詣有菩薩僧界聽誦儻近處無有僧坊本宅佛堂許自誦之若受六重二十八輕者唯在自舍佛像前跪誦縱是近有僧坊不得聽誦以戒相不同故兩經戒相已具本集茲不録五辨謬稱按大小二乘經律論藏在家受戒唯優婆塞優婆夷二衆未見童女即未嫁閨女受戒即得稱式叉摩那者今時傳戒訛誤頗多至於式叉摩那一種尤為訛誤之甚茲不可以不辨梵語式叉摩那此云學戒女是出家沙彌尼受此戒可學大比邱尼戒也按佛世諸尼輒度人出家受具戒以不知戒相故造作非法佛言應與二歲學戒羯磨二歲即兩年也令先習學已然後受具一切大尼戒皆應學之除自手取食授食與他故諸經律論懺中出家五衆次第式叉尼居沙彌之上以其具學大尼戒故所謂比邱比邱尼式叉摩那沙彌沙彌尼是也至衆集會時佛以儀式不便雖大尼亦列沙彌之後式叉尼列大尼後故僧祇律云在比邱尼下沙彌尼上坐自有明中葉封閉戒壇尸羅軌則幾不可聞不唯學戒之法久廢而式叉名義亦罔聞知至謂未剃髮閨女求受五戒者為式叉摩那以訛傳訛至今不改按大智度論佛在世時有一長者婦不覺懷妊出家受具足戒其後身大轉現諸長者譏嫌比邱尼因此制有二年學戒受六法然後受具足戒文據此則婦亦可作式叉摩那不專指童女言矣又論云式叉摩那有二種一者十八歲童女受六法二者夫家十歲得受六法文此則指童女言夫家十歲解者謂或因母亡或母家貧苦不能護養即將小女歸於夫家已養十年情竇漸開又在夫家難無欲事又十八童女雖未嫁而年已長故須預防也然不必論是女是婦其為已出家者則決定無疑至其位收在沙彌之上比邱尼之下者以其出家志求具足不過因妨嫌之意暫遲二年以為學戒之地不比沙彌等尚無具足志也又此式叉尼不同優婆夷所受戒相故另有式叉尼學戒法等茲不具述據律所制式叉摩那的係出家尼非在家閨女戒也按華嚴經善財童子詣安住王都大城欲參不動優婆夷不知處所無量人衆咸告之言不動優婆夷身是童女在其家內父母守護云云據此可見童女亦稱優婆夷更一明證矣
