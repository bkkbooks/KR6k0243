body:
  text: 明蕅益沙門智旭集清源洪沙門儀潤優婆塞陳熙願增訂四分律藏出龍藏籍字函節録三十二卷姚秦三藏佛陀耶舍共竺佛念譯陳增爾時世尊遊波羅奈國時波羅奈國有族姓子名耶輸伽父母止有此一子愍念瞻視不去目前父母與設三時殿春夏冬使其子常遊戲其中五欲娛樂時童子於五欲中極自娛樂已疲極眠睡眠睡覺已即觀第一殿又見諸妓人所執樂器縱橫狼藉更相荷枕頭髮髼亂却臥鼾睡齘齒䆿語見已恐怖身毛為豎即生厭離意不欲與會此為苦哉有何可貪即捨所居殿更詣中殿到彼觀其殿舍并妓人如前無異倍生恐怖身毛為豎即生厭離不欲與會此為苦哉有何可貪即捨去詣第三殿所見亦復如上倍生恐怖身毛為豎生厭離心不欲與會亦復如上即還出殿詣尸佉城門時尸佉門神遙見童子來見已便生念此童子來必欲見如來更無餘道我當開門使去即與開門時童子出尸佉城門已詣婆羅河側到已於河岸上解金屐渡婆羅河詣仙人鹿苑所爾時世尊在露處經行遙見童子來即敷座而坐諸佛常法圓光遍照耶輸伽童子遙見如來顏貌端正生喜悅心前至世尊所到已白言我今苦厄無所歸趣願救濟我佛告童子來此處無為此處無厄此處安隱欲求永寂無為者欲盡無愛滅盡涅槃也爾時耶輸伽童子禮世尊已在一面坐世尊漸與說法勸令發歡喜心所謂法者布施持戒生天之法呵欲不淨讚歎出離為樂即於座上諸塵垢盡得法眼淨見法得法成就諸法自身得果證前白佛言我欲於如來所淨修梵行佛言比邱來於我法中快自娛樂修梵行盡苦原時耶輸伽即受具足戒第一殿舍宮人妓女盡皆睡覺已求覓耶輸伽不見往至中殿求之亦不見復至第三殿舍求索亦復不見時諸宮人妓女往至其母所白言大家今者耶輸伽不知所在時母即速疾至其父所告言知不今不知兒為何所在時父在彼中殿前沐浴梳頭速疾檢髮即敕左右人言於波羅奈國斷諸巷道目出尸佉城門至婆羅河所見子金屐在河側便作是念我子必當渡河即尋迹渡河往仙人鹿苑中爾時如來遙見耶輸伽父來即以神力使耶輸伽父見佛不見其子至佛所白言大沙門頗見我子耶輸伽不佛言汝今且坐或當見汝子耶輸伽父念言此大沙門甚奇甚特乃見慰勞如是也時耶輸伽父禮佛足已在一面坐世尊漸與說法令發歡喜心呵欲不淨讚歎出要為樂即於座上諸塵垢盡得法眼淨見法得法成辦諸法自審得果證已前白佛言我今歸依佛歸依法歸依僧唯願世尊聽為優婆塞自今已去盡形壽不殺生乃至不飲酒是為最初優婆塞三自歸此處已有不殺生飲酒之文則五戒亦當原始於此耶輸伽父為首爾時世尊與耶輸伽父說法時耶輸伽身漏盡意解得無礙智解脫爾時世間有七羅漢弟子有六時已度阿若憍陳如等五比邱與耶輸伽為六佛為七爾時世尊即攝神足使耶輸伽父見子去佛不遠坐即到耶輸伽所語言汝母在後失汝不知所在極懷愁憂乃欲自害汝可往瞻省勿令自害時耶輸伽瞻視世尊顏時世尊告耶輸伽父言云何族姓子學智學道諸塵垢盡得法眼淨作如是觀已有漏心得解脫云何長者汝已捨欲還復能習欲不耶對曰不也如是耶輸伽族姓子已學智學道諸塵垢盡得法眼淨彼作如是觀已有漏心得解脫終不復習欲如本在俗時也今耶輸伽族姓子善獲大利學智學道無漏心解脫諸塵垢盡得法眼淨作是觀已有漏心解脫唯願世尊今受我請及耶輸伽并侍比邱爾時世尊默然受請然耶輸伽不肯受別請世尊未聽我受別請佛言自今已去聽受別請請有二種有僧次請有別請時耶輸伽父知如來默然受請即從座起禮佛足而去語耶輸伽母及其本二言汝今知不耶輸伽身在大沙門所修梵行我今日請大沙門及耶輸伽侍從後來汝今知時可供辦所須耶須伽母及其本二即辦具種種所須飲食已往白時到爾時世尊到時著衣時鉢耶輸伽侍從通已二人往其父舍到已就座而坐時耶輸伽母及本二奉世尊種種所須飲食食訖攝鉢更取一小座於如來前坐爾時世尊漸次與說微妙法勸令發歡喜心即於座上諸塵垢盡得法眼淨見法得法成就諸法即白佛言自今已去歸依佛法僧聽為優婆夷我自今已去盡形壽不殺生乃至不飲酒是謂最初受三自歸優婆夷耶輸伽母及其本二為首時世尊與耶輸伽母及其本二說法已即從座起而去四分律藏節録終附優婆塞受三歸五戒法古吳比邱智旭彚釋初受三歸法本應自說如或不能師應教授我某甲盡形壽歸依佛歸依法歸依僧三說我某甲盡形壽歸依佛竟歸依法竟歸依僧竟三說薩婆多論云以三寶為所歸欲令救護不得侵淩故也歸依佛者歸於法身謂一切智無學功德五分所成歸依法者歸於自他盡處謂斷欲無欲滅諦涅槃歸依僧者歸於第一義僧謂良祐福田聲聞學無學功德也投心正教翻破邪歸故有結云從今以往稱佛為師更不歸依天魔外道等此則反邪歸正之初門尚未受行戒法名為但三歸優婆塞然既歸依三寶必須斷惡修善豈容淫殺盜妄一任舊習者也按此乃翻前邪歸而歸正故名翻邪三歸律無受法諸論具出今准取之又龍畜鬼神不能受五戒者惟得受三歸依及八關戒齊一日夜耳然此三歸即是一切戒之本源五戒八戒十戒皆於說三歸竟之時便得無作戒體比邱菩薩律儀亦緣三寶而發無作故雖初門實通奧義該羅四教收括六即須略明之言四教者謂藏通別圓此之四教各論三歸初藏教者破前邪執歸心三寶即藏教三歸佛在世時樹王得道為佛寶說四諦法為法寶度五比邱等為僧寶佛滅度後範金合土紙素丹青為佛寶黃卷赤牘為法寶剃髮染衣為僧寶由金土等像表示一切智五分功德由黃卷赤牘詮顯滅諦涅槃由剃染緇流修證聲聞功德能表能詮能修者名為住持三寶所表所詮所證者名為勝義三寶事不即理故須雙歸事理二種三寶皆令救護不被邪外所侵淩也二通教者了邪非實體會三寶即通教三歸一切形像同於真空一切經卷文字無非解脫一切緇流即學無學幻化無生無二性故歸事即是歸理理事不二所以不得侵淩也三別教者翻破無量邪惑承事無量三寶即別教三歸蓮華臺藏圓滿報身名佛寶十二部經詮三諦理名法寶三賢十聖自利利他為僧寶歸此三寶則能翻破見思塵沙無明三惑不被界內界外八魔八倒所侵淩也四圓教者觀邪惑即妙境悟三寶本一體即圓教三歸現前一念能覺之心名佛寶現前一念所覺之境名法寶心境本來無二名僧寶究竟悟此一念三寶者名為佛種種詮此一念三寶者名為法秉佛所說之法研此一念三寶者名為僧全理成事全事即理舉一即三言三即一歸此一體事理三寶則能圓翻三惑圓攝界內界外魔倒而作佛事不被侵淩也略明四教竟言六即者四教皆得義論六即前三是權姑置不論今但約圓謂一切衆生惑業苦三體是不可思議三德祕藏苦即法身五陰色心本如來藏妙真如性如冰即水故惑即般若見思無明本無內外中間諸相如勞即目故業即解脫有漏縛著本無能縛及所縛者如拳即手故法身是法寶般若是佛寶解脫是僧寶蠢動含靈無不具足惑業苦三則是無不具足三寶德相但由迷隔日用不知雖復不知終不能越此理之外故為理即三歸一切衆生具足三寶體性在迷不覺亦不相離理即三歸若聞名生解知此果地三德全證衆生三障理體實無生滅垢淨增減則為名字三歸創聞妙理畢志棲心名字三歸以此圓解而修圓觀圓伏五住則為觀行三歸念念體會三德祕藏觀行三歸由此圓觀而淨六根則為相似三歸法性理現六根清淨相似三歸由此圓觀而發無漏三因開顯則為分證三歸破無明顯三德分證三歸由此圓觀而圓三德稱本理性無缺無餘則為究竟三歸也圓滿菩提覺法自性始本不二理智一如究竟三歸是以法無深淺深淺在人莫離初步而談千里也下諸戒品皆含此意三歸既有四教六即當知五戒八戒等無不例然可准思之問但三歸法尚未受戒名為但三歸可止歸一二否又此法為復全收六道為復止許人倫於人倫中亦有不應受者否若受後有犯云何懺悔答佛初成道為龍王及二商人說法教令盡未來比邱僧即唱三歸今若止歸一二不名歸也三歸之法惟地獄劇苦不能秉受設或知歸便應離苦其餘五道總無遮難若更歸依邪魔外道名失三歸後能返邪亦所聽許非如受具復入外道為重難也問受但三歸得無作戒否倘或殺盜淫妄為破戒否答受五戒八戒十戒者說三歸時即云盡壽為優婆塞一日一夜為淨行優婆塞隨如來出家等故發無作也今受但三歸者本不受戒自無所發既未發戒亦無破戒之罪然有世間性罪也次受五戒法律中受五戒者皆是向師自說非從師受亦無問遮難事優婆塞戒經自是大乘一途宣公雖引用之今似不宜竄入蓋重難輕遮惟出家戒須問以僧寶體尊故加慎重若五戒便先致問則出家受具何必又問耶設欲問者但問五逆及自破淨戒破他淨戒七事可耳至於一分乃至滿分自可量力受持若夫臨時開導貴在隨機法無一定不應預擬成言俾授者僅事讀文聽者了不解旨也一戒為一分二戒為少分三戒為半分四戒為多分五戒為滿分應隨所受稱之不應混濫戒經云若受三歸持二戒已若破一戒是名無分我某甲歸依佛歸依法歸依僧盡形壽為一滿分優婆塞如來至真等正覺是我世尊三說我某甲歸依佛竟歸依法竟歸依僧竟盡形壽為一滿分優婆塞如來至真等正覺是我世尊三說若善女人即稱優婆夷如諸佛盡壽不殺生我某甲亦盡壽不殺生如諸佛盡壽不偷盜我某甲亦盡壽不偷盜如諸佛盡壽不淫欲我某甲亦盡壽不邪淫如諸佛盡壽不妄語我某甲亦盡壽不妄語如諸佛盡壽不飲酒我某甲亦盡壽不飲酒隨受幾戒則語幾戒亦不應混濫也以此受戒功德回向無上菩提四恩總報三有齊資普與衆生同生淨土薩婆多論云優婆塞者秦言離惡修善亦名親近又云受三歸竟已得五戒所以說五戒名者欲使前人識五戒名字故又云若破重戒更無勝進後還捨戒後更受者更不得戒也未破則可捨已破則無可捨捨則可更受破則不可更受所以名為邊罪也永棄佛海邊外名為邊罪既不得律儀戒則禪戒無漏戒一切不得然則受戒者可不深心護持根本重罪也哉優婆塞戒經云夫禁戒者悉於一切可殺不可殺中得一切可殺不可殺者無量無邊戒之果報亦復如是無量無邊若有說言離五戒已度生死者無有是處是菩提道初根本地名之為戒如是戒者亦名初地亦名導地亦名平地亦名等地亦名慈地亦名悲地亦名佛跡亦名一切功德根本亦名福田以是因緣智者應當受持不毀大般涅槃經云戒是一切善法梯鄧亦是一切善法根本如地悉是一切樹木所生之本是諸善根之最導首如彼商主導諸商人戒是一切善法勝𣄢如天帝釋所立勝𣄢戒能永斷一切惡業及三惡道能療惡病猶如藥樹戒是生死險道資糧戒是摧結惡賊鎧仗戒是滅結毒蛇良呪戒是度惡業行橋梁問薩婆多論云若破重戒更無勝進然設在家已受五戒或受一日一夜八關戒齊煩惱現前犯不可悔罪後求出家誠心懺悔還許剃度并受具否答薩婆多論自是通途軌式凡受戒者皆應專精護持設有毀犯便從墮落豈能更有勝進至於懺悔則無罪不滅乃諸佛格外深慈必須依經如法行道極其誠懇方通一線不可視作等閒也此三歸五戒約受者自說而略録之若在師前受金陵華山杭州昭慶皆有授居家二衆三歸正範及五戒正範流通已久茲不録又據正範若在長老比邱所受依範全用若是比邱未任方丈或二三同修或自獨處或比邱尼式叉尼沙彌沙彌尼偶有善信發心求受三歸或求受五戒者只須從開導與之受歸受戒及發願而已餘儀不必全用或依此略録亦可既三歸五戒當發慈心愍念衆生及厭世無樂故進之以厭離經三歸五戒慈心厭離功德經出龍藏善字函陳增失譯人名今附東晉録聞如是一時佛在舍衛國祇樹給孤獨園佛為阿那邠邸長者說過去久遠有梵志名毗羅摩饒財多寶若布施時用八萬四千金鉢盛滿碎銀八萬四千銀鉢盛滿碎金復以八萬四千金銀澡罐復以八萬四千牛皆以金銀覆角復以八萬四千玉女莊嚴具足復以八萬四千臥具衆綵自覆復以八萬四千衣裳復以八萬四千象馬皆以金銀鞍勒復以八萬四千房舍布施復於四城門中布施隨其所欲皆悉與之復以一房舍施招提僧如上施福不如受三自歸所以然者受三歸者施一切衆生無畏是故歸佛法僧其福不可計量也如上布施及受三歸福復不如受五戒福受五戒者功德滿具其福勝也如上布施及受三歸五戒福復不如彈指頃慈念衆生福也如上布施及受三歸五戒慈念衆生福復不如起一切世間不可樂想福所以然者起一切世間不可樂想福能令行者滅生死苦終成佛道故其福最勝也爾時長者聞佛所說歡喜奉行三歸五戒慈心厭離功德經終按灌頂部即以護戒神王名為呪律藏所攝也灌頂三歸五戒帶佩護身呪經出龍藏恭字函大灌頂神呪部陳增東晉西域三藏帛尸黎密多羅譯聞如是一時佛在舍衛國祇樹給孤獨園時與千二百五十比邱菩薩萬人天龍八部悉來在會咸然一心叉手聽法於是異道有鹿頭梵志來到佛所稽首作禮胡跪合掌白佛言久聞瞿曇名聲遠振今欲捨置異學受三自歸并五戒法佛言善哉善哉梵志汝能捨置餘道歸命我者當自悔過生死之罪其功無量不可稱計梵志言諾受教即淨身口意復作是念唯願世尊施我法戒終身奉行不敢毀缺佛言是為如來至真等正覺三世諸佛說是戒法佛言梵志諦聽諦受心持念之又言梵志盡形壽歸命諸佛無上尊盡形壽歸命法離欲尊盡形壽歸命僧衆中尊佛言梵志以三自歸竟是為真正弟子不為邪惡所干嬈也佛告梵志汝能一心受三自歸已我當為汝及十方人敕天帝釋所遣諸鬼神以護男子女人等輩受三歸者梵志因問佛言何等是也願欲聞之開化十方諸受歸者佛言如是灌頂善神今當為汝略說三十六神四天上遣神名彌栗頭不羅婆此言善光主疾病四天上遣神名彌栗頭婆呵娑此言善明主頭痛四天上遣神名彌栗頭婆邏波此言善力主寒熱四天上遣神名彌栗頭抗陀羅此言善月主腹滿四天上遣神名彌栗頭陀利奢此言善見主癰腫四天上遣神名彌栗頭阿婁呵此言善供主顛狂四天上遣神名彌栗頭伽婆帝此言善捨主愚癡四天上遣神名彌栗頭悉坻哆此言善寂主瞋恚四天上遣神名彌栗頭菩提薩此言善覺主淫欲四天上遣神名彌栗頭提波羅此言善天主邪鬼四天上遣神名彌栗頭呵娑帝此言善住主傷亡四天上遣神名彌栗頭不若羅此言善福主冢墓四天上遣神名彌栗頭苾闍伽此言善術主四方字略殘缺疑是善術四天上遣神名彌栗頭伽𨽻娑此言善帝主怨家四天上遣神名彌栗頭羅闍遮此言善主主偷盜四天上遣神名彌栗頭修乾陀此言善香主債主四天上遣神名彌栗頭檀那波此言善施主劫賊四天上遣神名彌栗頭支多那此言善意主疫毒四天上遣神名彌栗頭羅婆那此言善吉主五瘟四天上遣神名彌栗頭鉢婆䭾此言善山主蜚尸四天上遣神名彌栗頭三摩䭾此言善調主注連四天上遣神名彌栗頭戾禘䭾此言善備主注復四天上遣神名彌栗頭波利陀此言善敬主相引四天上遣神名彌栗頭波利那此言善淨主惡黨四天上遣神名彌栗頭虔伽地此言善品主蠱毒四天上遣神名彌栗頭毗梨駝此言善結主恐怖四天上遣神名彌栗頭支陀那此言善壽主厄難四天上遣神名彌栗頭伽林摩此言善逝主産乳四天上遣神名彌栗頭阿留伽此言善願主縣官四天上遣神名彌栗頭闍利陀此言善固主口舌四天上遣神名彌栗頭阿伽䭾此言善照主憂惱四天上遣神名彌栗頭阿訶婆此言善生主不安四天上遣神名彌栗頭娑𪱳邏此言善至主百怪四天上遣神名彌栗頭波利那此言善藏主嫉妬四天上遣神名彌栗頭固陀那此言善音主呪咀四天上遣神名彌栗頭韋䭾羅此言善妙主厭禱佛語梵志是為三十六部神王此諸善神凡有萬億恆沙鬼神以為眷屬陰相番代以護男子女人等輩受三歸者當書神王名字帶在身上行來出入無所畏也辟除邪惡消滅不善梵志言諾唯唯天中天梵志又白佛言世尊以賜三自歸法天帝遣善神三十六大王護助我身已𫎇世尊哀愍救度今更頂禮請受法戒佛言善哉梵志汝當淨身口意懇惻至心敬受法戒佛言十方三世如來至尊等正覺皆由三歸五戒得之佛言梵志盡形壽不殺生不教他殺是戒能持不若能持者有五神王隨逐護汝身不令邪神惡鬼之所得便梵志盡形壽不盜他人財寶不教他行盜是戒能持不若能持者有五善神王隨逐護汝身梵志盡形壽不邪淫是戒能持不若能持者有五神王隨逐護汝身衆魔皆不得便梵志盡形壽不妄言綺語兩舌鬬亂是戒能持不若能持者有五神王隨逐護汝身梵志盡形壽不飲穀酒甘蔗酒葡萄酒能放逸酒如是酒皆不得飲是戒能持不若能持者有五善神隨逐護汝身佛語梵志是為三歸五戒法也汝善持之勿有毀犯說已梵志因白佛言世尊世尊說言若持五戒者有二十五善神營衛護人身在人左右守於宮宅門戶之上使萬事吉祥唯願世尊為我說之佛言梵志我今略演敕天帝釋使四天王遣諸善神營護汝身如是章句善神名字二十五王其號如是神名察芻毗愈他尼主護某身辟邪除惡神名輸名利輸陀尼主護某身六情悉令完具神名毗婁遮那波主護某腹內五藏平調神名阿陀龍摩坻主護某血脈悉令通暢神名婆羅桓尼和婆主護某指無所毀傷神名坻摩阿毗婆䭾主護某出入行來安寧神名阿修輸婆羅陀主護某所噉飲食香甘神名婆羅摩亶雄雌主護某夢安覺歡悅神名波羅門地哆主護某不為蠱毒所中神名那摩吁多耶舍主護某不為霧露惡所害神名佛䭾仙陀婁哆主護某鬬諍口舌不行神名闍耶藪多婆主護某不為溫瘧惡鬼所持神名涅坻醯䭾哆耶主護某不為縣官所得神名阿邏多賴都耶主護某舍宅四方逐凶殃神名波羅那佛曇主護某平定舍宅八神神名阿提梵者珊耶主護某不為冢基鬼所嬈神名因臺羅因臺羅主護某門戶辟除邪惡神名阿伽嵐施婆多主護某不為外鬼神所害神名佛曇彌摩多哆主護某不為災火所延神名多賴叉三密陀主護某不為偷盜所侵神名阿摩羅斯兜嘻主護某若入山林不為虎狼所害神名那羅門闍兜帝主護某不為傷亡所嬈神名薩尼乾那波主護某除諸鳥鳴狐鳴神名荼鬬毗舍羅主護某除大鼠變怪神名伽摩毗那闍尼佉主護某不為凶注所牽佛告梵志言若男子女人帶佩此二十五灌頂章句善神名者若入軍陳鬬諍之時刀不傷身箭射不入鬼神羅剎終不嬈近若到蠱道家亦不能害若行來出入有小魔鬼亦不得近帶佩此神王名者晝夜無惡夢縣官盜賊水火災怪怨家陰謀口舌鬬亂自然歡喜兩作和解俱生慈心惡意悉滅妖魅魍魎邪忤薜荔外道符呪厭禱之者樹木精魅百蟲精魅鳥獸精魅溪谷精魅門中鬼神戶中鬼神井竈鬼神汙池鬼神廁溷中鬼一切鬼神皆不得留住某甲身中若男子女人帶此三歸五戒善神名字者若入山林溪谷曠路抄賊自然不現師子虎狼熊罷蛇蚖悉自縮藏不害人也佛告梵志昔迦羅奈大國有婆羅門子名曰執持富貴大姓不奉三寶事九十五種之道以求福祐久久之後聞其國中有賢善長者盡奉佛法聖僧化導皆得富貴長壽安隱又能度脫生老病死受法無窮今世後世不入三惡道中執持長者作是念言不如捨置餘道奉敬三寶即便詣佛以頭面著地為佛作禮長跪白佛言世尊我本愚癡無所識知久聞三寶不能奉事我於今日始得信解佛法大慈普濟天下我今欲捨置餘道歸命於佛惟願天尊哀愍我等得受法戒為清信士佛言汝善思量之也然人能止惡為善者何憂不得安隱富貴壽命延長解脫衆難者乎執持白佛言今我以所事非真故歸命於佛耳當哀愍我故去濁穢之行受佛清淨決言佛語執持汝審能爾者可禮敬三寶執持長者即便胡跪合掌佛於是與受三歸已歸三寶竟當有三十六善神王隨逐護汝身佛告執持言善男子汝能遠惡求善知識世之希有我當更授汝五戒之法佛言第一不殺第二不盜第三不邪淫第四不兩舌惡口妄言綺語第五不飲酒長者執持已受三歸及五戒竟佛語長者汝能持是歸戒遊行之處可無所畏戒神二十五歸神有三十六常隨護汝外諸惡鬼無敢當者長者從受歸佛戒竟佛為說法歡喜信解禮佛而去於是以後長者執持到他國中見人殺生盜人財物見好色女貪愛戀之見人好惡便論道之見飲酒者便欲追之心意如是無一時定便自念言悔從佛受三歸五戒重誓之法作如是念我當還佛三歸五戒之法即詣佛所而白佛言前受三歸五戒法多所禁制不得復從本意所作今自思維欲罷不能事佛可爾以不何以故佛法尊重非凡類所事當可還法戒不乎佛默然不應言猶未絶口中便有自然鬼神持鐵椎拍長者頭者復有鬼神解脫其衣裳者復有鬼神以鐵鉤就其口中曳取其舌者有淫女鬼以刀探割其陰者又有鬼神煬銅沃其口中者前後左右有諸鬼神競來分裂取其血肉而噉食之長者執持恐怖戰掉無所歸投面如土色又有自然之火焚燒其身求生不得求死不得諸鬼神輩急持長者不令得動佛見如是哀愍念之因問長者汝今當復云何長者口噤不能復言但得舉手自搏而已從佛求哀佛便以威神救度長者諸鬼神王見佛世尊以威神力救度長者各各住立一面長者於是小得蘇息便起叩頭前白佛言我身中有是五賊拏我入三惡道中坐欲作罪違負所受願佛哀我佛言汝自心口所為當咎阿誰長者白佛我從今日改往修來奉受三歸及五戒法持月六齊歲三長齊燒香散華懸雜幡蓋供事三寶從今以去不斯復犯破歸戒法佛言如汝今所言者是為大善汝今眼所見身所更自作自得非天授與佛語長者汝今受是三歸五戒莫復如前受歸戒法也破是歸戒名為再犯若三犯者為五官所得便輔王小臣都録監司五官使者之所得便收神録命皆依本罪是故我說是言令清信士女勸受歸戒歸有三十六鬼神之王隨逐護助戒有二十五神營護左右門戶之上辟除凶惡六天之上天帝所遣歸戒之神凡有億億恆沙之數諸鬼神王番代擁護不令衰耗諸天歡喜皆言善哉當共護之如是持戒若完具者十方現在無量諸佛菩薩羅漢皆共稱歎是清信士女臨命終時佛皆分身而往迎之不使持戒男子女人墮惡道中若戒羸者當益作福德布施持戒忍辱精進一心智慧然燈燒香散雜色華懸繒幡蓋歌詠讚歎恭敬禮拜益持齊戒亦得過度若不能如上修行如是功德復持戒不完向諸邪道求覓福祐三歸五戒億億恆沙諸鬼神王各去離之惡鬼數來嬈近之也因衰致病耗亂其家起諸病痛遂致喪亡財物不聚所向不偶死復還墮地獄之中雖戒具足不持六齊猶華樹無果婦人不産種穀不滋治生無利折耗失本更無衣幘不持齊戒無利如是佛言長者人犯所受破是歸戒凡為天上二百七十神王之所得便更非外魔所得便也此諸鬼神視人善惡若持禁戒不毀犯者開人心意示人善惡人若不善便為作害疏記善惡奏上天王大王執持隨罪輕重盡其壽命如法苦治不令有怨使破戒者甘心受之佛告梵志長者執持舍彼異道於我法中受持歸戒心不安定而復破犯遂為鬼神之所得便受諸痛苦今日悔責求哀懺謝改更修善作諸福德滅諸惡海今皆得道合家大小宗族之中見長者執持罪福報應悉從我受三歸五戒堅持不犯皆得法眼我今於此會中廣說長者宿命因緣明驗罪福亦於後世廣宣流布使得聞知佛語梵志若有清信士清信女若為邪神惡鬼所得便者若橫為縣官所羅盜賊剝奪遇大疾病厄難之日當洗浴身體男子著單衣白夾女當素衣澡潄口齒七日七夜長齊菜食敷好高座懸繒幡蓋香汁灑地燒栴檀香一日七轉讚詠此灌頂大章句經如是妙典至真祕藏消滅一切無量灾變梵志白佛言天中天已為我故及十方衆生說三歸五戒鬼神名竟若男子女人欲受歸戒者當云何授與佛言若人欲受先禮十方佛長跪叉手作如是言我弟子某甲盡形壽受三歸五戒諸佛菩薩真人聖衆哀念我等梵志又問受歸戒法有差別不佛言無差別也若人受者先當列三歸五戒之法然後以神王名字著歸戒下以好素帛書持此神王名字帶持而行行當燒香禮敬十方佛當取月八日七日持齊若欲行來常著身上若著頂上若著𮌎前若惡魔相逢無不除卻若男子女人著此三歸五戒善鬼神王名字之時若入神祠是諸邪神悉皆驚起為其人作禮何以故此人帶持諸佛所說三歸五戒神名字故佛語梵志此歸戒鬼神名字至尊至重諸佛護念汝好宣行之佛說如是阿難從座而起前白佛言演說此法當何名之佛告阿難是經名為灌頂章句歸戒帶佩佛說是經竟四衆人民天龍八部一切鬼神皆大歡喜作禮奉行佛說灌頂三歸五戒帶佩護身呪經終此灌頂部有十二經茲第一也第二七萬二千神王護比邱呪經第三十二萬神王護比邱尼呪經第四百結神王護身呪經第五宮宅神王守鎮左右呪經第六冢墓因緣四方神呪經第七伏魔封印大神呪經第八摩尼羅亶大神呪經第九召五方龍王攝疫毒神呪經第十梵天神䇿經第十一隨願往生十方淨土經第十二拔除過罪生死得度經即藥師經也以上共四種明三歸五戒頓受竟此下共五經明三歸五戒次進之漸受也嗟襪曩法天子受三歸依獲免惡道經出龍藏則字函陳增宋西天中印度三藏傳教大師法天奉詔譯如是我聞一時世尊在舍衛國祇樹林給孤獨園與大苾芻衆俱是時有一天子名嗟襪曩法天報將盡惟餘七日而乃先現五衰之相身無威德垢穢旋生頭上華鬘咸悉萎萃諸身分中臭氣而出兩腋之下悉皆汗流時嗟襪曩法由是之故不樂本座宛轉於地悲哀啼泣而作是言苦哉苦哉曼那吉你池苦哉苦哉洗浴之池苦哉苦哉寶車與粗惡歡喜雜林等如是諸園苑不復更遊戲苦哉苦哉跛里耶多羅迦華永不採摘雜寶柔軟之地永不履踐苦哉苦哉天衆妓女端嚴殊妙常所侍衛今相捨離是時有餘天子見斯事已往帝釋所白言天主彼嗟襪曩法五衰現前命餘七日宛轉在地悲哀啼泣作如是言苦哉苦哉曼那吉你洗浴等池苦哉苦哉寶車及粗惡歡喜雜林等如是諸園苑不復更遊戲苦哉苦哉跛里耶多羅迦華永不採摘雜寶柔軟之地永不履踐苦哉苦哉天衆妓女端嚴殊妙常所侍衛今相捨離天主我見是已心甚傷切故來告白爾時帝釋天主心悲愍故往嗟襪曩所而告之言天子云何而汝賢者宛轉於地悲哀啼泣說諸苦事傷動見者時嗟襪曩法忽聞是語從地而起整服肅容合掌而立白帝釋言天主我今壽命惟餘七日命終之後墮閻浮提王舍大城以宿業故而受豬身天主既受彼身於多年中食噉糞穢我觀此苦是故愁憂爾時帝釋天主聞是語已心甚悲愍告嗟襪曩法天子言賢者汝可誠心歸命三寶應作是言歸依佛兩足尊歸依法離欲尊歸依僧衆中尊時彼嗟襪曩法天子以死怖故畏傍生故白帝釋言憍尸迦我今歸依佛兩足尊歸依法離欲尊歸依僧衆中尊時彼天子受三歸已心不間斷以至命終諸天之法下智有見不能觀上時帝釋天主觀彼天子生於何處為生南閻浮提王舍大城受豬身耶為不受豬身盡彼天眼觀之不見又觀傍生鬼界亦復不見又觀娑訶世界人間亦復不見乃至四大王衆天及忉利天盡彼觀察都不能見爾時帝釋天主既不見已心生疑慮於是帝釋往祇樹林詣世尊所頂禮佛足退坐一面白佛言世尊彼嗟襪曩法天子五衰現前命在七日宛轉在地悲哀啼泣說諸苦事傷動見者我時到彼見此事已而問之言云何賢者悲啼懊惱憔悴若此時嗟襪曩法而告我言我今壽命惟餘七日命終之後墮閻浮提生王舍城而受豬身於多年中以諸糞穢而為食噉我聞此說心極悲愍乃告之言今汝賢者欲脫斯苦當歸命三寶作如是言歸依佛兩足尊歸依法離欲尊歸依僧衆中尊時嗟襪曩法以死怖故畏傍生故而白我言我今歸依佛兩足尊歸依法離欲尊歸依僧衆中尊時嗟襪曩法受三歸竟而後命終世尊我今不知彼嗟襪曩法託生何處爾時世尊以正遍知告帝釋言憍尸迦今嗟襪曩法天子已生覩史多天受五欲樂爾時帝釋天主聞佛語已歡喜踊躍心意快然諸根圓滿即於佛前說伽陀曰若歸依於佛彼不墮惡道棄捨人身已當獲得天身若歸依於法彼不墮惡道棄捨人身已當獲得天身若歸依於僧彼不墮惡道棄捨人身已當獲得天身復說伽陀曰誠心歸命佛彼人當所得若晝若夜中佛心常憶念誠心歸命法彼人當所得若晝若夜中法力常加持誠心歸命僧彼人當所得若晝若夜中僧威常覆護爾時帝釋天主說伽陀已世尊印言如是如是歸命佛法僧定不墮惡道棄捨人身已當獲得天身爾時世尊說伽陀曰若佛陀二字得到於舌上同彼歸命等不虗過一生若達磨二字得到於舌上同彼歸命等不虗過一生若僧伽二字得到於舌上同彼歸命等不虗過一生又說偈言佛法僧名若不知彼人最下故不獲輪回宛轉而久處如迦尸華住虗空佛說是經已諸苾芻衆天帝釋等一切大衆歡喜信受作禮而退嗟襪曩法天子受三歸依獲免惡道經終問受歸戒有頓漸二儀究竟以何為準定答佛世多利根機動便感故可頓受末世澆漓授受宜慎應從漸制所以律制諸授戒正範皆先預設引導之儀使其不失造次之節藉斯勝緣助生正信次則敷座如制座上先供佛像次僧禮座就登以表三寶一座齊彰佛像是佛寶所說歸戒是法寶僧代佛說是僧寶令彼受者三業俱敬佛先僧後事儀當然五百問經云若僧先升法座而後寄佛在上則不可故須如制也次則開導發心令其心意廣大斷惡修善自度度人名上品心得上品歸戒若只願自脫生死全無度人誓願名中品心得中品歸戒若志意狹劣只求不墮三途仍生人天或心散亂但得歸戒守持名下品心得下品歸戒然心與歸戒雖各有三皆以十善為依修十善亦有上中下之別次請三寶以作證明次當懺悔以洗罪愆然後可受三歸或三年一年極少四月方許進受五戒深明開遮持犯一一清淨方許進受菩薩大戒此乃遵佛遺敕不許躐等或有利根欲頓受者亦須次第別時如寅時授三歸回向已至午時授五戒餘亦例此增進十善業道經出明藏初字函唐于闐三藏法師實叉難陀譯如是我聞一時佛在娑竭羅龍宮與八千大比邱衆三萬二千菩薩摩訶薩俱爾時世尊告龍王言一切衆生心想異故造業亦異由是故有諸趣輪轉龍王汝見此會及大海中形色種類各別不耶如是一切靡不由心造善不善身業語業意業所致而心無色不可見取但是虗妄諸法集起畢竟無主無我我所雖各隨業所現不同而實於中無有作者故一切法皆不思議自性如幻智者知已應修善業以是所生蘊處界等皆悉端正見者無厭龍王汝觀佛身從百千億福德所生諸相莊嚴光明顯曜蔽諸大衆設無量億自在梵王悉不復現其有瞻仰如來身者豈不目眩汝又觀此諸大菩薩妙色嚴淨一切皆由心習善業福德而生又諸天龍八部衆等大威勢者亦因善業福德所生今大海中所有衆生形色粗鄙或大或小皆由自心種種想念作身語意諸不善業是故隨業各自受報汝今常應如是修學亦令衆生了達因果修習善業汝當於此正見不動勿復墮在斷常見中於諸福田歡喜敬養是故汝等亦得人天尊敬供養龍王當知菩薩有一法能斷一切諸惡道苦何等為一謂於晝夜常念思惟觀察善法令諸善法念念增長不容毫分不善間雜是即能令諸惡永斷善法圓滿常得親近諸佛菩薩及餘聖衆言善法者謂人天身聲聞菩提獨覺菩提無上菩提皆依此法以為根本而得成就故名善法此法即是十善業道何等為十謂能永離殺生偷盜邪行妄語兩舌惡口綺語貪欲瞋恚邪見龍王若離殺生即得成就十離惱法何等為十一於諸衆生普施無畏二常於衆生起大慈心三永斷一切瞋恚習氣四身常無病五壽命長遠六恆為非人之所守護七常無惡夢寢覺快樂八滅除怨結衆怨自解九無惡道怖十命終生天是為十若能回向阿耨多羅三藐三菩提者後成佛時得佛隨心自在壽命復次龍王若離偷盜即得十種可保信法何等為十一資財盈積王賊水火及非愛子不能散滅二多人受念三人不欺負四十方讚美五不憂損害六善名流布七處衆無畏八財命色力安樂辨才具足無缺九常懷施意十命終生天是為十若能回向阿耨多羅三藐三菩提者後成佛時得證清淨大菩提智復次龍王若離邪行即得四種智所讚法何等為四一諸根調順二永離喧掉三世所稱歎四妻莫能侵是為四若能回向阿耨多羅三藐三菩提者後成佛時得佛丈夫隱密藏相復次龍王若離妄語即得八種天所讚法何等為八一口常清淨優鉢羅香二為諸世間之所信伏三發言成證人天敬愛四常以愛語安慰衆生五得勝意樂三業清淨六言無誤失心常歡喜七發言尊重人天奉行八智慧殊勝無能制伏是為八若能回向阿耨多羅三藐三菩提者後成佛時即得如來真實語復次龍王若離兩舌即得五種不可壞法何等為五一得不壞身無能害故二得不壞眷屬無能破故三得不壞信順本業故四得不壞法行所修堅固故五得不壞善知識不誑惑故是為五若能回向阿耨多羅三藐三菩提者後成佛時得正眷屬諸魔外道不能沮壞復次龍王若離惡口即得成就八種淨業何等為八一言不乖度二言皆利益三言必契理四言詞美妙五言可承領六言則信用七言無可譏八言盡愛樂是為八若能回向阿耨多羅三藐三菩提者後成佛時具足如來梵音聲相復次龍王若離綺語即得成就三種決定何等為三一定為智人所愛二定能以智如實答問三定於人天威德最勝無有虗妄是為三若能回向阿耨多羅三藐三菩提者後成佛時得如來諸所授記皆不唐捐復次龍王若離貪欲即得成就五種自在何等為五一三業自在諸根具足故二財物自在一切怨賊不奪故三福德自在隨心所欲物皆備故四王位自在珍奇妙物皆奉獻故五所獲之物過本所求百倍殊勝由於昔時不慳嫉故是為五若能回向阿耨多羅三藐三菩提者後成佛時三界特尊皆共敬養復次龍王若離瞋恚即得八種喜悅心法何等為八一無損惱心二無瞋恚心三無諍訟心四柔和質直心五得聖者慈心六常作利益安衆生心七身相端嚴衆共尊敬八以和忍故速生梵世是為八若能回向阿耨多羅三藐三菩提者後成佛時得佛無礙心觀者無厭復次龍王若離邪見即得成就十功德法何等為十一得真善意樂真善等侶二深信因果寧殞身命終不作惡三惟歸依佛非餘天等四直心正見永離一切吉凶疑網五常生人天不更惡道六無量福慧轉轉增勝七永離邪道行於聖道八不起身見捨諸惡業九住無礙見十不墮諸難是為十若能回向阿耨多羅三藐三菩提者後成佛時速證一切佛法成就自在神通爾時世尊復告龍王言若有菩薩依此善業於修道時能離殺害而行施故常富財寶無能侵奪長壽無夭不為一切怨賊損害離不與取而行施故常富財寶無能侵奪最勝無比悉能備集諸佛法藏離非梵行而行施故常富財寶無能侵奪其家貞順母及妻子無有能以欲心視者離虗誑語而行施故常富財寶無能侵奪離衆毀謗攝持正法如其誓願所作必果離離間語而行施故常富財寶無能侵奪眷屬和睦同一志樂恆無乖諍離粗惡語而行施故常富財寶無能侵奪一切衆會歡喜歸依言皆信受無違拒者離無義語而行施故常富財寶無能侵奪言不虗設人皆敬受能善方便斷諸疑惑離貪求心而行施故常富財寶無能侵奪一切所有悉以惠捨信解堅固具大威力離忿怒心而行施故常富財寶無能侵奪速自成就無礙心智諸根嚴好見皆敬愛離邪倒心而行施故常富財寶無能侵奪恆生正見敬信之家見佛聞法供養衆僧常不忘失大菩提心是為大士修菩薩道時行十善業以施莊嚴所獲大利如是龍王舉要言之行十善道以戒莊嚴故能生一切佛法義利滿足大願忍辱莊嚴故得佛圓音具衆相好精進莊嚴故能破魔怨入佛法藏定莊嚴故能生念慧慚愧輕安慧莊嚴故能斷一切分別妄見慈莊嚴故於諸衆生不起惱害悲莊嚴故愍諸衆生常不厭捨喜莊嚴故見修善者心無嫌嫉捨莊嚴故於順違境無愛恚心四攝莊嚴故常勤攝化一切衆生念處莊嚴故善能修習四念處觀正勤莊嚴故悉能斷除一切不善法成一切善法神足莊嚴故恆令身心輕安快樂五根莊嚴故深信堅固精勤匪懈常無迷妄寂然調順斷諸煩惱力莊嚴故衆怨盡滅無能壞者覺支莊嚴故常善覺悟一切諸法正道莊嚴故得正智慧常現在前止莊嚴故悉能滌除一切結使觀莊嚴故能如實知諸法自性方便莊嚴故速得成滿為無為樂龍王當知此十善業乃至能令十力無畏十八不共一切佛法皆得圓滿是故汝等應勤修學龍王譬如一切城邑聚落皆依大地而得安住一切藥草卉木叢林亦皆依地而得生長此十善道亦復如是一切人天依之而立一切聲聞獨覺菩提諸菩薩行一切佛法咸共依此十善大地而得成就佛說此經已娑竭羅龍王及諸大衆一切世間天人阿修羅等皆大歡喜信受奉行十善業道經終佛說戒消災經出明藏初字函吳月支優婆塞支謙譯聞如是一時佛在舍衛國爾時有一縣皆奉行佛五戒十善一縣界無釀酒者中有大姓家子欲遠賈販臨行父母語其子言汝勤持五戒奉行十善慎莫飲酒犯佛重戒受戒而行到他國見故同學親友相得歡喜歸出蒲萄酒欲共飲之辭曰吾國土奉佛五戒無敢犯者飲酒後生為人愚癡不值見佛且辭親行父母相戒以酒蒸仍違教犯戒罪莫大也知識區區別久會同心雖喜悅不宜使吾犯戒違親教也主人言吾與卿同師恩則兄弟吾親則是子親父母相飲豈可違之若吾在卿家必順子親事不獲已乃聽飲之醉臥三日醒悟心悔懼怖事訖還家具首於親父母報言汝違吾教加復犯戒亂法之漸非孝子也無得說之為國作先便以所得物逐令出國無宜留此子以犯戒為親所逐乃到他國住客舍家主人所事三鬼神能作人現對面飲食與人語言主人事之積年疲勞居財空盡而家疾病死喪不絶患厭此鬼私共論之鬼知人意而患苦之鬼自相共議此人財産空訖正為吾人耳未曾有益令相厭患宜求珍寶以施與之令其心悅便行盜他方國主庫藏好寶積置園中報言汝事吾歷年勤苦甚久今欲福汝使得饒富此乃快乎主人言受大神恩鬼曰汝園中有金銀可往取之方有大福令得汝願主人欣然入園見物奇異負挾歸舍辭謝受恩明日欲設飲食願屈顧下施設肴饌皆辦鬼神來詣門見舍衛國人在主人舍便奔走而去主人追呼請還今設微供皆已辦具大神既已下顧委去何為神曰卿舍尊客吾焉得前重復驚走主人還歸坐自思惟吾舍之中無有異人正有此人耳即出言語供設所有極相娛樂飲食已竟因問之曰卿有何功德於世有此吾所事神畏子而走客具說佛功德五戒十善實犯酒戒為親所逐尚餘四戒故為天神所見營護卿神不敢當之主人言吾雖事此神久患厭之今欲奉持佛五戒因從客受三自歸五戒十善一心精進不敢懈怠問佛所在可得見不客曰佛在舍衛國給孤獨園中往立可見主人一心到彼經歷一亭中立一女人端正是噉人鬼婦也男子行路逈遠時日逼暮從女人寄一宿女即報言慎勿留此宜急前去男子問曰用何等故將有意乎女人報曰吾已語卿用復問為男子自念前舍衛國人完佛四戒我神尚為畏之乃爾我已受三自歸五戒十善心不懈怠何畏懼乎遂自留宿噉人鬼見護戒神徘徊其傍去亭四十里一宿不歸明日男子進路見鬼所噉人骸骨狼籍衣毛為起心怖而悔退自思惟我在本國家居衣食極快足用空為此人所化言佛在舍衛國未覩奇妙反見骸骨縱橫惡意更生自念不如還彼女人將歸本土共居如故不亦樂乎即時回還至亭所因從女人復求留宿女謂男子何復還耶答曰行計不成故回還耳復寄一宿女言卿死矣吾夫是噉人鬼方來不久卿急去此男子不信遂止不去心更迷惑淫意復生不復信佛三自歸之德五戒十善之心天神即去無復護之鬼得來還女人恐鬼食此男子哀愍藏之甕中鬼聞人氣謂婦言爾得肉耶吾欲噉之婦言我不行何從得肉婦問鬼鄉昨何以不歸鬼言坐汝所為而舍尊客宿令吾見逐甕中男子踰益恐怖不復識三自歸意婦言何以不得肉乎鬼言正為汝舍佛弟子天神逐我出四十里外露宿震怖於今不安故不得肉婦聞默喜因問其夫佛戒云何悉所奉持鬼言我大饑極急以肉來不得問此此是無上正真之戒非吾所敢說也婦言為說之我當與卿肉鬼類貪殘欲食無止婦迫問之因便為說三自歸五種戒一曰慈仁不殺二曰清信不盜三曰守貞不淫四曰口無妄言五曰孝順不醉鬼初說一戒時婦輒受之五戒心執口誦男子於甕中識五戒隨受之天帝釋知此二人心自歸佛即選善神五十人擁護兩人鬼遂走去到明日婦問男子怖乎答曰大怖蒙仁者恩心悟識佛婦言男子昨何以回還答曰吾見新久死人骸骨縱橫恐畏故屈還耳婦言骨是吾所棄者也吾本良家之女為鬼所掠取吾作妻悲窮無訴今蒙仁恩得聞佛戒得離此鬼婦言賢者今欲到何所男子報言吾欲到舍衛國見佛婦言善哉吾置本國及父母隨賢者見佛便俱前行逢四百九十八人因相問訊諸賢者從何所來欲到何所答曰吾等從佛所來問言卿等已得見佛何為復去報言佛曰說經意中罔罔故尚不解今還本國兩賢者具說本末以鬼畏戒高行之人意乃開解俱還見佛佛遙見之則笑口中五色光出阿難長跪佛不妄笑將有所說佛語阿難汝見是四百九十八人還不對曰見之佛言此四百九十八人今得其本師來見佛者皆當得道五百人至佛所前為佛作禮一心聽經心開意解皆作沙門得阿羅漢道佛言犯酒戒者則是客舍主人與此女人纍世兄弟也然此二人是四百九十八人前世之師也凡人求道要當得其本師及其善友爾乃解耳佛說經竟諸比邱皆大歡喜前為佛作禮而去佛說戒消災經終原集消災經蕅祖有略釋一卷今節録其五重元義以明大意也此經以法為名無常無我寂滅三印為體依止真善師友為宗消災證果為用酪味為教相法為名者戒是能消之善法災是所消之惡法也經雖止列五戒義實無量以沙彌比邱菩薩戒等皆以五戒為根本故定共道共攝善攝生皆從五戒所含具故今大姓家子止存四戒神猶畏走鬼婦及男子方秉五戒鬼即遠去況十戒乃至攝生戒耶災即二種一者外災主人所事三鬼神及亭中噉人鬼是也二者內災四百九十八人聞佛說經意中罔罔者是也若信歸戒之德則一切皆消故名戒消災也三印為體者無常無我二印印於生死寂滅一印印於涅槃以諸法無常故福禍靡定以諸法無我故善惡隨意轉變以達此無常無我故心開意解悟寂滅理證阿羅漢也依止真善師友為宗者如一縣奉行戒善即是佛為師也以大姓家子飲酒醉臥即是違師友教故有逐出之災謹守四戒尚不忘師友德故致三神之畏主人賴此客為師友秉歸戒而求見佛四百九十八人賴二人為師友再見佛而證道果故云凡人求道要當得其本師及其善友故有明師良友當盡心依止也消災證果為用者依持戒力能消外災依定共道共力能消內災內外災消道果自成也酪味為教相者且約當分屬生滅四諦法門鬼神等災是苦諦迷惑不信是集諦歸戒十善是道諦得阿羅漢是滅諦若約開顯則同屬無上醍醐若約祕密及不定教則置毒酪中即能殺人節録元義竟原集更作四番解釋經文第一就事解釋第二約理解釋第三約無量因緣釋第四約圓頓觀心釋具載原集茲不録佛說優婆塞五戒相經同上初字函宋元嘉年天竺三藏求那跋摩譯明古吳蕅益沙門智旭箋要殺戒第一按殺戒第一四字論文義次第應在後文願樂欲聞之後佛告諸比邱之前而原本乃列於此或譯人偶不及檢今不敢擅改特為注明庶閲誦時頭緒清楚聞如是一時佛在迦維羅衛國爾時淨飯王來詣佛所頭面禮足合掌恭敬而白佛言欲所請求以自濟度惟願世尊哀酬我志佛言可得之願隨王所求王白佛言世尊已為比邱比邱尼沙彌沙彌尼制戒輕重唯願如來亦為我等優婆塞分別五戒可悔不可悔者令識戒相使無疑惑迦維羅衛中天竺國之名即世尊生處也淨飯王即世尊之父以父王為當機而請五戒法相正表此五戒法乃是三世諸佛之父依于五戒出生十方三世一切諸佛詎可忽哉佛言善哉善哉憍曇我本心念久欲與優婆塞分別五戒若有善男子受持不犯者以是因緣當成佛道若有犯而不悔常在三塗故上契佛意下契羣機故再歎善哉也憍曇即瞿曇是王之姓西國以稱姓為敬故受持不犯則當成佛犯而不悔則墮三塗五戒為法界十法界皆趣五戒皆趣不過也問受持不犯當成佛道受而犯者亦當成佛否犯而不悔常在三塗犯而悔者亦墮三塗否答受而犯者亦當成佛惟不受戒則永無成佛因緣犯而悔者不墮三塗但犯分上中下三種差別悔亦有作法取相無生三種不同理須各就當戒委明未可一言盡也爾時佛為淨飯王種種說已王聞法竟前禮佛足繞佛而去佛以是因緣告諸比邱我今欲為諸優婆塞說犯戒輕重可悔不可悔者諸比邱僉曰唯然願樂欲聞問比邱律儀是大僧法所以不許俗聞今五戒相是優婆塞所學何故不向王說乃待王去之後以是因緣告比邱耶答七衆戒法如來皆於比邱僧中結者正以比邱為七衆中尊佛法藉僧寶而立故云佛滅度後諸尼應從大僧而學戒法夫尼戒尚屬比邱況五戒而不屬比邱耶故今向比邱僧說此五戒正欲令優婆塞轉從比邱學也佛告諸比邱犯殺有三種奪人命一者自作二者教人三者遣使自作者自身作奪他命教人者教語他人言捉是人繫縛奪命遣使者語他人言汝識某甲不汝捉是人繫縛奪命是使隨語奪彼命時優婆塞犯不可悔罪殺戒以五緣成不可悔一是人謂所殺者人非畜生等二人想謂意在殺人三殺心四興方便五前人命斷今之自作教人遣使皆是以殺心而興方便故奪彼命時犯不可悔罪也不可悔者初受優婆塞戒之時說三歸竟即得無作戒體今犯殺人之罪則失無作戒體不復成優婆塞故不可作法懺悔也既不可悔則永棄佛海邊外名為邊罪不可更受五戒亦不得受一日一夜八關齊戒亦不得受沙彌戒及比邱戒亦不得受菩薩大戒惟得依大乘法修取相懺見好相已方許受菩薩戒亦許重受具戒十戒八戒及五戒等爾時破戒之罪雖由取相懺滅不墮三塗然其世間性罪仍在故至因緣會遇之時仍須酬償夙債除入涅槃或生西方乃能脫之不受報耳可不戒乎復有三種奪人命一者用內色二者用非內色三者用內非內色內色者優婆塞用手打他若用足及餘身分作如是念令彼因死彼因死者是犯不可悔罪若不即死後因是死亦犯不可悔若不即死後不因死是中罪可悔用非內色者若人以木瓦石刀矟弓箭白鑞段鉛錫段遙擲彼人作是念令彼因死彼因死者犯不可悔罪若不即死後因是死亦犯不可悔罪若不即死後不因死是中罪可悔用內非內色者若以手捉木瓦石刀矟弓箭白鑞段鉛錫段木段打他作如是念令彼因死彼因死者是罪不可悔若不即死後因是死亦犯不可悔若不即死後不因死是中罪可悔此三種亦皆殺法所謂興方便也手足身分是凡情之所執受故名內色木瓦石等是凡情所不執受名非內色有處亦名外色用彼內色捉彼外色故為雙用內非內色也因此方便而死不論即死後死總是遂其殺心故從前人命斷之時結成不可悔罪後不因死則但有興殺方便之罪未遂彼之殺心故戒體尚未曾失猶可殷勤悔除名為中可悔罪也復有不以內色不以非內色亦不以內非內色為殺人故合諸毒藥若著眼耳鼻身上瘡中若著諸食中若被蓐中車輿中作如是念令彼因死彼因死者犯不可悔罪若不即死後因是死亦犯不可悔罪若不即死後不因死是中罪可悔此以毒藥為殺方便也既不用手足等又不用木石刀杖等故云不以內非內色而前人命斷是同則不可悔罪亦同復有作無煙火坑殺他核殺𣚦殺作穽殺撥殺毗陀羅殺墮胎殺按腹殺推著水中火中推著坑中殺若遣令去就道中死乃至胎中初受二根身根命根於中起方便殺𣚦者木檻詐取也撥者弩石也此更廣標種種殺方便也核𣚦及撥皆是殺具毗陀羅即起尸呪術下文自釋餘並可知無煙火坑殺者若優婆塞知是人從此道來於中先作無煙火坑以沙土覆上若口說以是人從此道來故我作此坑若是人因是死者是犯不可悔罪若不即死後因是死犯不可悔罪若不即死後不因死是中罪可悔為人作無煙火坑人死者不可悔非人死者是中罪可悔從人邊得方便罪不從非人邊得殺罪也以於非人無殺心故畜生死者下罪可悔下字恐誤准一切律部亦是中罪亦從人邊得方便罪不從畜生邊得殺罪也以於畜生無殺心故為非人作坑非人死者是中罪可悔非人謂諸天修羅鬼神載道義弱故殺之者戒體未失猶可悔除也人死是下罪可悔畜生死者犯下可悔罪亦皆從非人邊得方便罪不從人及畜生得殺罪以於人及畜生本無殺心故若為畜生作坑畜生死者是下罪可悔畜生較諸天鬼神更劣故殺之者罪又稍輕若人墮死若非人墮死皆犯下罪可悔還從畜生邊得方便罪也若優婆塞不定為一事作坑諸有來者皆令墮死人死者犯不可悔罪非人死者中罪可悔畜生死者下罪可悔都無死者犯三方便可悔罪是名無煙火坑殺也此廣釋無煙火坑殺他以例核殺𣚦殺作穽殺撥殺無不爾也問一切有命不得故殺殺者非佛弟子何故今殺天龍鬼神僅結中罪殺畜生僅結下罪猶不失戒不至墮落耶答凡論失戒須破根本四重所謂殺人盜五錢邪淫大妄語此四重中隨犯一種決非作法之所能懺至如殺非人畜生等性罪雖重而於違無作罪猶為稍輕今云中罪可悔下罪可悔乃是悔除違無作罪免墮三塗非謂并除性罪也殺一命者必償一命故殺者固當故償誤殺者亦須誤償縱令不受戒者亦必有罪故大佛頂經云如於中間殺彼身命或食其肉如是乃至經微塵劫相食相誅猶如轉輪互為高下無有休息佛制殺戒良由於此受持不犯便可永斷輪回設復偶犯至心懺悔永不復造亦可免墮三塗故名中可悔下可悔耳設不念佛求生淨土何由永脫酬償之苦哉毗陀羅者若優婆塞以二十九日求全身死人召鬼呪尸令起水洗著衣令手持刀若心念口說我為某甲故作此毗陀羅即讀呪術若所欲害人死者犯不可悔罪若前人入諸三昧或天神所護或大呪師所救解不成害犯中可悔罪是名毗陀羅殺也半毗陀羅者若優婆塞二十九日作鐵車作鐵車已作鐵人召鬼呪鐵人令起水灑著衣令鐵人手捉刀若心念口說我為某甲讀是呪若是人死者犯不可悔罪若前人入諸三昧諸天神所護若呪師所救解不成死者是罪中可悔是名半毗陀羅殺斷命者二十九日牛屎塗地以酒食著中然火已尋便著水中若心念口說讀呪術言如火水中滅若火滅時彼命隨滅又復二十九日牛屎塗地酒食著中畫作所欲殺人像作像已尋還撥滅心念口說讀呪術言如此相滅彼命亦滅若像滅時彼命隨滅又復二十九日牛屎塗地酒食著中以針刺衣角頭尋還出心念口說讀呪術言如此針出彼命隨出是名斷命若用種種呪死者犯不可悔罪若不死者是中罪可悔三種呪術斷命並名厭禱殺皆毗陀羅之類也又復墮胎者與有胎女人吐下藥及灌一切處藥若針血脈乃至出眼淚藥作是念以是因緣令女人死死者犯不可悔罪若不即死後因是死亦犯不可悔罪若不即死後不因死是中罪可悔若為殺母故墮胎若母死者犯不可悔罪若胎死者是罪可悔仍於母邊得方便罪不於胎邊得罪以無殺胎心故若俱死者是罪不可悔若俱不死者是中罪可悔若為殺胎故作墮胎法若胎死者犯不可悔若胎不死者是中罪可悔若母死者是中罪可悔仍於胎得方便罪也俱死者是犯不可悔是名墮胎殺法按腹者使懷妊女人重作或擔重物教使車前走若令上峻岸作是念令女人死死者犯不可悔若不即死後因是死是罪不可悔若不因死者是中罪可悔若為胎者如上說是名按腹殺也遣令道中死者知是道中有惡獸饑餓遣令往至惡道中作如是念令彼惡道中死者犯不可悔餘者亦犯同如上說是名惡道中殺乃至母胎中初得二根身根命根加羅邏時以殺心起方便欲令死者犯不可悔罪餘犯同如上說加羅邏或云歌羅邏或云羯邏藍此翻凝滑又翻雜穢狀如凝酥乃胎中初七日位也讚歎殺有三種一者惡戒人二者善戒人三者老病人惡戒人者殺牛羊養雞豬放鷹捕魚獵師圍兔射麞鹿等偷賊魁膾呪龍守獄若到是人所作如是言汝等惡戒人何以久作罪不如早死是人因死者是罪不可悔若不因死者是中罪可悔若惡人作如是言我不用是人語不因是死犯中可悔罪若讚歎是人令死便心悔作是念何以教是人死還到語言汝等惡人或以善知識因緣故親近善人得聽善法能正思惟得離惡罪汝勿自殺若是人受其語不死者是中罪可悔善戒人者如來四衆是也若到諸善人所如是言汝持善戒有福德人若死便受天福何不自奪命是人因是自殺者犯不可悔罪若不自殺者中罪可悔若善戒人作是念我何以受他語自殺若不死者是罪可悔若教他死已心生悔言我不是何以教此善人死還往語言汝善人隨壽命住福德益多故受福益多莫自奪命若不因死者是中罪可悔老病者四大增減受諸苦惱往語是人言汝云何久忍是苦何不自奪命因死者是罪不可悔若不因死者是中罪可悔若病人作是念我何緣受是人語自奪命若語病人已心生悔我不是何以語此病人自殺還往語言汝等病人或得良藥善看病人隨藥飲食病可得瘥莫自奪命若不因死者是中罪可悔此三種讚歎殺皆廣標中所無然並如文可知餘上七種殺說犯與不犯同如上火坑七種指廣標中核𣚦穽撥及推著水中火中坑中也若人作人想殺是罪不可悔人作非人想殺人中生疑殺皆犯不可悔非人人想殺非人中生疑殺是中罪可悔按他部或但人想一句結重或人想人疑二句結重今三句皆結重也以理酌之祇應二句結重耳謂人人想不可悔人人疑亦不可悔餘四句結可悔謂人作非人想中可悔非人作人想中可悔非人非人疑中可悔非人非人想亦中可悔又一人被截手足置著城塹中又衆女人來入城中聞是啼哭聲便往就觀共相謂言若有能與是人藥漿飲使得時死則不久受苦中有愚直女人便與藥漿即死諸女言汝犯戒不可悔即白佛佛言汝與藥漿時死者犯戒不可悔此結集家引事明判罪法而文太略准餘律部若作此議論時便犯小可悔罪若同心令彼覓藥者同犯不可悔罪若知而不遮者亦犯中可悔罪若居士作方便欲殺母而殺非母是中罪可悔仍于母邊得方便罪不于非母邊得罪以是誤殺本無殺心故也若居士欲殺非母而自殺母是犯中罪可悔非逆亦于非母得方便罪不于母邊得殺罪也若居士方便欲殺人而殺非人是中罪可悔但于人邊得方便罪若居士作方使欲殺非人而殺人者犯小可悔罪但于非人得方便罪若人懷畜生胎墮此胎者犯小可悔罪若畜生懷人胎者墮此胎死者犯不可悔若居士作殺人方便居士先死後若有死者是罪犯可悔當未死前僅犯方便罪當其死時戒體隨盡故後有死者彼則不犯破戒重罪也若居士欲殺父母心生疑是父母非耶若定知是父母殺者是逆罪不可悔此亦須六句分別父母父母想父母疑三句是逆父母非父母想及非父母三句皆犯不可悔非逆若居士生疑是人非人若心定知是人殺者犯不可悔罪亦應六句分別二不可悔四可悔如前所明若人捉賊欲將殺賊得走去若以官力若聚落力追尋是賊若居士逆道來追者問居士言汝見賊不是居士先於賊有惡心瞋恨語言我見在是處以是因緣令賊失命者犯不可悔若人將衆多賊欲殺是賊得走去若以官力若聚落力追逐是居士逆道來追者問居士言汝見賊不是賊中或有一人是居士所瞋者言我見在是處若殺非所瞋者是罪可悔仍于所瞋者得方便罪餘如上說若殺所瞋者是罪不可悔也若居士母想殺非母犯不可悔非逆罪六句分別二逆四非逆上已明今重出耳若戲笑打他若死者是罪可悔本無殺心故也但犯戲笑打他之罪若狂不自憶念殺者無罪見糞而捉如旃檀無異見火而捉如金無異乃名為狂更有心亂痛惱所纏二病亦爾若優婆塞用有蟲水及草木中殺蟲皆犯罪若有蟲無蟲想用亦犯若無蟲有蟲想用者亦犯此亦應六句分別一有蟲有蟲想二有蟲有蟲疑二句結根本小可悔罪三無蟲有蟲想四無蟲無蟲疑二句結方便小可悔罪五有蟲無蟲想六無蟲無蟲想二句無犯今言有蟲無蟲想亦犯者欲人諦審觀察不可輒爾輕用水及草木故也有居士起新舍在屋上住手中失梁墮木師頭上即死居士生疑是罪為可悔不問佛佛言無罪本無有殺心故屋上梁人力少不禁故梁墮木師頭上殺木師居士即生疑佛言無罪從今日作好用心勿令殺人又一居士屋上作見埿中有蠍怖畏跳下墮木師上即死居士生疑佛言無罪從今日好用心作勿令殺人又一居士日暮入險道值賊賊欲取之捨賊而走墮岸下織衣人上織師即死居士生疑佛言無罪又一居士山上推石石下殺人生疑佛言無罪若欲推石時當先唱石下令人知又一人病癰瘡未熟居士為破而死即生疑佛言癰瘡未熟若破者人死是中罪可悔雖無殺心而有致死之理故犯罪也若破熟癰瘡死者無罪癰瘡既熟理應被故又一小兒喜笑居士捉擊攊令大笑故便死居士生疑佛言戲笑故不犯殺罪從今不應復擊攊人令笑不應便是小可悔罪又一人坐以衣自覆居士喚言起是人言勿喚我起便死復喚言起起便即死居士生疑佛言犯中罪可悔初喚無罪第二喚犯中罪也盜戒第二佛告諸比邱優婆塞以三種取他重物犯不可悔一者用心二者用身三者離本處用心者發心思惟欲為偷盜用身者用身分等取他物離本處者隨物在處舉著餘處盜戒以六緣成不可悔一他物二他物想三盜心四興方便取五直五錢西域一大錢直此方十六小錢五錢則是八十小錢律攝云五磨灑每一磨灑八十貝齒則是四百貝齒滇南用貝齒五箇准銀一釐亦是八分銀子耳六離本處今云取他重物即是他物他物想直五錢之三緣用心即是盜心用身即是興方便取離本處即第六緣六緣具足失無作戒體也復有三種取人重物犯不可悔罪一者自取二者教他取三者遣使取自取者自手舉離本處教他取者若優婆塞教人言盜他物是人隨意取離本處時遣使者語使人言汝知彼重物處不答言知處遣往盜取是人隨語取離本處時此三種取皆辨所興方便不同同以六緣成重也復有五種取他重物犯不可悔一者苦切取二者輕慢取三者詐稱他名字取四者強奪取五者受寄取此五種取亦是方便不同同以六緣成重也重物者若五錢若直五錢物犯不可悔此正釋五錢以上皆名為重物也不論何物但使本處價直八分銀子取離處時即犯不可悔罪若居士知他有五寶若似五寶以偷心選擇而未離處犯可悔罪未具六緣得方便罪若選擇已取離本處直五錢者犯不可悔已具六緣便失戒體不論受用與不受用五寶即五金所謂金銀銅鐵錫也似者像也以金銀等作諸器具名為似寶若未成器諸金銀等名為生寶故云生像金銀寶物謂一者生金銀寶物二者像金銀寶物也或云七寶准例可知離本處者若織物異繩名異處若皮若衣一色名一處異色名異處若衣皮牀一色名一處異色名異處若毛蓐者不重毛名一處一色名一處異色名異處是名諸處居士為他擔物以盜心移左肩著右肩右手著左手如是身分名為異處車則輪軸衡軛船則兩舷前後屋則梁棟椽桷四隅及奧皆名異處以盜心移物著諸異處者皆犯不可悔且如毛蓐自物放一重上他物放二重上或自物放一色上他物放異色上今取他物離彼二重置一重中離彼異色置一色中則令他人生失物想故為離處而具六緣更犯不可悔也左肩右肩等例皆如是若無盜心則雖左右數移豈有罪哉衡轅前橫木所以駕馬軛轅前橫木所以駕牛舷音弦船之邊也負棟曰梁屋脊曰棟椽桷音傳角皆屋椽也盜水中物者人筏材木隨水流下居士以盜心取者犯不可悔若以盜心捉木令住後流至前際即名離處及以盜心沈著水底亦名離處若舉離水時亦名離處皆犯不可悔復次有主池中養鳥居士以盜心按著池水中者犯可悔罪未離彼處故若舉離池水犯不可悔離彼處故若人家養鳥飛入野池以盜心舉離水是為離處及沈著水底亦名離處皆犯不可悔又有居士內外莊嚴之具在樓觀上諸有主鳥銜此物去以盜心奪此鳥者犯不可悔具六緣故若見鳥銜寶而飛以盜心遙待之時犯中可悔方便罪也若以呪力令鳥隨意所欲至處犯不可悔具六緣故若至餘處犯中可悔亦方便罪若有野鳥銜寶而去居士以盜心奪野鳥取犯中可悔雖非有主物從盜心結罪待野鳥時犯小可悔又諸野鳥銜寶而去諸有主鳥奪野鳥取居士以盜心奪有主鳥取犯不可悔具六緣故從鳥主邊得罪若待鳥時犯中可悔是方便罪餘如上說又有主鳥銜寶物去為野鳥所奪是無主也居士以盜心奪野鳥取犯中可悔亦從盜心結罪若待鳥時亦犯中可悔准上應小可悔中字恐誤不則上亦應云中可悔也餘亦如上若居士蒲博以盜心轉齒勝他得五錢者犯不可悔賻錢為戲名摴蒲雙陸戲名六博賭賻家所用馬子及圍棋子象棋子骰子之類皆名為齒轉齒者偷棋換著乃至用藥骰子等也准優婆塞戒經及梵網經則蒲博等事亦犯輕垢今但受五戒者容可不犯而轉齒勝他全是盜心故犯重也若有居士以盜心偷舍利犯中可悔不可計價直故若以恭敬心而作是念佛亦我師清淨心取者為犯若居士以盜心取經卷犯不可悔計直輕重所盜經卷若直五錢以上則不可悔若減五錢中可悔也夫盜田者有二因緣奪他田地一者相言即告狀訟于官府也二者作相即立標示界限相也若居士為地故言他得勝若作異相過分得地直五錢者犯不可悔有諸居士應輸估稅而不輸至五錢者犯不可悔復有居士至關稅處語諸居士汝為我過此物與汝半稅為持過者違稅五錢犯不可悔居士若示人異道使令失稅物直五錢犯中可悔若稅處有賊及惡獸或饑餓故示異道令免斯害不犯又有居士與賊共謀破諸村落得物共分直五錢者犯不可悔盜無足衆生者蛭蟲蛭音質水蟲也于投羅蟲等未見翻譯人取舉著器中居士從器中取者犯不可悔選擇如上盜二足三足衆生者人及鵝鴈鸚鵡鳥等是諸鳥在籠禁中若盜心取者犯不可悔餘如上說盜人有二種一者擔去二者共期若居士以盜心擔人著肩上人兩足離地犯不可悔若共期行過二雙步犯不可悔餘皆如上說盜四足者象馬牛羊也人以繩繫著一處以盜心牽將過四雙步犯不可悔若在一處臥以盜心驅起過四雙步犯不可悔多足亦同若在牆壁籬障內以盜心驅出過羣四雙步者犯不可悔餘如上說若在外放之居士以為心念若放牧人入林去時我當盜取發念之機犯中可悔若殺者自同殺罪殺已取五錢肉犯不可悔復有七種一非己想二不同意三不暫用四知有主五不狂六不心亂七不病壞心此七者取重物犯不可悔取輕物四錢以下犯中可悔又有七種一者己想謂是己物二者同意素相親厚聞我用時其心歡喜三者暫用不久即還本主四者謂無主不知此物有人攝屬五狂六心亂七病壞心此七者取物無犯有一居士種植蘿蔔又有一人來至園所語居士言與我蘿蔔居士問言汝有價耶為當直索答言我無價也居士曰若須蘿蔔當持價來我若但與汝者何以供朝夕之膳耶客言汝定不與成耶主曰吾豈得與汝客便以呪術令菜乾枯回自生疑將無犯不可悔耶往決如來佛言計直所犯可悔不可悔莖葉華實皆與根同有一人在祇洹間耕墾脫衣著田一面時有居士四望無人便持衣去時耕者遙見語居士言勿取我衣居士不聞猶謂無主故持衣去耕人即隨後捉之語居士言汝法應不與取耶居士答言我謂無主故取之耳豈法宜然耕人言此是我衣居士言曰是汝衣者便可持去居士生疑我將無犯不可悔耶即往佛所咨質此事佛知故問汝以何心取之居士白言謂言無主佛言無犯自今以後取物者善加籌量或自有物雖無人守而實有主者耶若發心欲偷未取者犯下可悔取而不滿五錢者犯中可悔取而滿五錢犯不可悔欲偷未取下可悔遠方便也取而未離處中可悔近方便也文缺略不滿五錢中可悔未失戒也滿五錢不可悔已失戒也失戒須取相懺例如殺戒中說所有世間性罪償足自停較殺業稍輕耳淫戒第三佛告諸比邱優婆塞不應生欲想欲覺尚不應生心何況起欲恚癡結縛根本不淨惡業於欲境界安立名言名為欲想於欲境界忽起尋求名為欲覺由欲不遂而起於恚欲之與恚同依於癡三毒既具則為一切結縛根本違清淨行能招此世他世苦報故名不淨惡業也是中犯邪淫有四處男女黃門二根女者人女非人女畜生女男者人男非人男畜生男黃門二根亦同於上類若優婆塞與人女非人女畜生女三處行邪淫犯不可悔若人男非人男畜生男黃門二根二處行淫犯不可悔若發心欲行淫未和合者犯小可悔遠方便也若二身和合止不淫犯中可悔近方便也淫戒以三緣成不可悔一淫心謂如饑得食如渴得飲不同熱鐵入身臭尸繫頸等二是道謂下文所明三處三事遂謂入如胡麻許即失戒也若優婆塞婢使已嫁有主於中行邪淫者犯不可悔餘輕犯如上說三處者口處大便小便處除是三處餘處行欲皆可悔若優婆塞婢使未配嫁於中非道行淫者犯可悔罪後生受報罪重婢使未配嫁則未有他主若欲攝受便應如法以禮定名為妾為妻皆無不可若非道行淫壞其節操致使此女喪德失貞故雖不失戒體而後報罪重所謂損陰德者幽冥所深惡也若優婆塞有男子僮使人等共彼行淫二處犯不可悔罪餘輕犯罪同上說若優婆塞共淫女行淫不與直者犯邪淫不可悔與直無犯若人死乃至畜生死者身根未壞共彼行邪淫女者三處犯不可悔輕犯同上說若優婆塞自受八支謂一日一夜八關戒齊行淫者犯不可悔八支無復邪正一切皆犯若優婆塞雖都不受戒犯佛弟子淨戒人者雖無犯戒之罪然後永不得受五戒乃至出家受具足佛弟子淨戒人謂比邱比邱尼式叉摩那沙彌沙彌尼優婆塞優婆夷也乃至己妻受八支戒日亦不得犯犯者同名破他梵行問犯他淨行固名重難設有反被受戒人所誘者是遮難否或不知誤犯後乃悔恨誠心發露許受五戒及出家否答若知彼已受戒便不應妄從其誘然既被誘罪必稍減不知誤犯理亦應然但懺悔之方決非輕易應須請問威德重望深明律學者乃能滅此罪耳佛告諸比邱吾有二身生身戒身若善男子為吾生身起七寶塔至於梵天若人虧之其罪尚有可悔虧吾戒身其罪無量受罪如伊羅龍王此結示淨戒不可虧犯也戒身即法身佛以戒定慧解脫解脫知見為法身故以此戒法師師相授即是如來法身常住不滅若或自破梵行或復破他梵行則是破壞如來法身故較破壞生身舍利塔罪為尤重也伊羅龍王具云伊羅跋羅亦云伊羅鉢伊羅樹名此云臭氣跋羅此云極謂此龍王昔為迦葉佛時比邱不過以瞋恚心故犯折草木戒不知懺悔遂致頭上生此臭樹苦毒無量況殺盜淫妄根本重戒而可犯乎然殺盜二戒稍有慈心廉退者猶未肯犯獨此淫戒人最易犯故偏于此而結示也然犯戒之罪既有重于壞塔則持戒之福不尤重于起塔耶幸佛弟子思之妄語戒第四佛告諸比邱吾以種種訶妄語讚歎不妄語者乃至戲笑尚不應妄語何況故妄語是中犯者若優婆塞不知不見過人聖法自言我是羅漢斷三界煩惱盡向羅漢者斷無色界思惑將盡犯不可悔若言我是阿那含斷欲界煩惱盡斯陀含斷欲界六品惑若須陀洹斷見惑盡乃至尚須陀洹世第一後心具足八忍智少一分若得初禪離生喜樂五支功德相應第二禪定生喜樂四支功德相應第三禪離喜妙樂五支功德相應第四禪捨念清淨四支功德相應若得慈悲喜捨無量心若得四無色定所謂虗空定識處定無所有處定非想非非想處定若得不淨觀阿那般那念此云遣來遣去即入息出息也此二觀乃佛法二甘露門但應修習不應云得諸天來到我所諸龍夜叉捷疾鬼薜荔亦云閉麗多此翻祖父鬼毗舍闍噉精氣鬼鳩盤茶甕形厭魅鬼羅剎可畏鬼來到我所彼問我我答彼我問彼彼答我皆犯不可悔此大妄語以五緣成不可悔一所向人二是人想三有欺誑心四說重具即羅漢乃至羅剎來到我所等五前人領解若向聾人癡人不解語人說及向非人畜生等說並屬中可悔罪也若本欲言羅漢誤言阿那含者犯中可悔餘亦如是說未遂本心故也若優婆塞人問言汝得道耶若默後若以相示者皆犯中可悔未了了故乃至言旋風土鬼來至我所者犯中可悔准十誦律未得外凡別總相念妄言已得戒未清淨妄言恃戒清淨未曾讀誦經典妄言讀誦等並犯中可悔罪若優婆塞實聞而言不聞實見而言不見疑有而言無無而言有如是等妄語皆犯可悔更有兩舌惡口綺語並皆犯罪但不失戒故云可悔非謂無性罪也若發心欲妄語未言者犯下可悔遠方便也言而不盡意者犯中可悔或誤說或說不了了僅名近方便罪也若向人自言得道者便犯不可悔若狂若心亂不覺語者無犯酒戒第五佛在支提國跋陀羅婆提邑未見翻譯是處有惡龍名菴婆羅提陀未見翻譯凶暴惡害無人得到其處象馬牛羊驢騾駱駝無能近者乃至諸鳥不得過上秋穀熟時破滅諸穀長老莎伽陀或云槃陀伽或云般陀此翻小路邊生又翻繼道往昔慳法又喜飲酒今生愚鈍一百日中不誦一偈佛令調息證阿羅漢遊行支提國漸到跋陀羅婆提過是夜已晨朝著衣持鉢入村乞食乞食時聞此邑有惡龍名菴婆羅提陀凶暴惡害人民鳥獸不得到其住處秋穀熟時破滅諸穀聞已乞食訖到菴婆羅提陀龍住處泉鳥樹下敷坐具大坐龍聞衣氣即發瞋恚從身出煙長老莎伽陀即入三昧以神通力身亦出煙龍倍瞋恚身上出火莎伽陀復入火光三昧身亦出火龍復雨雹莎伽陀即變雨雹作釋俱餅髓餅波波羅餅龍復放霹靂莎伽陀即變作種種歡喜丸餅龍復雨弓箭刀稍莎伽陀即變作優鉢羅華此云青蓮波頭摩華此云紅蓮拘牟陀華此云黃蓮時龍復雨毒蛇蜈蚣土虺蚰蜒莎伽陀即變作優鉢羅華纓絡薝蔔華纓絡婆師華纓絡阿提目多伽華纓絡薝蔔此云黃華婆師此云夏生華又翻雨華雨時方生阿提目多伽舊云善思夷華或翻龍甜華如是等龍所有勢力盡現向莎伽陀如是現德已不能勝故即失威力光明長老莎伽陀知龍勢力已盡不能復動即變作細身從龍兩耳入從兩眼出兩眼出已從鼻入從口中出在龍頭上往來經行不傷龍身爾時龍見如是事心即大驚怖畏毛豎合掌向長老莎伽陀言我歸依汝莎伽陀答言汝莫歸依我當歸依我師歸依佛龍言我從今歸三寶知我盡形作佛優婆塞是龍受三自歸作佛弟子已更不復作如先凶惡事諸人及鳥獸皆得到其所秋穀熟時不復傷破如是名聲流布諸國長老莎伽陀能降惡龍折伏令善諸人及鳥獸得到龍宮秋穀熟時不復破傷因長老莎伽陀名聲流布諸人皆作食傳請之是中有一貧女人信敬請長老莎伽陀莎伽陀默然受已是女人為辦名蘇乳糜受而食之女人思惟是沙門噉是名蘇乳糜或當冷發便取似水色酒持與是莎伽陀不看飲已為說法便去過向寺中爾時間酒勢便發近寺門邊倒地僧伽梨衣等漉水囊鉢杖油囊革屣針筒各在一處身在一處醉無所覺爾時佛與阿難此云歡喜佛之堂弟佛成道時生為佛侍者又翻慶喜又翻無染遊行到是處佛見是比邱知而故問阿難此是何人答言世尊此是長老莎伽陀佛即語阿難是處為我敷坐牀辦水集僧阿難受教即敷坐牀辦水集僧已往白佛言世尊我已敷牀辦水集僧佛自知時佛即洗足坐問諸比邱曾見聞有龍名菴婆羅提陀凶暴惡害先無有人到其住處象馬牛羊驢騾駱駝無能到者乃至諸鳥無敢過上秋穀熟時破滅諸穀善男子莎伽陀能折伏令善今諸人及鳥獸得到泉土是時衆中有見者言見世尊聞者言聞世尊佛語比邱於汝意云何此善男子莎伽陀今能折伏蝦蟇不答言不能世尊佛言聖人飲酒尚如是失何況俗凡人如是過罪若過是罪皆由飲酒故從今日若言我是佛弟子者不得飲酒乃至小草頭一滴亦不得飲佛種種訶責飲酒過失已告諸比邱優婆塞不得飲酒者有二種穀酒木酒穀酒可知木酒者或用根莖葉華果用種種子諸藥草雜作酒酒色酒香酒味飲能醉人是名為酒若優婆塞嘗咽者亦名為飲犯罪若飲穀酒咽咽犯罪若飲醋酒隨咽咽犯若飲甜酒隨咽咽犯若噉麴能醉者隨咽咽犯若噉滴糟隨咽咽犯若飲酒澱隨咽咽犯若飲似酒酒色酒香酒味能令人醉者隨咽咽犯若但作酒色無酒香無酒味不能醉人及餘飲皆不犯醋謂味酸也但是飲之能醉不論味酸味甜皆悉犯罪麴者作酒之藥滴糟者即今燒酒酒澱者澱音殿酒之滓垽音印似酒者果漿等變熟之後亦能醉人此酒戒但是遮罪為防過故與前四根本戒同制三緣成犯一是酒謂飲之醉人二酒想謂知是酒或酒和合三入口咽咽結可悔罪也若食中不知有酒或酒煮物已失酒性不能醉人者並皆無犯佛說優婆塞五戒相經問原集以歸戒彚釋置此經後今何附前耶答原集簡略順便附此今廣集周足當置在前蓋三歸五戒佛初成道即有耶輸伽之父母最初為歸戒之優婆塞優婆夷時有比邱與優婆塞夷三衆尚無比邱尼沙彌沙彌尼之三衆至此說優婆塞五戒相經六衆弟子已全況淨飯王之請如來之說秪明五戒可悔不可悔者令識戒相便無疑惑未曾問答三歸之義故歸戒彚釋宜在前也又問據優婆塞戒經受戒品六齊日加受八戒在菩薩戒六重二十八輕之內亦即梵網不敬好時之戒今何故在此經後耶答佛制持八關齊戒不拘白衣近事大乘小乘但於齊日佛聖誕日父母尊長生死日自生日作諸念誦功德日皆應持八關齊戒所謂齊者過午不食而為齊體八支閉惡以助成齊良由生死正因無如淫欲生死增緣無如飲食但白衣近事不能永捨眷屬所以終身五戒但除邪淫若受八關齊戒唯制一日一夜者嚴禁過午之食及淫欲之念大智度論云於六齊日定受八戒修積福德者是日惡鬼逐人令人不吉是故劫初聖人教人持齊修善作福以避凶衰但一日不食為齊後佛出世語云汝當一日一夜如諸佛持八戒不過中食以此功德非特遠離灾橫實能成就出世涅槃又提謂經中明八王日受八戒所云八王者謂立春春分立夏夏至立秋秋分立冬冬至是八日天地諸神陰陽交代所以受戒凡齊戒日不得鞭打衆生不得身口作不威儀事見下威儀經說不得起貪欲瞋恚煩惱等邪覺更須修六念以上四禁若有犯者雖不破齊戒而齊戒不清淨具見齊經說此經有科注一卷今節録佛說齊經出明藏緣字函即中阿含持齊經吳優婆塞支謙譯經明蕅益沙門智旭注古杭優婆塞陳熙願節要按近事第七輕戒每月六齊日在家二衆俱應受齊凡受齊法或至僧伽藍中或請一師至自家中今即家中受也又優婆塞受齊就寺為便優婆夷受齊就家為便又西域不拘近事白衣凡修念誦功德皆持八關齊戒聞如是一時佛在舍衛城東丞相家殿丞相母名維耶早起沐浴著綵衣與諸子俱出稽首佛足一面坐佛問維耶沐浴何早對曰欲與諸俱受齊戒綵衣在家常服既無妨於八支故不特制壞色若已受菩薩近事戒畜無縫三衣者於受齊日應得著之佛言齊有三輩樂何等齊維耶長跪言願聞何謂三齊佛言一為牧牛齊二為尼犍齊三為佛法齊依愛同於牧牛依見同於尼犍除愛見而修八支五念名為佛法牧牛齊者如牧牛人求善水草飲飼其牛暮歸思念何野有豐饒須天明當復往若族種男女已受齊戒意在居家利欲産業及念美飲食育養身者是為如彼牧牛人意不得大福非大明喻此日雖從佛法受齊而不持心八支不習學五念乃懸想次日五欲猶如牧牛者懸想明日水草也例而推之今生奉持佛戒喜願未來人天受樂皆如牧牛不得出世大福繇無出世大智光明乃使心期陋劣如此故結判云非大明也尼犍齊者當月十五日齊之時伏地受齊戒為十由延內諸神拜言我今日齊不敢為惡不名有家彼我無親妻子奴婢非是我有我非其主然其學貴文賤質無有正心至到明日相名有如故事齊如彼者不得大福非大明尼犍此云離繫外道之名由延亦云由旬四十里也向諸神拜不知歸向三寶也不敢為惡雖不遍列八支大意與佛戒相似不名有家彼我無親亦與佛戒略同而僅稱尼犍齊者非但為其不知歸憑三寶良以其學貴文賤質無有正心故也貴文者致飾於外以圖悅人耳目賤質者不知真修實詣反本還源也直念真如名為正心不脫見網名無正心見惑既紆愛習仍在故至明日仍如故事也今雖歸憑三寶而不圖出要仍復貴文賤質當知同彼外道尼犍以例推之受戒者貴彰持律之名而性遮諸業未必微細清淨演教者貴彰宏法之名而修證要途未必精徹明了參禪者貴彰機用之名而己躬下事未必窮源極底修懺者貴彰音聲儀式之名而事戒理觀未必深諳力行皆尼犍流類耳佛法齊者道弟子月六齊之日受八戒道弟子謂在家秉承佛道之弟子也從但三歸至菩薩戒在家二衆俱得此名月六齊日者初八日十四日十五日二十三日二十九日三十日也若月小者取二十八日足之此六日是四天王及太子使者巡視世間之日受齊修福功倍餘時不言年三長齊月者月齊稍難容可隨力日齊最易尤應秉承年三月者正月五月九月毗沙門天王分鎮南洲亦應受齊修福也八戒具如下列或開香華歌儛為二則第九不非時獨得齊名開合雖殊義體無別或問為善去惡理應相續何以但制六日待天神巡視而後修善答受六齊者非謂平日便可為惡也大戒五戒秉之終身八關戒齊加於六日譬如列國諸侯平日何嘗不修政布德士農工賈平日何嘗不勤職務業逮夫巡狩省試之期亦必倍加警飭故梵網有不敬好時之戒當知此為菩薩增上功德亦為近事種出世因下乃旁為一輩多罪衆生雖不能相續修善亦使之暫離惡業倘馴而致之萌孽漸生牛羊弗牧安知不蔚為牛山美木耶第一戒者盡一日一夜持心如真人無有殺意慈念衆生不得賊害蠕動之類不加刀殺念欲利安莫復為殺如清淨戒以一心習盡一日夜謂不得半日及半夜等持心如真人者阿羅漢翻無著亦翻不生亦翻應供亦翻應真今翻真人此乃出世聖果而持心如之也慈念衆生念欲利安等明行善不得賊害莫復為殺等明止善止行二善名為諸佛清淨之戒今以一心而修習之第二戒者盡一日一夜持心如真人無貪取意思念布施當歡喜與自手與潔淨與恭敬與不望與却慳貪與如清淨戒以一心習無貪取意先明止善思念布施等次明行善不望句即行論止謂與時無有望今報後報心也歡喜四句是却慳心不望與句是却貪心第三戒者一日一夜持心如真人無淫意不念房室修治梵行不為邪欲心不貪色如清淨戒以一心習無淫意二句先明止善修治梵行次明行善不為邪欲二句重明止善梵行者四禪四等也第四戒者一日一夜持心如真人無妄語意思念至誠安定徐言不為僞詐心口相應如清淨戒以一心習無妄語意總標永離四過思念至誠即無未得言得諸愆安定即不綺語徐言即不惡口不為僞詐即不兩舌心口相應即不妄言皆含止行二善之意第五戒者一日一夜持心如真人不飲酒不醉不迷亂不失志去放逸意如清淨戒以一心習不飲酒句總標離衆失也醉及迷亂等皆飲酒必招之過第六戒者一日一夜持心如真人無求安意不著香華不傅脂粉不為歌儛倡樂如清淨戒以一心習色聲香觸等塵乃六情諸根所安故云無求安意第七戒者一日一夜持心如真人無求安意不臥好牀卑牀草席捐除睡臥思念經道如清淨戒以一心習高廣嚴飾名為好牀縱恣睡眠小死無異今捐除睡臥即是止善思念經道即是行善第八戒者一日一夜持心如真人奉法時食食少節身過中日後不復食如清淨戒以一心習以時受食順諸佛法資身辦道身無病苦心得安閒離舌端貪嗜之過無數數營理之煩日中以表中道中道之外更無所需隱示第一義趣又根塵相對皆有食義如眼以色為食耳以聲為食等若墮聰除明便成斷滅見網若尋聲逐色又復流浪愛河今云時食則但緣現量復云少食則無所貪求大論明頭陀食有五第三中後不飲漿第五節量食佛告維耶受齊之日當習五念何謂五一當念佛佛為如來為至真為等正覺為明行足為善逝世間父無上士經法御天人師號曰佛是念佛者愚癡惡意怒習悉除善心自生思樂佛業譬如以麻油澡豆沐頭垢濁得除齊念佛者其淨如是衆人見之莫不信好梵語多陀阿伽度此翻如來無所從來亦無所去故名如來中道回出二諦故無來去證於中道以此度生為如來梵語阿羅訶此翻應供亦翻應真今翻至真為世福田故名應供冥自真性故名至真梵語三藐三佛陀此翻正遍知今翻等正覺等即遍義具明差別法門名之為等深知無差別性名之為正等知二諦正知中諦為等正覺又真不異俗故等俗不異真故正具足三明為明行足妙超三有名為善逝即三有而不著三有故為善逝又三種國土無非寂光為善逝世間父亦名世間解自己解脫能解世間如長者自出火宅能令諸子出火宅也位極妙覺更無過者名無上士經法御亦名調御丈夫具丈夫法能說經調御衆生也說十二部經詮無量理調御衆生為經法御六道以天人為勝又三乘聖衆皆在人道天中佛為天人師範即九界同秉教誨自覺覺他覺行圓滿故號曰佛不言世尊者十號具足即是世間最尊舉別而略總也念法門能除愚癡念實相能除惡意念相好能除怒習愚癡惡意怒習悉除即是止善善心自生思樂佛業即是行善以如來十號能生世出世間種種善根又十號威德能令聞者破狹劣心破輕慢心敬仰畏憚不敢萌於惡意麻油澡豆除穢之物喻念慧為除惑之具依於一體三寶而有住持三寶於三寶中佛寶最尊喻之以頭垢濁既除頭則清淨念佛功成佛性顯現矣二當念法佛所說法三十七品具足不毀思念勿忘當知此法為世間明是念法者愚癡惡意怒習悉除善心自生用樂法業譬如以麻油澡豆浴身垢濁得除齊念法者其淨如是衆人見之莫不好信佛法無量而三十七品具足始終修證途轍故獨舉之分為七科一四念處謂身受心法為所觀境一觀身不淨二觀受是苦三觀心無常四觀法無我為四念處二四正勤謂繇念處觀令未生惡不生已生惡除滅未生善得生已生善增長三四如意足謂欲念進慧希向慕樂彼法為欲一心正住彼境為念修習精進無間為進思維心不馳散為慧所願皆得為如意足於中思維則定思維則斷善能成就神通四五根謂信進念定慧一信根信於正道二精進根勤求不息三念根一心觀想四定根一心寂定五慧根內性自照成無漏根五五力亦如根名謂信等增長能破五障信力遮煩惱進力除懈怠念力破邪想定力破妄想慧力破一切邪外六七覺支謂念擇法精進喜輕安定捨調攝其心不沈不浮而入見道念即思念謂修諸道法當念使定慧均平擇進喜屬慧安定捨屬定七八正道謂正見正思維正語正業正精進正定正念正命安隱在道中行不依偏邪而行名為正道正命者乞食自活離邪命食也此三十七品能運載三土衆生到三涅槃故為三世間明所應具足不毀思念勿忘也三涅槃一性淨涅槃單約性言二圓淨涅槃智極惑盡三方便淨涅槃此生非生心常寂滅此滅非滅應用常興受齊則以法為身故即以身喻法昧此法身性本清淨幻成三惑垢濁垢濁既除法身顯矣三當念衆恭敬親附依受慧教佛弟子衆有得溝港受溝港證者有得頻來受頻來證者有得不還受不還證者有得應真受應真證者是為四雙之八輩丈夫皆為戒成定成慧成度知見成為聖德為行具當為叉手天上天下尊者福田是念衆愚癡惡意怒習悉除喜心自生樂衆之業譬如以淳灰浣衣垢汙得除齊念衆者其德如是衆人見之莫不好信梵語僧伽此翻和合衆律中明僧有四種一無慚僧謂破戒者二啞羊僧雖不破戒昧法律者三清淨僧謂內外七賢及持戒凡夫四真實僧謂四雙八輩今令念真實僧也恭敬約意親近約身受教約口十六心滿初登聖位名得溝港猶云預流即須陀洹果八忍具足智少一分名受溝港證者謂無間必當證溝港道即須陀洹向斷欲界思六品名得頻來猶云一往一來即斯陀含果斷五品時名受頻來證者即斯陀含向斷欲界九品思盡名得不還猶云不來即阿那含果斷八品時名受不還證者即阿那含向斷三界惑盡名得應真謂與真諦常相應故即阿羅漢果進斷非非想思名受應真證者即阿羅漢向合為四雙分為八輩具足智斷故名丈夫性遮清淨無作體不可壞名為戒成八解九次第等名為定成見四真諦名為慧成於有為諸行得解脫名為度成文缺度成二字分別解脫因果不謬名為度知見成具慧行入正位名為聖德具行行滿足功德名為行具以要言之前三果及四向是分證五分法身阿羅漢果是滿證五分法身也當為叉手結成能念舉叉手以攝三業天上天下尊者福田結成所念舉福田以顯德行也然在家菩薩受齊念衆於真實僧固應三業精勤於清淨僧亦應禮拜供養即啞羊及無慚僧尤不應輕慢毀辱如象王羅剎尚敬服袈裟者不害不食況歸依三寶自稱近事淨行者乎喜心即善心淳灰亦譬念慧僧寶屬解脫德故以衣譬即所謂解脫服也又是慚愧莊嚴又是寂滅上忍性具僧寶如身必有衣念慧除垢則解脫清淨衆德莊嚴柔和善順矣四者念戒身受佛戒一心奉持不虧不犯不動不忘善立慎護為慧者舉後無所悔不以有望能等教人是念戒者愚癡惡意怒習悉除喜心自生樂戒統業如鏡之磨垢除盛明齊念戒者其淨如是衆人見之莫不好信佛戒有七衆九衆大小兩門之不同今云身受佛戒且據一日一夜所秉八支而言即此八支戒法具攝定共道共及三聚五支等戒故總誡云一心奉持也不虧不犯即木叉戒不動即定共戒不忘即道共戒又不虧不犯不動即攝律儀戒不忘乃至後無所悔即攝善法戒不以有望能等教人即攝衆生戒又不虧謂護持四重根本無虧即根本業清淨戒不犯謂其餘四支及根本之等流方便皆悉無犯即前後眷屬餘清淨戒不動謂不被欲界粗弊五塵所動即非諸惡覺覺清淨戒不忘謂正念現前故能善自安立謹慎護持設為有智慧者之所舉問如說能行如行能說後無所悔即護持正念念清淨戒不以有望謂不為自求人天福報聲聞緣覺權乘諸位能等教人謂惟依最上乘證菩提心願與法界衆生一時同得無上菩提即回向具足無上道戒秪此一日一夜八關戒齊為所緣境於中具足定共道共三聚五支無缺無餘則為具足一切恆沙佛法無量功德之藏齊戒為法界一切法趣齊戒是趣不過是名為念戒也一日一夜齊戒橫豎包羅尚自如此況終身五戒況沙彌戒況比邱戒耶而世之蔑視戒律別求圓妙者不思甚矣樂戒統業者住持三寶繇戒而存一體三寶繇戒而證故華嚴云具足受持威儀戒法能令三寶種性不斷所以名統業也鏡明之喻蓋一體三寶佛為首法為身僧為衣惟戒能照見之故戒本云如人自照鏡好醜生欣戚又云戒如真寶鏡照法盡無遺五當念天第一四天王第二忉利天鹽天兜術天不憍樂天化應聲天當自念我以有信有戒有聞有施有智是念天者愚癡惡意怒習悉除喜心自生樂天統業譬如寶珠常治清明齊念天者其淨如是果報自然無所造作名之為天四天王東方持國南方增長西方廣目北方多聞守護四天下者居須彌山埵離地四萬由旬忉利天此翻三十三天居須彌山頂四方各八天中為帝釋統御四洲離地八萬由旬鹽天亦云𦦨天亦云須夜摩天此翻時分謂日月光明上照不及身自有光以蓮華開合而為晝夜故離地十六萬由旬於虗空中有地如雲朗然安住兜術天亦云兜率亦云覩史此翻知足謂於五欲皆知止足故離地三十二萬由旬不憍樂亦云化樂謂隨意化諸樂境而無憍縱離地六十四萬由旬化應聲天亦云他化自在謂所受樂境不假作意但任運應現故離地一百二十八萬由旬不言色無色界者且據一日一夜齊戒功德能感此等六天果報故就近而略明之此是念果次我以有信等則是念因繇信三寶及戒故受持齊法不毀故聞此大明法門故能以功德普為衆生故正慧了了不顛倒故得生此六天中受勝妙樂漸次得涅槃也諸經多明六念今以念施攝入念天又此念天法門阿含明念六天謂念繇十善故生天天亦苦空無常無我華嚴明念兜率天上一生補處大士功德涅槃明念第一義天今經事同阿含又華嚴明十善為五乘作根本所以天業統一切也約福德莊嚴以明天業故如寶珠寶殊十種瑩治則能四洲雨寶天業數數習念能助三乘出世善根五乘佛菩薩緣覺聲聞小乘又人天聲聞緣覺菩薩亦名五乘奉持八戒習五思念為佛法齊與天參德滅惡興善後生天上終得泥洹是以智者自力行出心作福不墮愛見名為智者不倚他人名自力行內外一如名出心作福若不力行便同牧牛若不出心便是貴文賤質同彼尼犍幸審思之如是維耶齊之福祐明譽廣遠譬是天下十六大國是十六國滿中衆寶不可稱數不如一日受佛法齊如比其福者則十六國為一豆耳此文缺略應云是十六國滿中衆實以用布施所得福德不如一日受齊福德蓋珍寶布施秪是後世福樂之因一日夜齊決為出世之因又珍寶秪是財施齊戒具足法施無畏施故天上廣遠不可稱說當今人間五十歲為第一天上一日一夜第一四天上壽五百歲彼人間九百萬歲佛法齊者得生此天上天上廣遠不可稱說總標六天報勝也先出第一四王天相略舉壽命長遠以顯福勝餘經明上品十善得生此天正法念處經明不殺功德得生此天今明佛法齊得生此天十善是輪王世間正法不殺是一分優婆塞終身之戒佛法齊是一日一夜精進功德皆得感此果報而齊法果報則不止此具如下文所明人間百歲為忉利天上一日一夜忉利天壽千歲當人間三千六百萬歲餘經明上品十善增上得生此天正法念處經明不殺不盜功德得生此天今亦明佛法齊得生人間二百歲為鹽天上一日一夜鹽天壽二千歲當人間一億五千二百萬歲餘經明上品十善兼學坐禪得生此天正法念處經明不殺不盜不邪淫功德得生此天今亦明佛法齊得生應云一萬萬零四千四百萬歲恐譯者不善方言或復傳寫之誤人間四百歲為兜術天上一日一夜兜術天壽四千歲當人間六億八百萬歲餘經明上品十善兼坐禪得欲界細住乃生此天正法念處經明身三口四功德得生此天今亦明佛法齊得生應云五萬萬零七千六百萬歲人間八百歲為不憍樂天上一日一夜不憍樂天壽八千歲當人間二十三億四千萬歲餘經明上品十善兼修未到地定乃生此天今亦明佛法齊得生應云二十三萬萬零四百萬歲人間千六百年為化應聲天上一日一夜化應天壽萬六千歲當人間九十二億一千六百萬歲餘經明上品十善兼得未到地定乃生此天今亦明佛法齊得生應云九十二萬萬零一千六百萬歲若人有信有戒有聞有施有智奉佛法齊當命盡時其人精神皆生此六天上安隱快樂猗善衆多我少說耳凡人行善魂神上天受福無量猗輕安也維耶聞佛語歡喜言善哉善哉世尊齊之福德甚快無量願受佛戒從今以後月六齊日竭力作福至死盡壽名為死佛說經已皆歡喜受教能說人清淨故歡喜所說法清淨故歡喜聞法獲勝益故歡喜現在福樂後生善處終得大泥洹佛說齊經終附受八關齊法諸經論中具有八關齊法蓋以一往判釋則五戒乃人天因此一日夜戒齊方為出世因也故無論已受五戒未受五戒已至受菩薩優婆塞戒者皆可隨意受持或六齊日或生日諱日或作諸功德日等並應發心秉受本經雖合為八支而秉受時仍作九支陳說無過蓋文有開合義無增減也此依毗婆沙等以易方秉白故受此齊法須一出家人為作證明不問大小兩乘五衆但令舉世不非時食者便可為師設數里內決無其人或可對經像前自誓秉受耳以不非時食為齊體餘支助成蓋生死正因無如淫欲生死增上勝緣無如飲食是故經云一切衆生皆依淫欲而正性命又云一切衆生皆依食住而在家五戒未能永捨家業眷屬緣纍故令於六齊日受此八關戒齊一日一夜種未來世永出因緣先應教受三歸法我某甲歸依佛歸依法歸依僧一日一夜為淨行優婆塞夷如來至真等正覺是我世尊三說我某甲歸依佛竟歸依法竟歸依僧竟一日一夜為淨行優婆塞夷如來至真等正覺是我世尊三說次應教受戒齊法不殺等八支名戒不非時食名齊故名八關戒齊據大智度論三歸竟後應云我某甲若身業不善若口業不善若意業不善貪欲瞋恚愚癡故若今世若先世有如是罪今日誠心懺悔身清淨口清淨心清淨受行八戒如是白已然後云如諸佛云云我今以此八關戒齊功德四恩總報三有齊資普與衆生同生淨土或各有願求俱可加入回向但不可離於佛法薩婆多毗婆沙云受八齊法應言一日一夜不殺生云云令語言決絶莫使與終身戒相亂佛本制一日一夜不得過限若有力能受一日過已次第更受隨力多少不計日數也夫受齊法必從他受於五衆邊優婆塞戒經云若先遣信欲刑戮人信遲未至其人尋後發心受齊當受齊時信至即殺雖後一時以戒力故不得殺罪若諸貴人常敕作惡若欲受齊先當敕語遮先諸惡乃得成就若先不遮輒便受齊者不名得齊欲受齊者先當宣令所屬國境我欲受齊凡是齊日悉斷諸惡罰戮之事
