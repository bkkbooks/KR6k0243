body:
  text: 梵網經懺悔行法明菩薩戒弟子蕅益智旭述經云若有犯十戒者應教懺悔在佛菩薩形像前日夜六時誦十重四十八輕戒苦到禮三世千佛若一七日二三七日乃至一年要見好相便得滅罪此金口明訓也故知法華方等大悲占察等種種行法雖各有滅罪得戒功能而於犯十戒者仍須別依梵網行法方使標心不泛所謂如從地倒還從地起又此經所明千里無師像前自受但云當以七日佛前懺悔得見好相便得戒若不得好相應二七三七乃至一年要得好相而不云苦到禮三世千佛蓋大意與瓔珞地持之自誓受戒同耳故向年已曾述學戒法今則特為受菩薩戒之後犯十重者別明懺儀俾依三世諸佛出罪既見好相則戒體完復雖於比邱法中不任僧用而或為菩薩沙彌或為菩薩優婆塞可無慚德且密默進道直證無生亦非分外事矣其或八戒五戒及沙彌戒破根本者依此懺法見好相已既得菩薩大戒亦仍可許進比邱戒若小乘比邱破根本者依此懺悔見好相已密達無生或仍可附與學之科縱令障深未成感應而永斷相續懇惻求哀必能閉惡趣門植出世種也略為十意一嚴道場二淨三業三香華供養四讚禮歸依五陳罪悔除六立誓誦戒七苦到禮佛八重修願行九旋繞自歸十坐念實相一嚴道場擇取閒靜堂室掃灑清淨中安盧舍那像或釋迦像更安諸菩薩像亦得但須有佛像為主懸設幢蓋及繒綵幡華種種莊嚴須傾竭己財盡心盡力至誠為之勿得苟簡亦勿輒化施主必其貧窶無措方可隨緣求辦二淨三業行者自念繇夙善故今生幸得受戒繇惡障故而復毀犯我既毀犯三世諸佛所設淨戒現今即是地獄中人生大慚愧生大怖畏如處溷廁一心求出如繫牢獄一心求脫不得剎那念世間事沐浴清淨著新潔衣秉志虔誠口無雜語如捧滿油懼其滴墮獨自專精勿求伴侶設有一二同犯戒者慚懼專志決定是一方可同修必以得見好相為期不論一七二七乃至一年乃至畢世心無中懈三香華供養行者初至像前緣想十方一切三寶性同虗空無所不在我罪障故不見不知然諸佛菩薩於我向所作罪今所修行悉知悉見無有遺餘譬如盲人在大衆中所作所為盲不見衆衆皆見盲今我亦爾無明所覆妄於清淨法界體中違犯禁戒造極重罪早為諸佛菩薩所見所知今日覺悟慚懼悔過諸佛菩薩亦必現前知我見我先起如是深信解已於十方三寶如對目前敷具竦立口當唱云一切恭敬一心頂禮十方常住三寶總一禮已燒香捧華胡跪唱云嚴持香華如法供養願此香華雲遍滿十方界供養一切佛尊法諸菩薩無邊聲聞衆緣覺獨覺仙無邊佛土中受用作佛事普熏諸衆生皆發菩提心以手散華次復想云我此香華遍十方以為微妙光明臺諸天音樂天寶香諸天肴膳天寶衣不可思議妙法塵一一塵出一切塵一一塵出一切法旋轉無礙互莊嚴遍至十方三寶前十方法界三寶前皆有我身修供養一一皆悉遍法界彼彼無雜無障礙盡未來際作佛事普熏法界諸衆生蒙熏皆發菩提心同入無生證佛智想已起立唱云供養已一切恭敬一拜四讚禮歸依行者修供養竟一心緣念三寶真實功德哀慕眷戀誓不捨離胡跪合掌口出梵音作是讚歎如來妙色身世間無與等無比不思議是故今敬禮如來色無盡智慧亦復然一切法常住是故我歸依善調心過惡及與身四種到不思議地故我今敬禮知諸爾𦦨法智身無罣礙於法無忘失故我今敬禮稽首過無量稽首無倫等稽首法自在稽首超思惟哀愍覆護我令法種增長逮及最後身常在如來前我所修福業此世及餘生由斯善根力願佛恆攝受偈出大寶積經勝鬘夫人會第四十八讚已一叩首起立唱云一心頂禮過去世盡過去際一切諸佛拜下想云能禮所禮性空寂感應道交難思議我此道場如帝珠一切諸佛影現中我身影現諸佛前頭面接足歸命禮至禮賢聖即以諸佛二字改作賢聖二字一心頂禮未來世盡未來際一切諸佛一心頂禮現在世盡現在際一切諸佛一心頂禮過去世盡過去際一切尊法想云真空法性如虗空常住法寶難思議我身影現法寶前一心如法歸命禮一心頂禮未來世盡未來際一切尊法一心頂禮現在世盡現在際一切尊法一心頂禮過去世盡過去際一切賢聖一心頂禮未來世盡未來際一切賢聖一心頂禮現在世盡現在際一切賢聖各一禮已胡跪唱云我弟子某甲從今時盡未來際身歸依佛歸依法歸依賢聖僧歸依正法戒三說已一叩首隨俯伏想云我及衆生無始常為三業六根重罪所障不見諸佛不知出要但順生死不知妙理我今雖知猶與衆生同為一切重罪所障今對舍那十方佛前普為衆生歸命懺悔惟願加護令障消滅五陳罪悔除行者歸依及運想竟次應胡跪合掌作是唱云普為法界一切衆生悉願斷除三障至誠懺悔唱已五體投地復作是念我與衆生無始來今由愛見故內計我人一外加惡友二不隨喜他一毫之善三惟遍三業廣造衆罪四事雖不廣惡心遍布五晝夜相續無有間斷六覆諱過失不欲人知七不畏惡道八無慚無愧九撥無因果十故於今日深信因果一生重慚愧二生大怖畏三發露懺悔四斷相續心五發菩提心斷惡修善六勤䇿三業翻昔重過七隨喜凡聖一毫之善八念十方佛有大福慧能救拔我及諸衆生從二死海置三德岸九從無始來不知諸法本性空寂廣造衆惡今知空寂為求菩提為衆生故廣修諸善遍斷衆惡十惟願盧舍那佛一切世尊慈悲攝受聽我懺悔運此順逆十心已次應胡跪合掌發露犯戒之罪求於十方現住世間諸佛菩薩以大慈悲為我洗滌令得還淨涕淚號泣作如是說我弟子某甲至心懺悔我及衆生自性清淨無明所覆不自覺知以是因緣長淪生死今者幸逢正法秉受律儀煩惱亂心復違學處造作如是應隨所犯或殺生或偷盜或邪淫或妄語依事說之無羞恥法於佛法海便為永棄應墮阿毗大地獄中猛火熾然受無量苦乃至備歷惡趣無解脫期如是罪障因果不虗諸佛菩薩悉知悉見我今發露不敢覆藏起正直心離諂曲行奉對十方一切如來已入大地諸菩薩衆不惜身命悔過求哀普與衆生洗滌往業從前所作願悉消除自今以後誓不更造惟願諸佛諸大菩薩以大慈悲憐愍於我拔我罪根施我淨戒應須具足三說竟起立唱云懺悔已禮三寶一拜六立願誦戒行者發露悔除已竟應想罪無實性既從緣生還從緣滅罪惡既滅堪住菩薩三聚淨戒胡跪合掌作如是白仰啓十方一切如來已入大地諸菩薩衆我從今日盡於未來誓不退捨大菩提願誓不遠離三聚淨戒惟願十方無邊無際諸世界中諸佛菩薩第一真聖於我某甲重願受持淨戒律儀咸為作證白已至誠展誦十重四十八輕戒法於朗誦時心緣文義勿令散亂若一時不能全誦者分作二時三時乃至六時共誦一周亦可七苦到禮佛行者隨誦戒經多少竟叩首起立添香致敬一心緣念三世諸佛如對目前殷重懇切一一頂禮一心頂禮梵網教主盧舍那佛三禮一心頂禮本師釋迦牟尼佛次即頂禮三世三千諸佛一佛一禮或每時百拜或八十五十或四十三十拜亦可隨力多少但令相續無間禮一部已未獲好相再禮一部乃至十部百部直以得見好相為期又行人色力若康能於七日中禮三千佛一周如是每七一部相續無間彌善設不能者二七日方得一周亦可如是次第隨意多少禮竟次復總禮一拜云一心頂禮盡十方三世一切諸佛一心頂禮梵網經菩薩心地品微妙尊法三禮一心頂禮大小乘毗奈耶藏及十方三世一切尊法一心頂禮玄通華光主菩薩華光王大智明菩薩摩訶薩一心頂禮一生補處彌勒菩薩及十方三世一切菩薩摩訶薩一心頂禮持律大師優波離尊者及一切聲聞緣覺賢聖僧觀想偈如前應知八重修願行行者禮三寶竟添香致敬胡跪合掌隨順彌勒菩薩往昔所修微妙勝行奉對三寶如在目前作是唱云我今歸命禮十方一切佛菩薩聲聞衆大仙天眼者亦禮菩提心遠離諸惡道能得生天上乃至證涅槃若我作少罪隨心之所生今對諸佛前懺悔令除滅我今身口意所集諸功德願作菩提因當成無上道十方國土中供養如來者及佛無上智我今盡隨喜有罪悉懺悔是福皆隨喜我今禮諸佛願成無上智十方大菩薩證於十地者我今稽首禮願速證菩提得證菩提已摧伏於魔軍轉清淨法輪饒益衆生類常願住世間無量俱胝劫擊於大法鼓度脫苦衆生我沒於欲泥貪繩之所繫種種多纏縛願佛垂觀察衆生雖垢重諸佛不厭捨願以大慈悲度脫生死海現在諸世尊過去未來佛所行菩薩道我今願修學具足波羅蜜成就六神通度脫諸衆生證於無上道了知諸法空無相無自性無性無表示不生亦不滅又如大仙尊善了於無我無補特伽羅乃至無壽者於諸布施事不執我我所為安樂衆生施與無慳吝願我所施物不假功用生觀察了知空具施波羅蜜持戒無缺減得佛淨尸羅以無所住故具戒波羅蜜忍辱如四大不生分別心以無瞋恚故具忍波羅蜜願以身心力發起大精進堅固無懈怠具勤波羅蜜以如幻如化及勇猛精進金剛等三昧具禪波羅蜜願證三昧智入於三脫門了三世平等具慧波羅蜜諸佛妙色身光明大威德菩薩精進行願我皆圓滿偈出大寶積經彌勒菩薩所問會第四十二云彌勒名稱者勤修如是行具六波羅蜜安住於十地說已起立作如是唱回向發願已歸命禮三寶一拜九旋繞自歸禮竟起立整理衣服手執香爐立定少傾緣想三寶賢聖畟塞道場各坐法座以次旋身一一遍繞安詳而轉口作梵音唱云南無十方佛南無十方法南無十方僧南無盧舍那佛南無釋迦牟尼佛南無三世三千佛南無梵網經菩薩心地品南無彌勒菩薩摩訶薩如是稱名或三或七旋繞畢還至像前結三自歸自歸依佛當願衆生體解大道發無上心自歸依法當願衆生深入經藏智慧如海自歸依僧當願衆生統理大衆一切無礙和南聖衆十坐念實相行者禮懺竟次應別就坐處端身正坐閉目合口調和氣息如止觀前方便中廣明次即諦觀向所犯罪為因心故犯為因境故犯為亦因心亦因境故犯為不因心不因境故犯若因心故犯彼境不現前時何以無犯若因境故犯境自犯罪不應我犯又若我因境犯則聖人於境何以不犯若亦因心亦因境故犯者為是心境各有犯性待合方犯為是心境各無犯性合乃生犯若心境各有犯性者何須待合又合時便有二犯若心境各無犯性者合何能犯如一砂無油衆砂豈能出油如是因心因境雙因心境尚自不得犯之生處況復不因心不因境而生犯耶當知犯性本自不生我迷倒故於無心無境無持無犯性妄計有心有境有於違犯如是違犯本性空寂非滅故空作是觀已於心無所得於境無所取不見罪生相不見罪滅相但以虗妄顛倒因緣故非生似生以覺悟虗妄顛倒因緣無性故非滅說滅是名觀罪性空此觀若得相續現前自然煩惱漸薄慧性漸開即是得戒之先容也又觀此罪為在內為在外為在中間為在過去為在現在為在未來過去已滅現在不住未來未有云何有罪又觀此罪為身造耶為心造耶若身造者地大造耶水火風大造耶空大造耶若心造者心復云何青黃赤白耶長短方圓耶內外中間耶過現未來耶心尚無形安能造罪如是觀已不得能造不得所造但以無明熏習虗妄顛倒因緣於無能無所性中幼見能造所造今以正智如實觀察身心既空罪福無主如彼霜露慧日能消如久暗室一燈能破又觀此心雖復本性空寂無能無所無罪相無福相繇無相故無礙無際不可思議橫遍豎窮無法不具無法不造隨其所造一法仍復即是全體大用還具一切法還造一切法無有一法而非所造亦無一法而非能造如是觀已即於罪相深達實相實相即是本源成佛常住法身三昧此觀若成必發戒體是故經云應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴也如上事儀名福德莊嚴如上理觀名智慧莊嚴有事儀而無理觀不能清罪之源有理觀而無事儀不能竭罪之流譬如舊井忽墜穢觸宿水臭濁新泉不來理須汲盡并撤汙泥則泉脈冷然不改泄冽也問曰經中制令要見好相坐時何不諦觀諸佛相好乃令推簡入空耶答曰欲觀諸佛相好須是戒根清淨及了達是心作佛是心是佛者方可修習今戒既有缺解未必圓若作意觀相恐招魔事故必以空觀洗滌罪塵也問曰經云觀佛相好滅無量劫生死重罪豈不能滌破戒垢答曰觀相好者實能滅罪然須利智上根方堪修習妙觀而推簡性空則是大乘初門正治破戒心垢問曰彼韋提希及五百侍女何必盡是利智上根答曰梵語韋提希此翻思惟修豈非利智生值佛世親感佛臨豈非上根問曰五停心中多障衆生應修念佛觀豈反招魔答曰報障重者令念佛功德以除夙罪亦未必單念相好若現罪未拔輒求好相戒慧俱劣魔必得便問曰若爾則經中不應令得好相答曰夫好相者不可以有心求不可以無心得今但深觀罪性本空罪既拔已自成感應譬如磨鏡垢淨像現方超有心無心二過問曰圓覺經明修三觀者非彼所聞一切境界終不可取今既觀罪性空設復得見好相豈不境觀相違答曰此事理二懺秪期滅罪原無著意求相之心惟其空觀既深罪根永感應道交好相斯現雖見好相仍了性空故無喜動擾心亦不驚愕亂意如此方是罪滅戒復之相若見好相時不與空觀種應或復喜動擾心不能寂靜或復驚愕亂意不得輕安當知即是魔事切須諳識勿被境迷爾時仍須深入空觀但念惟心若是魔事必漸隱沒若實好相倍復增明而能助發空慧令無取著故知推簡法門於滅罪障有大功能初心易入令蕩無始虗妄我法二執頓達大乘實相止理行者若能如是事理二懺精進勤修不惟滅罪亦有三根證相不同下根先獲戒品清淨復有三品一下品者得諸好夢并覺諸根明淨四大輕安道心增長二中品者於坐禪中見諸靈瑞光華異香善聲稱讚等得法喜樂三上品者於靜心中自見身相端嚴威儀無缺篇聚戒相次第現前安隱無怖中根證得定品清淨或發世間淨禪或發亦世間亦出世禪或復發出世禪是為三品上根證得慧品清淨或發觀行或階相似或入分真具如法華三昧等廣明嘉慶丁丑由白下買舟詣廣陵謁性海大師於高旻溫厚質直德慧具足歎為當代善知識乃歸依座下蒙開示淨業之要尤諄諄以戒律相勉嘗語豫學佛以戒為始基志求佛法而不稟受佛戒猶處門外也更何望升堂而入室嗣豫為業緣所牽涉洞庭登南嶽復由湖湘下九江訪東林遺跡素耳浙中為法道所萃因便至杭既至不謬所聞遂止焉越五年辛巳修行稍稍進步思欲稟受五戒以副性老人囑語既又思受戒者當先明戒相與夫作止持犯之義今日諸方授受都只敷衍儀文未聞委明實義初發心之士於律藏望洋向若知何者為切要之部而肄業及之又律文奧衍律意深微且不能以句讀矧能達其旨趣即欲詢之知識晨星落落又烏從而詢之此見末法講律之難也而在家為尤難資生艱難既不能如出家兒三年五年廣閲教典妻子眷屬之纍復不能如參方人千里百里單丁遠行勢必抱其殘闕守其固陋以沒世耳豈不重可惜哉曩曾聞明蕅益大師有在家律要箋釋之刻年久板朽傳本寥寥竊作是念自欲受戒而苦其懵推之於人亦當然何弗即吾世竭吾才尋取舊章以為依據重訂一善本以行既以自利亦以利後之有志於此者用是留心咨訪冀獲原集年餘值回龍源洪上人與武林錢伊菴居士各檢得集中數種授豫校之原目尚缺受戒品一種又年餘致書越郡戒珠禪遠法師轉求得之而原集始全嗚呼求法如此其難守法者宜何如寶貴矣唯是集所載猶屬簡略因勉成豫重訂之始願而增廣之首録四分律藏一節以著歸戒之始次録厭離功德一經以要歸戒之終他如護身呪經免惡道經所以備勸發歸戒之用無我義經心地觀經所以示大乘了義之談匯入原集在家持律之要可云粗備後復增威儀梵網二經者威儀詳持守之科條梵網為菩薩之行履今既委質於佛法中即不應以拘墟苟簡之見自安於小乘之域至於梵網一懺則以末世衆生障深慧淺易犯難持有此一法庶不終棄録成質之源洪上人以為可行并為募梓以行足徵其愛法之誠云道光乙酉正月元日優婆塞真益陳熙願復齊氏謹記
