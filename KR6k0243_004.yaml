body:
  text: 梵網經心地品菩薩戒姚秦三藏法師鳩摩羅什譯陳隋天台國清智者大師疏明古杭雲棲沙門袾宏發隱明孝豐靈峯沙門智旭合注清優婆塞真益陳熙願節要清瓶窑真寂後學儀潤重刊天台智者大師說曰菩薩戒者運善之初章却惡之前陳直道而歸生源可盡雲棲蓮池大師發隱生源可盡者夫塵劫受生源源不竭良繇謬行邪道迷背忘歸故耳今從此戒止惡行善是繇於正直之道而息妄歸真也豈不能枯愛河之流注乾苦海之汪洋而了證無生耶聲聞小行尚自珍敬木叉大士兼懷豈不精持戒品內外二途咸皆敬奉王家衆庶委質虔恭委身為質一心向服斯乃趨極果之勝因結道場之妙業繇戒成佛故曰極果勝因運善意也仗戒降魔故曰道場妙業却惡意也經稱梵網者欲明諸佛教法不同猶如梵王網目品言心地者菩薩律儀遍防三業心意識體一異名三業之中意業為主身口居次據勝為論故言心地也體一名異者初惟一真凝寂之體繇集起有心之名繇籌量有意之名繇了別有識之名究其根源無二體也菩薩譯云大道心成衆生以其運心廣普因立斯號從初發心終至等覺皆名菩薩也法號即是戒義梵音尸羅大論云秦言性善亦云清涼以其能止破戒熱惱從能得名亦云波羅提木叉譯云保解脫保持三業離諸縛也亦云淨命清淨自活亦言成就威儀威嚴可畏儀軌可則未來生處離三惡道淨土受形防非止惡亦言戒是約義約束而不放縱訓義訓教規誡復言勒義禁義如馬受勒又如奉王禁敕靡敢違犯並是隨義立名今言戒者有律儀戒定共戒道共戒律是遮止儀是形儀能止形上諸惡定是靜攝入定之時自然調善防止諸惡道是能通發真以後自無毀犯初果耕地蟲離四寸道共力也此二戒法既是心上勝用力能發戒道定與律儀並起故稱為共定共者心寂則諸惡不行道共者心明則羣妄自息但修道定戒即圓成故曰與律儀並起若攝律儀攝善法攝衆生此三聚戒名出方等地持不通三藏大士律儀通止三業今從身口相顯皆名律儀也戒兼三業今律儀似偏屬身口者從相顯也攝善者於律儀上起大菩提心能止一切不修善事勤修諸善滿菩提願也戒以止惡為義而曰攝善者即止惡處衆善奉行故曰律儀上起菩提心也攝生者菩薩利益衆生有十一事一衆生饒益事悉與同事二看病三說法四報恩五救苦難開解憂惱六給貧七以德畜衆八安慰衆生九稱有德十折伏過惡令改十一神通示現過惡令人畏避也律儀能令心住攝善自成佛法攝生成就衆生此三攝大士諸戒盡也大論戒品列十種戒一不缺缺者已全廢壞屬根本二不破破者損而未壞屬僧殘三不穿穿者漏而未損屬波夜提四不雜身心俱攝名曰不雜則三失皆免矣五隨道隨順諦理能破見惑六無著見真成聖於思惟惑無所染著此兩約真諦持戒也七智所讚八自在約菩薩化他為佛所讚於世中間而得自在此約俗諦持戒也九隨定不起滅定現諸威儀示十界像導利衆生雖威儀起動任運常淨故名隨定戒滅定示現即真而俗起動常淨即俗而真任運者猶言自然也十具足前來諸戒律儀防止名不具足中道之戒無戒不備故名具足用中道慧遍入諸法故名具足此是持中道第一義諦戒也如是之戒攝一切戒又復入一切戒疏大梵天王因陀羅網千重文綵不相障閡諸佛教門亦復如是莊嚴梵身無所障閡從譬立名總喻一部所證參差不同如梵王網也品名心地者亦是譬名品內所明大士要用如人身之有心能總萬事能生勝果為大士所依義言如地也發隱因陀羅者此云天帝又云天赤珠言大梵天王赤珠羅網紅光互射寶色交輝文彩千重不相障閡也引此以明十方世界安立無量亦復如是十方諸佛教門施設無量亦復如是十方諸菩薩依教修證參差無量亦復如是莊嚴梵身者諸佛本源清淨心體名曰梵身列之為無量世界開之為無量教門化導之為無量修證所以莊嚴此身猶梵王之以珠網為華飾也心地者亦喻言人身百骸並集必有主宰之心菩薩衆德交修必有要妙之用要用者即本源心體戒也萬事因之總統猶地之承載一切也勝果因之發生猶地之長養一切也經名梵網品名心地者以此靈峯蕅益大師合注自性本淨名梵塵界含攝名網爾時盧舍那佛為此大衆略開百千恆河沙不可說法門中心地如毛頭許疏盧舍那翻為淨滿以諸患都盡故稱為淨衆德悉圓名為滿也發隱諸患盡則無妄不消止惡果也衆德圓則無美不集行善果也此大衆者指千華上佛也如毛頭許以少況多極言法門之廣大也是過去一切佛已說未來佛當說現在佛今說三世菩薩已學當學今學我已百劫修行是心地號吾為盧舍那汝諸佛轉我所說與一切衆生開心地道發隱萬聖傳無異辭千賢受無二法亦是自己已試之成法明當遵而可信也轉者傳佛語而及衆生開心地道者本來心地平直虗通無始妄情壅塞滯礙制之以戒則壅去礙除蕩然平直廓爾虗通矣此一經之要旨問攝心為戒云何名開答小乘之戒僅收攝而自守大乘之戒兼開通而利生故攝之義狹開之義廣也爾時蓮華臺藏世界赫赫天光師子座上盧舍那佛放光光告千華上佛持我心地法門品而去復轉為千百億釋迦及一切衆生次第說我上心地法門品汝等受持讀誦一心而行發隱蓮華臺藏者華藏世界也光告者如華嚴雲臺等皆說法也千百億者西域億有四種十萬百萬千萬萬萬今千百億謂千華上百億取千萬為億稱大千之數也轉為連下句言兼為諸佛衆生也約華嚴舍那即是釋迦分勝劣故非一融本迹故非異今乃逐機隨緣在化度門理應開耳合注放光普告者顯心地法門若本若迹若因若果無不以智為前導也故上卷釋迦放光發起菩薩放光集衆今則舍那放光囑授後復釋迦放光誦戒爾時千華上佛千百億釋迦從蓮華臺藏世界赫赫師子座起各各辭退舉身放不可思議光光皆化無量佛一時以無量青黃赤白華供養盧舍那佛受持上說心地法門品竟各各從此蓮華臺藏世界而沒沒已入體性虗空華光三昧還本源世界閻浮提菩提樹下從體性虗空華光三昧出出已方坐金剛千光王座及妙光堂說十世界海復從座起至帝釋宮說十住復從座起至𦦨天中說十行復從座起至第四天說十回向復從座起至化樂天說十禪定復從座起至他化天說十地復至一禪中說十金剛復至二禪中說十忍復至三禪中說十願復至四禪中摩醯首羅天王宮說我本源蓮華臺藏世界盧舍那佛所說心地法門品其餘千百億釋迦亦復如是無二無別如賢劫品中說發隱千佛化為千百億千百億復化無量表心地戒法出生無窮盡也體性三昧者體性繇來本空華光任運自現如太虗遼闊雲霞日月飛走草木萬類紛紜起滅隱顯並行不悖故佛於此定或入或出隨心自在也釋迦千百億身皆先於舍那前受戒乃於十處說法後仍結歸心地表萬法至心而極其餘千百億等者一百億世界佛如是覆述說法推而例之千百億皆然也賢劫品見大本後倣此問華嚴言釋迦以境本定身現起舍那此經言舍那說釋迦受則先有舍那後授釋迦舍那又非釋迦現起者矣二說差異云何會通答釋迦證清淨法身及報應身而法身無形報身有象故現起舍那說此戒法復以應身流布無盡是知據迹則華嚴乃釋迦現起舍那梵網又舍那授法釋迦原本則釋迦舍那雖交相現授而法身則本自常定未嘗動也要之佛證三身非三非一常一常三可先可後誰先誰後不可思議者也合注舉身放不可思議光者迹光與本光無異同是三德祕藏微妙智明也光皆化無量佛者此智是諸佛之母諸佛由此出生也無量華供養者華表妙因妙因從果德起還用莊嚴果德也還本源世界閻浮提菩提樹下者若據下文東方來入天王宮說魔受化經云云應云還至四禪摩醯首羅天王宮先說魔受化經方乃下生人間示現出家詣菩提樹今經明菩提樹下從三昧出正顯八相成道始終皆不離此三昧也又前接至華藏既稱為還今復至南洲亦名還本源世界者前表理為事本今表事為理本故皆得稱還稱本源也何謂理為事本謂本惟圓教一實之理而衆生迷有深淺悟有難易故更設別教通教藏教以開示之又本惟一行是如來行而衆生根有利鈍修有巧拙故更立五行萬行等以收羅之又本惟真常法身而衆生久在輪轉不能自見故更現勝應劣應等身以覺悟之又本惟寂光淨土而衆生迷背日久證入無繇故更垂實報方便同居等土以攝受之是名理為事本也何謂事為理本謂只此因緣生法此法即空即假即中總不得離此正因緣境而別談理性又只此施戒等行或達其三輪體空或知其莊嚴無盡或了其體是法界總不得廢此六度事行而高談理觀又只此丈六常身名為境本定身界內利根即見其坐天衣座轉無生四諦法輪界外鈍根即見其相好無量遍坐道場界外利根即見其一一色相當體無非真實法身故法華經云微妙淨法身具相三十二何處別有四佛為四人說四教耶又只此同居一土斷見思者便能橫見方便破無明者便能橫見實報無明盡者便能橫見寂光方便一土猶可云別在界外實報寂光則未有隔於此土者是名事為理本也方者正也安住正法故云方坐也金剛千光王座下去名華光王座千字即華字之誤妙光堂即普光明殿華嚴七處九會多云不起本處此云復從座起機宜不同所見各別復至四禪乃說此心地法門者本從四禪中放光發起接至華藏世界秉受此法故今仍於四禪說之又帝釋宮等分說此心地法四禪宮中合說此心地法分說表於行布合說表於圓融又顯此心地法雖位位差別總趣極果也爾時釋迦牟尼佛從初現蓮華臺藏世界東方來入天王宮中說魔受化經已下生南閻浮提迦夷羅國母名摩耶父字白淨吾名悉達七歲出家三十成道號吾為釋迦牟尼佛於寂滅道場坐金剛華光王座乃至摩醯首羅天王宮其中次第十住處所說時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔一一世界各各不同別異無量佛教門亦復如是吾今來此世界八千返為此娑婆世界坐金剛華光王座乃至摩醯首羅天王宮為是中一切大衆略開心地法門竟復從天王宮下至閻浮提菩提樹下為此地上一切衆生凡夫癡暗之人說我本盧舍那佛心地中初發心中常所誦一戒光明金剛寶戒是一切佛本源一切菩薩本源佛性種子一切衆生皆有佛性一切意識色心是情是心皆入佛性戒中當當常有因故當當常住法身如是十波羅提木叉出於世界是法戒是三世一切衆生頂戴受持吾今當為此大衆重說無盡藏戒品是一切衆生戒本源自性清淨疏梵網大本一百一十二卷六十一品惟第十菩薩心地品什師誦出上下兩卷上序菩薩階位下明菩薩戒法發隱此戒是梵網經多品中之一品又一品中之下卷前所說法遍指諸世界之一佛今所說法專指此世界之一佛故語似重復而實不濫東方者言此界當華藏中東也下生等者敘釋迦下生之世界國邑父母姓氏出家修道成佛度生之大略也閻浮提此云勝金河出金沙樹流金汁南天下也四天下中惟此有三事勝三事者一勇猛強記二勤修梵行三佛出其土故佛出南洲也迦夷羅此云黃髮昔有黃色仙人於此修道大千世界此為最中故佛於南洲生迦夷也摩耶此云大幻以大幻術母諸佛也白淨或云淨飯悉達具云薩婆悉達此翻頓吉太子生時諸吉祥瑞皆悉具故於寂滅等者明次第周遍說法教化一佛與前多佛同也十住非十住法乃所住十處也八千返者世尊悲願宏深度化無盡追思返此歷數八千金剛座者三世諸佛坐斯成道無少變壞即實相心地為此者為此界衆生坐道場成正覺宏法化也此是總說一代時教摩醯宮中開心地法門則正說此心地戒也復從天宮下至菩提樹下為此衆生說盧舍那初發心所誦戒即是十重四十八輕也初發心者三世諸佛皆先受菩薩戒為初因也一戒猶言此戒又此戒是最上第一戒也光明金剛寶戒者讚此一戒破黑暗如光明碎煩惱如金剛具足法財功德如寶也如來果海此戒為本源菩薩因地亦此戒為本源佛性種子者言此戒是佛性德戒而佛性乃衆生悉具則此戒亦一切衆生從菩薩因至如來果之本源也意識色心而等之以一切蓋言不論是情是心皆入佛性戒中正明衆生皆有佛性也佛性云戒者此戒為佛性種子故也當當云者蓋此戒既佛性種子故受之者當永為成佛正因不墮邪因也當永住於清淨法身不為色身諸欲所染也重言當者決當獲如是大益也如是十波羅提木叉專言十重者舉重以攝輕也出於世界者世所難值而今出焉宜生慶幸勿空過也法戒者此戒既佛性種子是乃衆生法則之戒故當頂戴受持頂戴尊之至也受持執之固也重說者戒為道本不厭頻宣故諸佛半月自誦宣公十遍為期今之重說未為多也無盡藏者此戒含攝無盡無量戒法皆具足也一切衆生戒者此戒上傳千佛下被羣生僧俗同歸鬼畜得與非如聲聞戒之局也本源自性者此戒是佛菩薩之本源本源者即一切衆生同源之自性也性本清淨無有污染此戒乃復其本淨之體非有加於本性之外也合注從初現蓮華臺藏世界者指上卷初於四禪中放光徹照乃至擎接還歸事也寂滅道場即菩提道場菩提是智寂滅是理由坐此處以菩提智證寂滅理故名為菩提道場佛性種子者此戒本以正因佛性為種子起信所謂以知法性無染污故隨順修行尸波羅蜜而緣了佛性又以此戒為種子涅槃所謂一切衆生雖有佛性要因持戒然後乃見因見佛性乃成阿耨多羅三藐三菩提也一切衆生既皆有佛性佛性遍一切法則若意若識若色若心但凡是情是心無不入於佛性戒中此戒的的是常有真因此戒的的是常住法身妙果如是十波羅提木叉出於世界普被羣機故此法戒乃三世一切衆生皆應頂戴受持者也思量名意別指第七了別名識別指第六集起名心別指第八當當猶云的的確確保任行人到解脫岸故名波羅提木叉我今盧舍那方坐蓮華臺周匝千華上復見千釋迦疏我今者八自在我也方者正也安住正法故云坐也發隱涅槃云第一能示一身多身乃至第八身如虗空存沒隨宜如是之我非情見我相之我蓮華臺世界形相似蓮華故云蓮華藏華嚴云華在下擎蓮華二義處穢不污譬舍那居穢不染也藏者包含十方法界悉在中也華含法界表戒含萬法臺者中也表因能起果故譬臺也臺以中位為因而成華表戒以中道為體而成聖又以本佛坐於華臺表戒是衆德之本千華者人中華有十餘葉天華百葉佛菩薩華千葉發隱葉者花瓣一葉有一佛世界故有千佛淨土又一世界中一佛國土此猶略說華嚴重重無盡世界如微塵然乃名廣說一華百億國一國一釋迦各坐菩提樹一時成佛道發隱一華即一葉非全華也上明一葉上一釋迦今明一葉上復有百億國則有百億釋迦舍那為本千釋迦為迹千釋迦為本復生百億為迹本佛迹佛不分前後一時成佛表體用無二道也如是千百億盧舍那本身千百億釋迦各接微塵衆俱來至我所聽我誦佛戒甘露門即開疏如是二句明千百億皆以舍那為本發隱雖名本迹勿生二想千百億身即舍那一身耳千江散影長空止見孤輪萬口傳聲空谷曾無二響應化無窮法身不動亦猶是也接者取有緣之義能接之人是千百億釋迦也自覺己圓力能覺他名能接人各接者千百億佛接千百億塵衆接取有緣揀無緣不接也俱來者能所俱至表體用歸一心也誦佛戒者問何故誦不道說耶答此是三世十方諸佛之法非始自作故秪得稱誦不得道說甘露門者譬服甘露令人長壽不死要因此戒得至涅槃常樂我淨教能通理譬之如門又戒能濟拔免離生死譬如甘露服得命長大經云有山從四方來惟當持戒布施也戒能濟拔下文似濫前然前云長壽自永處涅槃之極位言也如平時服之得仙道故後云濟拔自暫離生死之苦果言也如病患服之得痊可故故不相濫是時千百億還至本道場各坐菩提樹誦我本師戒發隱本道場表本心菩提樹表覺體言以本心覺體持本戒也合注本師指舍那也十重四十八發隱此一句攝全部戒法奉持之要良在於斯戒如日月明亦如瓔珞珠疏持此戒能除罪霧譬之於日使得清涼喻之若月富有善法如瓔珞珠又日能長萬物戒亦如是能生長萬善又如瓔珞能差貧窮戒亦如是能差衆生貧長善法財又如日月麗天無不瞻仰持戒在體無不歸崇瓔珞在身莊嚴第一持戒離醜如端正也發隱離醜有二一以身心言繇此戒故內無邪念離心醜也外無過動離身醜也二以因果言今生持戒來生當得相好端嚴離報醜也合注日消罪霧月照夜幽珠療貧窮律儀義也日長善法月得清涼珠富法財攝善義也日月麗天無不瞻仰瓔珞在身觀者愛敬攝生義也微塵菩薩衆由是成正覺是盧舍那誦我亦如是誦疏如人渡海必假舟航若渡生死要因於戒發隱此勸持也舍那自誦我亦隨誦況諸菩薩乎汝新學菩薩頂戴受持戒受持是戒已轉授諸衆生疏三十心菩薩轉受外凡發大乘心也發隱始聞戒者皆名新學三十心者據別教住行向為內凡十信為外凡則此衆生指信位也推而言之先聞戒者轉授未聞也諦聽我正誦佛法中戒藏波羅提木叉疏此戒簡異外道雞等戒淨戒為因木叉為果發隱簡異者簡別佛法中戒異於外道中戒也波羅提木叉此云保解脫保衛三業得解脫也亦云別解脫持一事得一解脫別別不同故也因果者依戒法因至解脫果也合注戒藏者一切五戒八戒二百五十戒等無不從此大戒流出亦無不攝入此大戒中所謂菩薩毗尼猶如大海也大衆心諦聽汝是當成佛我是已成佛常作如是信戒品已具足疏信是入道初門我持此戒得成正覺汝亦應爾發隱戒已具足者一念信心萬惑俱遣防非止惡盡在於斯何待遮難重詢羯磨三舉然後為戒乎佛唱善來即成沙門正此意也一切有心者皆應攝佛戒衆生受佛戒即入諸佛位位同大覺已真是諸佛子發隱有心者言唯除木石無心則已六道含靈皆應受戒攝者納義外聞內納永持勿失也佛位至遠云何受戒即入蓋此戒是千佛相傳心地佛佛繇此成佛受佛戒豈不即入佛位耶又惡無不除善無不備生無不度者佛也而攝律儀攝善法攝衆生者三聚戒也此受戒所以入佛位也問位既同佛何不名佛而名佛子答位雖同佛功德未圓如儲君決當正位今在東宮名王子也名之王子必紹王位名之佛子必紹佛位豈細故哉大衆皆恭敬至心聽我誦發隱佛自重戒故敕大衆至心今誦戒於千載之下可不如對佛面如聞佛語乎恭者外肅敬者內䖍內外精誠是名至心心地戒品若非至心何繇得入爾時釋迦牟尼佛初坐菩提樹下成無上正覺已初結菩薩波羅提木叉疏釋迦牟尼化主大聖釋尊也樹下得道因名道樹發隱今初字聯後文初字為意初成道果即最初結戒急先務也無上正覺即正遍知號今曰正覺正中自具正遍二義波羅提木叉標菩薩者簡非聲聞是大乘菩薩法也孝順父母師僧三寶孝順至道之法孝名為戒亦名制止疏爾雅云善事父母為孝孝即順也發隱戒雖萬行以孝為宗師僧者是己和尚非泛僧也經舉三種孝因疏唯釋一者父母於人最為切近舉一以例餘也又師僧三寶亦名父母法身繇和尚教誨之力而生即法身父母慧命繇三寶熏修之力而得即慧命之父母也道而曰至揀非偏淺蘭盆疏云大孝釋迦尊纍劫報親恩積因成正覺孔子贊孝曰至德要道又謂聖人之德無以加於孝而程子亦以性命孝悌為一事孝曰至道其誠然乎孝名為戒者結而斷之直以孝名戒也法苑云戒即是孝謂衆生皆吾父母不殺不盜是即為孝意正同此然是戒名為孝未是孝名為戒今明孝順自具戒義如孝順父母則下氣怡聲言無獷逆名口戒定省周旋事無拂逆是名身戒深愛終慕心無乖逆是名意戒順止惡義恐辱其親名律儀戒順行善義思顯其親名善法戒順兼濟義拾椹回凶捨肉悟主錫類不匱名攝生戒師僧三寶亦復如是以要言之但能孝順自然梵行具足戒之得名良以此耳優婆塞戒經云受持戒已不能供養父母師長者得罪正言孝是戒也亦名制止者言制止亦以孝名也制為戒法以止其惡謂之制止今惟孝順自不造惡豈非制止孝經云孝親者非法不言非道不行亦止惡意也上戒字泛指戒體下制止則指所列戒品如十重四十八輕是也只一孝字可概戒義故下制戒中十重第一二三四以至第九第十皆曰孝順心輕垢第一十三十七二十九三十五四十八亦皆曰孝順心至於餘戒多舉父母為言則是貫徹乎十重之始終聯絡乎四十八輕之首尾一孝立而諸戒盡矣合注父母生我色身依之修道師僧生我戒身繇之成佛三寶生我慧命成就菩提故一一須孝順也繇此得至無上大菩提道故云至道之法佛即口放無量光明疏瑞者信也欲說大事前須放光故稱為瑞光是色像之勝放勝光明召有緣衆同來聽戒戒是諸善最勝能滅惡生善口放者表釋尊今日宣說大乘菩薩戒法發隱勝事欲興休徵先現況此心地戒道傳千佛化被羣生莫大於此者安得前無瑞應耶口放有二義一者表此戒法金口敷宣二者表此戒法菩薩聽受而成勝果從佛口生也是時百萬億大衆諸菩薩十八梵天六欲天子十六大國王合掌至心聽佛誦一切諸佛大乘戒疏十六國名出長阿含發隱合掌身業淨至心意業淨耳聽則心專而言寂口業淨聽法者當如是矣佛告諸菩薩言我今半月半月自誦諸佛法戒汝等一切發心菩薩乃至十發趣十長養十金剛十地諸菩薩亦誦發隱此萬世誦戒立法之始也半月半月者望日晦日也月勤二誦恐遺忘也又白月黑月喻善業惡業應自考也合注此日誦戒名為布薩正呼為褒灑陀褒灑是長養義陀是淨義言長養善法淨除不善也佛尚自誦何況餘人佛既自誦益知至佛乃廢之說非盡理矣疏汝等下凡舉五位人一發心謂共地菩薩二十發趣謂初十心依梵網列名一捨二戒三忍四進五定六慧七願八護九喜十頂心三十長養謂中十心一慈二悲三喜四捨五施六好說七益八同九定十慧四十金剛後十心一信二念三回向四達五圓六不退七大乘八無相九慧十不壞心五十地謂登地以上一體性平等地二體性善方便地三體性光明地四體性爾炎地五體性慧照地六體性華光地七體性滿足地八體性佛吼地九體性華嚴地十體性入佛界地共地菩薩者十信發心與佛共地一云即三乘共十地也發趣長養金剛分初中後名三十心初十心即住位中十心即行位後十心即向位十地平等地至入佛界地即歡喜至法雲十地是也此三十心十地與華嚴諸經名小不同其實則一亦誦者舉況之辭菩薩尚誦何況凡小問此言共地與善戒中分十二住為七地六菩薩地一菩薩如來共地同異何如答彼要其終以果言也謂菩薩修行至此同如來故此原其始以因言也謂初發心即同如來故又此經以心地為宗此三十心正心地種種法門十重四十八輕皆三十心中戒心中出如制戒中所明問十地何不言心答三十心是十地之因至十地則所發心成就圓滿上荷佛法下載衆生有地之象故易心言地實心外無地也是故戒光從口出有緣非無因故光光非青黃赤白黑非色非心非有非無非因果法是諸佛之本源行菩薩道之根本是大衆諸佛子之根本疏口能出光名緣必有繇致名因發隱意謂有緣必有因故光光是所得之果必有因以致之也非青黃色心不墮妄境妄情凡小之果也非有無不墮執斷執常偏見之果也非因果不墮有修有證權乘之果也此心地戒本自超情境離斷常絶修證故其得果如是問既曰有因曰得果又曰非因果法何也答有二義一者非世間因果二者非因非果乃所以為正因正果也是諸佛等者諸佛正遍知海汪洋無盡此心地戒為之本源也菩薩萬行開敷成就妙果此心地戒為之根本也一切衆生生生不窮乃至後當作佛者亦此心地戒為之根本也徹聖通凡咸因此戒戒因清淨淨極光通有自來矣合注此光即表無作戒體此無作戒全以性德為其本因故非無因既是全性所起即復全體是性是故非青黃乃至非因果法非青黃等色非分別識心不墮凡愚妄情妄境果也非有非無不墮邪見斷常果也非因果法不墮權小有修有證果也不墮此等諸果乃是法身妙果既是法身妙果亦即成佛真因故諸佛菩薩大衆佛子皆以此為本源是故大衆諸佛子應受持應讀誦應善學發隱受者領納不拒持者操執不忘讀誦者口演其文善學者力行其事舊本善學上無應字連下文佛子為句似為穩當後十重結文中有善學諸仁者句與此正合佛子諦聽若受佛戒者國王王子百官宰相比邱比邱尼十八梵天六欲天子庶民黃門淫男淫女奴婢八部鬼神金剛神畜生乃至變化人但解法師語盡受得戒皆名第一清淨者發隱黃門內宦之通稱金剛神者有大威力能捍外魔護佛法喻如金剛也變化人非如來所作化人應是天龍鬼畜變化而成者也以要言之一切種類皆可作戒器但須能解法師語耳受戒者便得清淨如百川入海同一鹹味也聲聞秉佛剃染若不揀擇恐損正法故重難輕遮稽防特甚菩薩專主利生若不兼容化度有限故淫賤鬼畜容納無餘合注金剛神亦名執金剛神亦名金剛力士持杵隨侍諸佛者佛告諸佛子言有十重波羅提木叉若受菩薩戒不誦此戒者非菩薩非佛種子我亦如是誦一切菩薩已學一切菩薩當學一切菩薩今學已略說菩薩波羅提木叉相貌應當學敬心奉持發隱非菩薩者失現在大乘之名非佛種者失當來極位之果相貌者戒雖無形而有可持守亦云相貌第一殺戒合注此等皆是後人科文發隱淫者生死之原聲聞怖生死故淫先殺者慈悲之敵大士大悲普度故殺先疏淫欲非性罪殺是性罪言殺斷他命故五陰相續有衆生而今斷此相續故云殺也七衆同犯聲聞五衆大同小異合注七衆者一比邱二比邱尼三式叉摩那四沙彌五沙彌尼六優婆塞七優婆夷前五是出家後二是在家大同小異者大謂大乘七衆小謂聲聞七衆發隱五衆者揀在家二衆純舉出家也同者同不許殺異者略三事一開遮異大士見機得殺聲聞雖見不許發隱如殺一人而救多人斷色身而全慧命乃大士之宏規非聲聞力量所及故菩薩開聲聞遮二色心異大士制心聲聞制色發隱制心則併絶殺心制色則僅除殺事三輕重異大士害師犯逆聲聞非逆發隱師能長養法身是佛種子故大士害之犯逆聲聞無望成佛故輕若恃此而故害師則出於有心必墮無間又大士重重於聲聞重也佛言若佛子若自殺教人殺方便殺讚歎殺見作隨喜乃至呪殺殺因殺緣殺法殺業乃至一切有命者不得故殺是菩薩應起常住慈悲心孝順心方便救護一切衆生而反自恣心快意殺生者是菩薩波羅夷罪發隱受佛大戒即佛所生行當紹隆佛種有子之義毋自輕也疏自殺謂自害他命凡三種法內色外色內外色合注內色謂手足等外色謂刀杖木石等內外色謂手執刀杖等令前人命斷名之為殺教人殺者或面教或遣使或作書等方便殺者殺前方便所謂束縛繫等發隱繇束縛繫等而後殺也合注或指示道路令前人捕獲亦名方便讚歎殺者前人本無殺心讚譽令起隨喜殺者前人先有殺心獎勸令成呪殺謂毗陀羅等雖假餘緣亦皆同犯發隱毗陀羅惡呪名假餘緣者雖非全用呪殺而惡心魘魅呪為之主也合注乃至呪殺者作起尸呪及伏弩火坑等種種惡事具如五戒相經廣明殺因者心欲前人命斷殺緣者方便助成其事殺法者刀劒坑弩毒藥呪術等殺業者前人命根不得相續乃至一切有命者下及微細有情如蜎飛蠕動等不得故殺者揀非誤傷常住慈悲心兩解一云應學常住佛起慈悲二云心恆應常住慈悲之地孝順心秉教不惱他發隱殺事逆天悖理即是不孝不順方便救護非直爾不惱乃應涉事救解發隱但能不惱差可免愆若不救護何名大士故不殺仍應救生不盜仍應布施後皆例此合注恣心者因貪起殺不知制止快意者因瞋起殺泄其怨恨是菩薩者繇本受戒故有此名波羅夷罪者此云棄罪犯此戒者永棄佛海邊外永失妙因妙果亦云墮罪犯此戒者墮落三途亦云他勝處法受菩薩戒本欲破壞煩惱摧伏魔軍今犯此戒反被煩惱所勝又被魔軍所勝亦云是極惡法亦云是斷頭法亦云如斷多羅樹心如針鼻缺如大石破二分等發隱波羅夷此云極惡又云棄言極惡罪大永為棄物僧祗律三義一退沒義道果喪失故二不共住義法衆不容故三墮落義死入地獄故合注此戒具二業成罪一性業二遮業性業者雖不受佛戒世間法爾有罪如輪王十善亦制殺生國制殺人會須償命遮業者佛制之所遮止犯者得破戒罪此之殺業不受戒人但得性罪已受戒者兼得性遮二罪也問同一殺盜淫妄等事未受戒人止得一罪已受戒人反得二罪則受戒乃招罪之途有損無益答受佛戒即入佛位皆名第一清淨功德豈可思議惟其持者功德力大所以破者罪業倍深功德力大必宜秉受罪業倍深必宜莫犯也此戒備四緣成重一是衆生二衆生想三有殺心四前人命斷一是衆生者略為三品上品謂諸佛聖人父母師僧佛不受害但令惡心出其身血即犯逆罪害阿羅漢犯逆三果以下但犯重菩薩取發趣以上害者犯逆害外凡位未入畢定性者但犯重殺父殺母殺和尚殺阿闍黎同犯逆罪中品謂一切人天害皆犯重下品謂四趣衆生修羅鬼神畜生等此有兩解一云同重大士防殺嚴故一云但輕垢在重戒中兼制以非道器故文云有命者舉輕況重耳二衆生想者有當有疑有僻共成六句謂實是衆生實衆生想實非衆生非衆生想二句為當實是衆生心中疑為是衆生耶非衆生耶實非衆生心中疑為是衆生耶非衆生耶二句為疑實是衆生心中決謂非衆生想實非衆生心中決謂是衆生想二句為僻若衆生衆生想衆生疑殺者犯重若衆生非衆生想如見蛇誤以為繩見蟲誤以為土雖斫之捻之本無殺心無犯戒罪若非衆生作衆生想及疑如見繩誤以為蛇見土誤以為蟲斫之捻之雖無所害具有殺心犯輕垢罪若非衆生非衆生想此全無罪又聖人聖人想父母父母想師僧師僧想人天人天想等各有六句結判逆與非逆若重若輕可以例知三殺心者謂惱害前境願其命斷正是業主殺心復二一通心二隔心通心者如漫作坑弩漫為燒斫隨有死者皆悉犯重都無死者犯方便罪隔心者本為此人作殺方便誤傷彼人於彼人都無殺心故不結罪仍於此人邊結方便罪四前人命斷者色心連持相續不斷名為命根今使不得相續故成殺業發隱或問沙門專慈悲之業王臣主生殺之權有罪不誅何以為國答準見機得殺之例則有罪而殺殺何犯焉況斷死必為流涕三覆然後行刑是國政佛心兩無妨礙也問人可見機物應無論是以太牢享帝大烹養賢云何王臣制殺畜類答人惟犯惡而服上刑物成何罪而就死地且神享克誠不妨𧟇祭孔樂蔬水豈必肥甘宴享用牲蓋佛法未入中國之權教耳執為常法可乎即如梁武帝為犧牲祀先之禮既成殺生之戒不破亦曲盡權宜之法然而準孔子謂象人而葬為無後之義則梁武之行君子猶不滿焉何也以其象牲以祀彼生固無傷而吾心則已薄也奈何用真牲而不恤也吾知拘墟之見必執人畜貴賤之說以相難而有生同原之理則彼不知人死為羊羊死為人之言則彼不信吾其如之何哉有志者亦自淑其身而可矣問牛羊犬豕可弗殺矣豺狼當道虎豹食人則將如之何答猛獸懷德而渡河鱷魚感誠而遠徙果能如是安用殺為其或不然捕蝗斬蛟除害為民等國常刑應所不禁合注凡於戒律須善識開遮唐譯菩薩戒本云若諸菩薩安住菩薩淨戒律儀善權方便為利他故於諸性罪少分現行繇是因緣於菩薩戒無所違犯生多功德謂如是菩薩見劫盜賊為貪財故欲殺多生或復欲害大德聲聞獨覺菩薩或復欲造多無間業見是事已發心思惟我若斷彼惡衆生命墮那落迦如其不斷無間業成當受大苦我寧殺彼墮那落迦終不令其受無間苦如是菩薩意樂思惟於彼衆生為當來故深生慚愧以憐愍心而斷彼命繇是因緣於菩薩戒無所違犯生多功德解曰此則大悲增上純以代苦之心而行殺業也深生慚愧明其不自以為功能以憐愍心明其實無一念瞋忿故雖甘受犯戒之罪而究竟無違犯耳倘私念未忘或貪圖功德駕言於大士宏規豈能免性遮二業哉又須明異熟果報異熟者異時而熟異處而熟異時者今生造業或現生受報或來生受報或無量生後受報異性者造業通於三性謂善不善無記受報惟屬無記之性異處者人中造業六道酬償也此殺生罪果報何如華嚴二地品云殺生之罪能令衆生墮於地獄畜生餓鬼若生人中得二種果報一者短命二者多病解曰三塗是正報人中是餘報也上殺墮地獄中殺墮畜生下殺墮餓鬼或約前文三品衆中分上中下或約殺心猛弱分上中下或雖造上罪殷勤悔過轉成中下雖造下罪護過飾非不知慚愧轉成中上十善業道經云若離殺生即得成就十離惱法一於諸衆生普施無畏二常於衆生起大慈心三永斷一切瞋恚習氣四身常無病五壽命長遠六恆為非人之所守護七常無惡夢寢覺快樂八滅除怨結衆怨自解九無惡道怖十命終生天若能回向阿耨多羅三藐三菩提者後成佛時得佛隨心自在壽命解曰離十惱法是花報自在壽命是果報也第二盜戒合注不與而取他物名之為盜疏七衆同犯聲聞五衆有同有異同者皆不應盜異者有三一開遮異如見機得不得等大士為物種種運為皆得聲聞自度必依規矩發隱非菩薩至公無我大慈利物不得見機輒開也聲聞人佛滅後盜佛物輕菩薩恆重發隱良由聲聞止為一身菩薩紹隆三寶應護持所有增益所無而反取之是監守自盜也豈不倍常人一等又本應與他外命反取豈是大士之心也發隱言財物本當捨彼乃反取耶若佛子自盜教人盜方便盜呪盜盜因盜緣盜法盜業乃至鬼神有主劫賊物一切財物一針一草不得故盜而菩薩應生佛性孝順心慈悲心常助一切人生福生業而反更盜人財物者是菩薩波羅夷罪合注自盜有八種或灼然劫取或潛行竊取或詐術騙取或勢力強取或詞訟取或抵謾取或受寄托而不還或應輸稅而不納是名八種教人盜者教人作八種盜若利不入己不結重罪是此戒兼制耳方便盜者彼物自來方便藏舉如攘羊之類呪盜者以種種呪術取他物或遣役鬼神等疏運手取他物離本處成盜業業是造作為義重物謂五錢也按五錢猶如五個大銅錢或取五錢或取值五錢物皆是律云大銅錢準十六小錢其中錢有貴賤取盜處為斷發隱下文三一針一草皆盜疏何云五錢蓋針草判盜五錢判重也離處成盜業未離處猶在盜法也合注乃至等者舉輕況重發隱問取劫賊物云何犯盜答若劫是他物他於我無與皆不與取也佛性者一切衆生皆有當果之性性是不改為義合注即前戒中常住之意發隱當果之性者當來佛果性本同然背性習惡自戕善本合注反更盜人財物意顯從人邊結重也此戒亦具性遮二業以侵他依報奪他外命令他憂苦王法亦治罪故五緣成重一是有主物二有主想三盜心取四值五錢五舉離本處主有三品若佛物法物現前僧物四方僧物父母師長物名上品若人天物名中品若鬼神畜生物名下品盜上品及中品人物則重盜中品中天物及下品物結輕或雖重不失戒二有主想亦具當疑僻六句有主有主想有主疑二句結重無主有主想有主疑二句結輕有主無主想無主無主想二句無犯三盜心者非與想非己物想非糞掃想非暫用想非親厚想正是業主四值五錢者西國一大錢值十六小銅錢若取五錢若取值五錢物結重四錢以下結輕或雖重不失戒若二番三番共取五錢物有意相續者數滿結重無相續意者逐次結輕若所取物此處不值五錢取處值五錢者結重若此處值過五錢取處不值五錢結輕五舉離本處者他物置在本處移動令出本界或自移或教他移或方便移或呪移從此時結成盜罪詳如五戒相經中說若抵債不還前人決作失想時結罪若受寄不還亦於前人決作失想時結罪若二人共盜取物離本處值五錢雖分時各得減五錢然各犯重此生有戒無戒後生憶不憶等具於殺戒中辨不犯者與想己物想糞掃想暫用想親厚想若癡狂若病壞心開遮者菩薩戒本云又如菩薩見劫盜賊奪他財物若僧迦物窣堵波物取多物已執為己有縱情受用菩薩見已起憐愍心發生利益安樂意樂隨力所能逼而奪取勿令受用如是財物當受長夜無義無利由此因緣所奪財寶若僧伽物還復僧伽窣堵波物還窣堵波若有情物還復有情菩薩如是雖不與取而無違犯生多功德解曰以憐愍心能生功德還復故無犯倘分毫沾染是名賊復劫賊矣果報者偷盜之罪亦令衆生墮三惡道若生人中得三種果報一者貧窮二者共財不得自在共財者世間財物五家所共謂王賊水火不肖子孫惟功德法財乃不共他有也十善業道經云若離偷盜即得十種可保信法一資財盈積王賊水火及非愛子不能散滅二多人愛念三人不欺負四十方讚歎五不憂損害六善名流布七處衆無畏八財命色力安樂辨才具足無缺九常懷施意十命終生天若能回向菩提後成佛時得證清淨大菩提智第三淫戒疏七衆同犯大小乘俱制而制有多少五衆邪正俱制二衆但制邪淫發隱邪正俱制名多但制邪淫名少合注淫者污穢交遘鄙陋堪恥名非梵行亦名為不淨行正是生死根本按淫為生死根本若欲出離生死在家亦應竟斷淫欲不止禁邪淫也若佛子自淫教人淫乃至一切女人不得故淫淫因淫緣淫法淫業乃至畜生女諸天鬼神女及非道行淫而菩薩應生孝順心救度一切衆生淨法與人而反更起一切人淫不擇畜生乃至母女姊妹六親行淫無慈悲心者是菩薩波羅夷罪合注自淫者自作污行教人者勸他作污染行如媒嫁等事自無迷染但結輕垢是此戒兼制不同殺盜一概結重或有一種別異煩惱教人於自身行淫此則結重淫因者染污之心淫緣者瞻視隨逐等事淫法者摩觸稱歎等事淫業者二根交接入如胡麻許即成淫罪不論精之出與未出乃至畜生女等舉劣結過非道者一非時或在日中或月六齊日年三齊月或八王日或自妻娠妊産後等二非處除小便道或於大便道及口中三非女或是男子或黃門二根四處女未曾嫁人又非己所攝受五他婦屬他所攝六自身令他人於自身或大便道或口中作不淨行此六皆不順世間道理故名非道也淨法與人應教人精持梵行永離生死苦本也此戒舊云非性惟遮以男女居室世法所不禁故今言正淫可爾若邪淫事安得無罪況出家人既不娶婦觸境皆邪故知亦具性遮二業若在家菩薩受八關齊一日一夜斷於正淫可云唯遮業耳三緣成重一是道二淫心三事遂一是道者小便道大便道口道若人女天女修羅女鬼神女畜生女若人男天男修羅男鬼神男畜生男若人黃門畜生黃門人二根畜生二根乃至一切已死者但令三道未壞於中行淫皆波羅夷二淫心者心生喜樂三事遂者於三道中男根得入如胡麻許據此時結重罪失戒體未入而中止結方便罪不犯者為怨家所執如熱鐵刺身惟苦無樂或熟睡不知或狂亂壞心出家五衆全斷淫欲在家二衆惟制邪淫就己妻妾復制非時非處又月六齊日年三齊月等若受八關戒時無復邪正一切俱制犯者皆結重罪大小乘略不同小乘夢中失精不犯或云但自責心大乘若夢行淫寤應生悔訶責煩惱倍於聲聞也開遮者菩薩戒本云又如菩薩處在居家見有女色現無係屬習淫欲法繼心菩薩求非梵行菩薩見已作意思惟勿令心恚多生非福若隨其欲便得自在方便安處令種善根亦當令其捨不善業住慈愍心行非梵行雖習如是穢染之法而無所犯生多功德出家菩薩為護聲聞聖所教誡令不壞滅一切不應行非梵行解曰處在居家則斷非出家人事現無係屬則斷非他所守護繼心來求則斷非自起染心方便安處則斷是以禮攝受故無犯而有功也出家菩薩護聖教誡豈容稍藉口哉果報者邪淫之罪亦令衆生墮三惡道若生人中得二種果報一者妻不貞良二者不得隨意眷屬解曰邪淫亦三品分別母女姊妹六親行淫名上品餘一切邪淫名中品己妻非時非處等為下品又約心猛弱論三品又約悔不悔論三品致感三塗也十善業道經云若離邪行即得四種智所讚法一諸根調順二永離喧掉三世所稱歎四妻莫能侵若能回向菩提後成佛時得佛丈夫隱密藏相第四妄語戒疏七衆同犯大小同俱制與聲聞同異大略同前妄是不實之名欺凡罔聖回惑人心所以得罪若佛子自妄語教人妄語方便妄語妄語因妄語緣妄語法妄語業乃至不見言見見言不見身心妄語而菩薩常生正語正見亦生一切衆生正語正見而反更起一切衆生邪語邪見邪業者是菩薩波羅夷罪合注虗而不實欺凡罔聖回惑人法名為妄語此有四別一妄言謂如見言不見不見言見之類又如實有言無實無言有乃至法說非法非法說法等但令違心而語皆名妄言二綺語謂一切華靡淫辭無義無利及一切世間王論賊論飲食論等三兩舌謂向此說彼向彼說此互相離間令成乖諍四惡口謂粗重罵詈忿怒呪詛令他不堪此戒正制大妄語罪餘一切妄言綺語是此戒兼制若兩舌惡口重者自屬說過毀他輕者自屬十三十九戒制也自妄語者自言我得十地辟支四果四向四禪四空成不淨觀成安般念六通八解天來龍來修羅鬼神悉來問答或言已斷結使或言永離三塗如是等虗而不實圖致名利名大妄語教人妄語者教人為我傳揚美德以致名利同重若教人自言是聖名利自屬彼人但結輕垢此戒兼制方便妄語者作種種顯異方便或借鬼神仙乩或用呪術令人得夢境等乃至等者舉輕況重兼制小妄言也身心妄語者身業表相亦名妄語如問其得果點首示相問清淨不默然不答等繇欺妄心表示身相令前人領解口雖不言亦名妄語也正語者如實而語正見者為生死為菩提為衆生不為名利邪語邪見反此可知邪業者依於邪語邪見必成邪命惡業也疏此戒備五緣成重一是衆生合注上中下三品如前說上品境中向父母師僧妄語犯重向諸聖人妄語此人不惑又能以神力遮餘人令不聞但結方便罪若聖人中未證他心智者向說仍重向中品境天人等同重正是回惑之境或諸天有他心通不受其惑亦止結方便罪向下品境或云同重義疏結輕今言下境既有解語受戒之機向說亦應犯重以鼓惑鬼畜尤堪作名利媒故或可失戒猶許重受或可結不失戒重耳二衆生想有當有疑有僻發隱假令有羅漢於此當者作是想言當是羅漢對之妄語其罪則輕疑者作是想言是羅漢耶非羅漢耶對之妄語其罪稍重僻者作是想言實非羅漢對之妄語其罪更重有凡夫於此或作想言當是凡夫其罪則重是凡夫耶非凡夫耶其罪稍輕實非凡夫其罪更輕合注當疑僻六句二重二輕二無犯如前可例三欺誑心是業主合注謂希圖名利非增上慢亦非戲笑假說正是業主此仍分通心隔心若通欲一切人聞隨有聞者結重若本惟欲此人聞此人不聞而彼人聞於彼無欺誑心總不結罪還於此人結方便罪若增上慢亦犯輕垢戒本經云菩薩見味禪以為功德是染汙犯也發隱增上慢者非明知己不是聖故言是聖以誑衆生特繇小有所得生增上想將謂是聖不自覺知故止輕垢四說重具謂身證眼見若說得四果十地八禪神通若言見天龍鬼神悉是重具合注雖四禪四空凡外亦能修證而是世間勝法故亦同重不淨安般二觀乃佛法二甘露門今言成就即是有證有得天龍等來正是彰其聖德斷結使離三塗皆屬果證中事故皆犯重若言成就總別相念暖頂等法乾慧性地別十信圓五品既是凡夫法似不結重或雖重亦不失戒若言旋風土鬼來至我所若言持戒清淨善通三藏能習禪思等虗而不實皆犯輕垢五前人領解若對面不解且結方便後追思前言忽解者則壞輕結重發隱語出而人不解則未成語禍故領解成重合注或自說或教人說或作書說但令彼人領知信服據此時結重若人問汝得果得道否若點首自肯者結重默然不言非者結輕其餘小妄言等隨一一語結一一輕垢隨多人領解結多多輕垢不犯者狂亂病壞心及戲笑說誤說獨說此亦性遮二業開遮者戒本云又如菩薩為多有情解脫命難囹圄縛難等雖諸菩薩為自命難亦不妄語然為救脫彼有情故知而思擇故作妄語自無染心惟為饒益諸有情故於菩薩戒無所違犯生多功德又大般涅槃經云一切衆生雖有佛性要因持戒然後乃見因見佛性得成阿耨多羅三藐三菩提若有說言佛說一切衆生悉有佛性煩惱覆故不如不見是故應當勤修方便斷壞煩惱作是說者當知不犯四重若有說言我已成就阿耨多羅三藐三菩提何以故以有佛性故當知是人犯波羅夷果報者妄語之罪亦令衆生墮三惡道若生人中得二種果報一者多被誹謗二者為他所誑綺語之罪亦令衆生墮三惡道若生人中得二種果報一者言無人受二者語不明了解曰大妄語亦分三品對父母師僧人天為上品對鬼畜等為中品對佛菩薩聖人為下品以不受惑故也又欺誑心強弱分三品又悔不悔分三品以此牽墮三塗小妄語及綺語則對上境為上品罪在欺侮故對中境為中品對下境為下品又亦約心約悔論三品牽三塗也十善業道經云若離妄語即得八種天所讚法一口常清淨優鉢羅香二為諸世間之所信伏三發言誠證人天敬重四常以愛語安慰衆生五得勝意樂三業清淨六言無誤失心常歡喜七發言尊重人天奉行八智慧殊勝無能制伏若能回向菩提後成佛時即得如來真實語若離綺語即得成就三種決定一定為智人所愛二定能以智如實答問三定於人天威德最勝無有虗妄若能回向菩提後成佛時得如來諸所授記皆不唐捐淨戒品云斷妄語者不復造作惡業何以故以他問時如實答故若在閒靜不起妄念何以故若人問我汝閒居時生妄念否若言無者是虗妄語若言有者羞愧他人以是因緣能令妄心漸漸微薄若究極理解違如實理有所言說皆名妄語凡夫說有違於本空外道說無違於緣起二乘說真違俗菩薩說俗違中別教說中雙違二諦惟圓人了達法界如理而說名不妄語亦名非無義語第五酤酒戒疏七衆同犯大小乘俱制大小同異者同不應酤菩薩以利物故重聲聞止不應作犯七聚貨賣但犯第三篇酤即貨𧵍之名酒是無明之藥令人惛迷大士之體與人智慧以無明藥飲人非菩薩行大論明酒有三十五失所以制此為菩薩十重中攝也發隱智論三十五失始於現生虗乏終於來世愚癡又四分明三十六失始於不孝父母不敬三寶終於落水失火凍死熱亡故知酒者大則喪失慧命小復傷殘色身若佛子自酤酒教人酤酒酤酒因酤酒緣酤酒法酤酒業一切酒不得酤是酒起罪因緣而菩薩應生一切衆生明達之慧而反更生一切衆生顛倒之心者是菩薩波羅夷罪疏酤者求利教人者令人為我賣酒亦同重教人自酤罪輕發隱教人自賣則利歸人因緣者備五也一是衆生二衆生想三希利貨𧵍四真酒五授與前人合注衆生三品如上說上品者賣與無醉亂人則輕賣與有醉亂人則重中品人天正是所制犯重下品舊云結輕以亂道義弱故今云酤與受戒鬼畜等亦重發隱問人天因醉而亂則誠然云何上品亦有亂者答此有二義一則師僧父母未必是聖二則小聖亦有亂者如降龍羅漢之類合注衆生想者有醉亂醉亂煩疑犯重餘四句輕又中品中品想疑二句則重中品下品想及下品三句皆輕又下品有戒有戒想疑二句則重餘四句輕希利貨賣正是業主出家菩薩一切販賣求利都制在家菩薩止許如法求財不許作此惡律儀也真酒者飲之醉人犯重飲不醉人無罪發隱一切酒者謂酒有多種俱不得酤大莊嚴論云佛說身口意三業之惡行惟酒為根本惡行根本正起罪因緣也明達者簡是別非無所昏蔽曰明趣是背非無所滯礙曰達問飲酒犯輕酤酒未必飲云何犯重答繇酤乃有飲飲之害有限酤之禍無窮故重也合注此惟遮業以王法所不禁故然是惡律儀雖不受戒人作此業者亦招苦報故特為大士設此厲禁遍觀律論唯遮不開果報者過酒器與人飲酒尚云五百世無手況復酤酒第六說四衆過戒疏七衆同犯大小乘俱制大士掩惡揚善為心故罪重發隱大士慈物為心但有所說皆傷慈上者第二篇中者第三篇下者第七聚聲聞法如此發隱聲聞分罪輕重衆謂同法四衆合注說者向未受菩薩戒人說大乘七衆罪過向未受具戒人說比邱比邱尼罪過也若佛子口自說出家在家菩薩比邱比邱尼罪過教人說罪過罪過因罪過緣罪過法罪過業而菩薩聞外道惡人及二乘惡人說佛法中非法非律常生慈心教化是惡人輩令生大乘善信而菩薩反更自說佛法中罪過者是菩薩波羅夷罪合注出家在家菩薩即通指大乘七衆比邱比邱尼即別指小乘二衆以住持僧寶關係法門故亦同重罪過因等應云說因說緣說法說業因者說罪之心緣者欲說時莊嚴方便法者輕重罪相業者了了出口前人領解二乘名惡人者執一定之規繩疑大人之作略不知大乘妙用故斥之為惡人佛法中罪過者揀非外道罪過亦持非犯邊罪已失戒人罪過也發隱既云同法若遇有過應當三諫殷勤密令悔改內全僧體外護俗聞而乃恣口發揚豈大士之心耶合注此亦性遮二業六緣成重一衆生二衆生想三說罪心四所說過五所向人六前人領解衆生者上中二境有菩薩戒有比邱比邱尼戒者重無戒者輕下境舊云有戒無戒皆輕今云有菩薩戒者宜重但未必失戒耳若前人實犯重罪已失戒者說但犯輕或雖犯重而未失戒或雖失戒如法重受說皆犯重衆生想者有戒無戒六句二重四輕說罪心者有兩一陷沒心欲令前人失名利等二治罰心欲令前人被繫縛等此二心正是業主不論是實是虗皆犯重若獎勸心說及僧差說罪皆不犯所說過者或說罪事或說罪名各有當疑僻六句罪事者殺盜淫妄飲酒食肉等事罪名者大則七逆十重輕垢小則五篇七聚等名若重名重事作重想重疑而說犯重作輕想說犯輕若輕名輕事作輕想輕疑而說犯輕作重想說犯重所向人者上中二境無菩薩戒為說菩薩七衆罪過犯重無比邱比邱尼戒為說二衆罪過犯重若向有大乘戒有具戒者如法說實舉過令其懺悔不犯若所說不實自屬謗毀戒也下境不論有戒無戒向說皆輕損毀不深故前人領解者口業事遂據此時結罪隨語語結隨人人結若未解時止結方便小乘說第一篇犯第二說第二篇犯第三說第三篇以下悉犯第七聚大士宜掩惡揚善故說重同重說輕同輕開遮者惟除僧差及獎勸因緣餘悉不開果報者若所說是實即上品兩舌亦兼惡口若所說不實復是妄語其報具列華嚴二地品中發隱問菩薩說外道之過不令惑衆犯重否歟答經言佛法中則揀非佛法矣此之說過正大士摧邪顯正之大權也焉得犯問菩薩說惡比邱之過不令衆效其所為犯重否歟答疏開獎勸被差則惟除惡心私心耳此之說過正大士勸善懲惡之大機也焉得犯問菩薩而作言官說百寮之過不令天下受其害犯重否歟答經舉四衆則揀非四衆矣此之說過正大士忠君報國之大義也焉得犯第七自讚毀他戒疏自讚者稱己功德毀他者譏他過惡備二事故重發隱明單者不犯重七衆同犯大小乘俱制菩薩利安為本故讚毀罪重聲聞不兼物毀他犯第三篇自讚犯第七聚若佛子自讚毀他亦教人自讚毀他毀他因毀他緣毀他法毀他業而菩薩應代一切衆生受加毀辱惡事向自己好事與他人若自揚己德隱他人好事令他人受毀者是菩薩波羅夷罪合注顯己德而彰人短使名利歸於自身故犯重也若但以貪心自讚但以瞋心毀他各各結染污犯戒本經中別有此條今經亦此戒兼制也教人者或教人讚我毀他則重或教彼自讚毀人則輕因者貪名利之心緣者作諸方便法者陳其善惡業者前人領解此亦性遮二業五緣成重一衆生二衆生想三讚毀心四說讚毀具五前人領解衆生者上中二境重下境輕衆生想者上中上中想疑二重餘四句輕或下境作上中想亦重也讚毀心者欲彰彼短使名利悉歸於己非為折伏非為利益也說讚毀具者一種性或尊或卑二行業或貴或賤三伎術工巧或上或下四過犯或有或無五結使或輕或重六形相或好或醜七善法或具或不具前人領解者口業事遂隨語語結重開遮者戒本經云若輕毀外道稱揚佛法若以方便令彼調伏捨離不善修習善法又令不信者信信者增廣果報者自讚若實即如淫女為一錢故而現戲笑若復不實自得大妄語報毀他若實名為惡口不實復兼妄語所有果報悉如華嚴二地品說發隱菩薩善戒經云若菩薩為人所讚言是十住若阿羅漢等默然受者得罪據此則受人讚亦不可何況自讚而兼毀他耶第八慳惜加毀戒疏求財請法慳吝不與復加毀辱頓乖化道故得罪七衆同犯大小大全共菩薩不揀親疏求者皆施不與加辱皆犯以本誓兼物故聲聞惟弟子不教法犯第七聚不與財不制尼家二歲內不與財法犯第三篇二歲外不與犯第七聚發隱二歲內出家未及二年也初始出家未能自立財法之與宜急已經二歲稍能自立與或可緩聲聞不與財不制尼雙制者以女乞財法兩俱不易故加毀隨事各結不合為重發隱慳毀二事不相合成重言各結罪不同讚毀例也若佛子自慳教人慳慳因慳緣慳法慳業而菩薩見一切貧窮人來乞者隨前人所須一切給與而菩薩以惡心瞋心乃至不施一錢一針一草有求法者不為說一句一偈一微塵許法而反更罵辱者是菩薩波羅夷罪合注惡心者慳吝鄙惜瞋心者不喜其人明非見機折伏也此亦性遮二業五緣成重一衆生二衆生想三慳毀心四示慳毀相五前人領納衆生者上中二境及下境有戒者悉重餘輕衆生想六句三重三輕如上說慳毀心者謂惡瞋吝惜財法欲以打罵拒絶是犯若彼不宜聞法得財宜見訶辱皆不犯示慳毀相者或隱避不與財法或言都無或手杖驅斥或惡言加罵或自作或使人打罵皆重前人領納者知我吝惜之相受我打罵之辱隨事隨語結重若彼遣使求財請法對使人慳惜遙作訶罵既非對面損惱稍輕皆不結重或雖重不失戒也不犯者戒本經云若自無若求非法物若不益彼物若以方便令彼調伏若彼犯王法護王意故若護僧制此明不與財非犯也又云若外道求短若重病若狂若知不說令彼調伏若所修法未善通利若知前人不能敬順威儀不整若彼鈍根聞深妙法生怖畏心若知聞已增長邪見或毀呰退沒若彼聞向惡人說此明不與法非犯也又菩薩善戒經云求者三至若不施者是名犯重不犯者若以方便善語慰喻令彼求者不生恨心又菩薩攝受徒衆即應以二事將護所謂法及衣食亦應此戒兼制開遮者戒本經云觀衆生應以苦切之言方便利益恐其憂惱而不為者是犯非染污起不犯者觀彼現在少所利益多起憂惱果報者慳毀之罪亦在三塗又慳財餘報生生貧窮慳法餘報世世愚鈍發隱身貧乞財心貧乞法隨其所須而給與之故云一切優婆塞戒經云見乞者多少隨宜給與空遣還者得罪按此在家菩薩尚然況出家菩薩學大悲者耶問自理未明無法誨彼奈何答此制有而不施如其無法自應實對不可妄說誤人反取深咎第九瞋心不受悔戒疏不受悔謝乖接他之道七衆同犯大小乘不全同菩薩本接取衆生瞋隔犯重聲聞自利犯第七聚若佛子自瞋教人瞋瞋因瞋緣瞋法瞋業而菩薩應生一切衆生善根無諍之事常生慈悲心孝順心而反更於一切衆生中乃至於非衆生中以惡口罵辱加以手打及以刀杖意猶不息前人求悔善言懺謝猶瞋不解者是菩薩波羅夷罪合注因者忿恨隔絶之心緣者瞋隔方便法者示相發口業者前人領解知彼不受身口加逼之苦隨身口業多少結重非衆生者變化幻人等彼雖無情作有情想而行瞋辱亦犯輕也此亦性遮二業五緣成重一衆生二衆生想三瞋隔心四示不受相五前人領解衆生者上中二境重下境輕或有戒者亦重但不失戒也衆生想六句如上瞋隔心者心懷忿恨不欲和解正是業主示不受相者或閉關斷隔發口不受不犯者戒本經云若以方便令彼調伏若彼不如法悔其心不平不受其懺無罪又云若不慊恨性不受懺是犯非染污起又云菩薩侵犯他人或雖不犯而令他疑者即應懺謝慊恨輕慢不如法懺謝是犯染污起若懶惰懈怠犯非染污起若以方便令彼調伏若彼欲令作不淨業然後受者不謝無罪若知彼人性好鬬訟若悔謝者增其瞋怒若知彼和忍無慊恨心恐彼慚恥不謝無罪解曰此輕垢罪亦應此戒兼制也開遮者戒本經云見有衆生應訶責者應折伏者應罰黜者以染污心不訶責若訶責不折伏若折伏不罰黜是犯染污起若懶惰懈怠犯非染污起不犯者彼不可治不可與語難可教誨多起慊恨若觀時若恐因彼起鬬諍相違若相言訟若僧諍若壞僧若彼不諂曲有慚愧心漸自改悔又云若菩薩成就種種神力應恐怖者而恐怖之應引接者而引接之欲令衆生消信施故不以神力恐怖引接者是犯非染污起又唐譯戒本云又如菩薩見諸有情為行越路非理而行出粗惡語猛利訶擯方便令其出不善處安立善處菩薩如是以饒益心於諸有情出粗惡語無所違犯生多功德解曰以饒益心則非瞋隔心明矣果報者瞋恨之罪亦令衆生墮三惡道若生人中得二種果報一者常被他人求其長短二者恆被於他之所惱害淨戒品云離瞋恚者亦四種報一者現世六根聰利儀容可觀人所親附二者心無瞋恚一切惱害打罵訶責盡皆不起譬如有人持迦嚕羅呪一切諸毒無能害之以無恚怒增長慈心以慈真言令三十六俱胝天魔鬼神悉皆摧伏奉慈真言無所損害三者於未來世以慈心梯上生梵世一劫安樂令諸衆生斷惡修善四者漸次能得無上菩提具足莊嚴三十二相八十種好熾然炳著無量功德蘊集其身第十謗三寶戒疏亦云謗菩薩法或云邪見邪說戒謗是乖背之名凡是解不稱理言不審實異解說者皆名為謗也發隱解不稱理邪僻之見不合正理而謬說言不審實疑似之事不考真實而妄說異說外聖賢不易之定論而別為一說七衆同犯大小俱制大士以化人為任令邪說亂正故犯重聲聞異此三諫不止犯第三篇若佛子自謗三寶教人謗三寶謗因謗緣謗法謗業而菩薩見外道及以惡人一言謗佛音聲如三百矛刺心況口自謗不生信心孝順心而反更助惡人邪見人謗者是菩薩波羅夷罪合注因者邪見之心緣者邪說方便法者言說著述等事業者前人領解此亦性遮二業邪見為本復加口過也五緣成重一衆生二衆生想三欲說心四正吐說五前人領解衆生者向上中二境謗則重向下境輕衆生想六句如前可知欲說心者謂邪見推畫惟此是實餘皆虗妄既心存謬解喜向人說也邪見雖多大端有四一上邪見二中三下四雜上者撥無因果如闡提等中者謂三寶不及外道若心中計成失戒若心知三寶勝口說不如既未翻歸不失戒體語語結重下者棄大取小計成失菩薩戒計若未成犯輕屬下文心背大乘戒攝雜者或偏執或雜信或繫念小乘或思義僻謬偏執又二一執大謗小是犯染污起二偏謗一部亦犯輕垢雜信者不背因果及三寶大乘但言外道鬼神亦有威力奏章解神或復勸他悉犯輕垢繫念小乘者知大乘高勝且欲先取小果後更修大此名念退犯輕垢亦下文暫違菩提心戒攝思義僻謬者如今人義淺三五家釋是智力不及此應非罪若輕輒去取復有知他為是強欲立異皆犯輕垢又有說相似法如戒本經云若菩薩如是見如是說言菩薩不應樂涅槃應背涅槃不應怖畏煩惱不應一向厭離何以故菩薩應於三阿僧祇劫久受生死求大菩提作是說者是犯染污起何以故聲聞深樂涅槃畏厭煩惱百千萬倍不及菩薩彼習不染污心勝阿羅漢也正吐說者若自說若教人傳說若作書著述等前人領解者納受邪言隨語語結罪披書發解亦語語結罪惟遮不開果報者邪見之罪亦令衆生墮三惡道若生人中得二種果報一者生邪見家二者其心諂曲發隱心外求法皆名外道非必極邪也心捨大乘皆名惡人非必巨惡也善學諸仁者是菩薩十波羅提木叉應當學於中不應一一犯如微塵許何況具足犯十戒若有犯者不得現身發菩提心亦失國王位轉輪王位亦失比邱比邱尼位亦失十發趣十長養十金剛十地佛性常住妙果一切皆失墮三惡道中二劫三劫不聞父母三寶名字以是不應一一犯汝等一切菩薩今學當學已學如是十戒應當學敬心奉持八萬威儀品當廣明發隱仁者慈悲孝順利濟為懷正善學戒者之稱也猶世言厚德之士也波羅提木叉此言保解脫解脫是果戒是因因中說果也持戒如平地佛果如妙種菩提心如芽心地戒虧雖有佛種不生芽矣國王轉輪王者世間尊貴亦繇戒得也心地端嚴本尊貴故按彌沙塞羯磨本云犯波羅夷名壞根本析石斷命豈更生全大乘懺中雖云除滅然於宗法永無僧用此既本禁不類餘愆特須謹尅碎身堅護但凡情易起對境容虧若無一念覆藏律中許其改悔止可清其犯業僧法豈得預哉已學則既奉持云何復勸良由心地無盡菩薩學心地法門亦無盡佛自半月誦況菩薩耶合注不得現生發菩提心者直指此生為語亦失國王位等者現在既失其義未來必并失其名也問犯前四戒則一切戒體俱失犯後六戒止是失菩薩法何云亦失比邱比邱尼位答此是一往乘勢之語又或如從高處墜法爾至底理無中止所以身子六心中退仍向五道輪回亦其驗也疏八萬威儀品當廣明懸指大本後分八萬威儀品當說發隱大本即百二十之本也四十八輕戒佛告諸菩薩已說十波羅提木叉竟四十八輕戒今當說發隱不但曰十波羅夷而曰木叉者犯之則極惡依之則解脫也第一不敬師友戒疏傲不可長妨於進善故制七衆同犯大小乘俱制合注惟遮不開或方便令調伏亦得名開若佛子欲受國王位時受轉輪王位時百官受位時應先受菩薩戒一切鬼神救護王身百官之身諸佛歡喜既得戒已生孝順心恭敬心見上座和尚阿闍梨大德同學同見同行者應起承迎禮拜問訊而菩薩反生憍心慢心癡心瞋心不起承迎禮拜一一不如法供養以自賣身國城男女七寶百物而供給之若不爾者犯輕垢罪發隱大戒本通道俗而文中獨舉王官何也出家以師友為父兄理自應敬不待言故又僧尼無位傲慢難生王官有勢憍倨易起故意普而辭偏也師生我法身有父道焉當孝順故友助吾進修有兄道焉當恭敬故又師友不可逆不可慢俱當孝敬故賣身等要其誠敬之極而言為法忘軀志當如是非必然也合注上座有三一生年上座戒臘在先二福德上座衆所推敬三法性上座證入聖位和尚此翻親教師或翻力生繇此人力生我無漏妙戒身故阿闍利此翻軌範師謂教授威儀示我軌式即下文所稱教誡法師也大德者總歎具大功德同學者宗同一師同見者心同一解同行者身同一業憍者亢己慢者忽人癡者不知賢聖瞋者心懷忿恚以自賣身等者舉重況輕謂尚應如此供養況迎拜之儀而不為耶此四十八輕戒准十重法亦應有若因若緣若法若業等但以衆輕垢成與未成同稱惡作故不復委明耳此亦性遮二業四緣成重一師友謂上座及同行等二師友想六句二重二輕二無犯三不敬心若憍慢瞋恨不起迎拜等是染污犯若懶惰懈怠或無記心或忘誤犯非染污起不犯者若重病若亂心若睡眠不知若聽法若說法若在說法衆中護說者心若以方便令彼調伏若護僧制若護多人意四應迎不迎應供不供等事成隨事結罪唯遮不開或方便令調伏亦得名開果報者師友知識是得道大因緣是全梵行不敬則永失法利魔所攝持敬則常遇善緣成就佛法第二飲酒戒疏酒開放逸門故制七衆同犯大小俱制惟咽咽輕垢發隱咽咽者一咽一輕垢也若佛子故飲酒而酒生過失無量若自身手過酒器與人飲酒者五百世無手何況自飲亦不得教一切人飲及一切衆生飲酒況自飲酒一切酒不得飲若故自飲教人飲者犯輕垢罪合注故飲者明非不知誤飲一切衆生指異類也此是遮業四緣成罪一是酒謂飲之醉人二酒想六句二咽咽結罪二輕垢二無犯三有飲心四入口咽咽結罪若教他飲咽咽二俱結罪不犯者病非酒不療開者如末利夫人事果報者飲酒之罪有五五百果第一五百世在鹹糟地獄二五百在沸屎三五百在曲蛆蟲四五百在蠅蚋五五百在癡熱無知蟲文云五百世無手或但舉最後五百也發隱問沈湎之流理應無手云何過器便獲斯殃且如君父之壽臣子稱觴豈得誠敬之心反遭惡劣之報答凡言罪者皆為有菩薩戒者言也發大心證大果乃所以壽吾君親而杯酒之敬敬之小者也然而無手之報非此類所感彼感報者蓋是慣持癡器常貯癡藥獎誘癡人成就癡業耳豈比夫稱觴君父雖不名大敬終不失誠敬之心乎無手之報斷非加於此等吾故表而出之第三食肉戒疏食肉斷大慈心大士懷慈為本一切悉斷聲聞漸教初開三種淨肉等後亦皆斷若有重病飲藥能治準律得噉或因不制發隱重病揀非小疾三藏法數律中但開不見不聞不疑三種楞嚴要解加自死鳥殘為五種涅槃復加不為己等共為九淨肉一不見殺二不聞殺謂耳不聞殺亦不聞人語為我故殺也三不疑為己殺四不為己殺五自死六鳥殘七生乾謂因死已日久自乾也八不期遇謂不因期約偶然相遇而食也九前已殺謂非今時因我而殺乃是前時先已殺者也合注知水有蟲或疑有蟲不看不漉輒用大小俱制又蠶綿大小俱制大乘為衆生故得畜憍奢耶等而非自用獸毛小乘不制大乘亦無特制而佛頂經中亦兼及之不用彌善若佛子故食肉一切衆生肉不得食夫食肉者斷大慈悲佛性種子一切衆生見而捨去是故一切菩薩不得食一切衆生肉食肉得無量罪若故食者犯輕垢罪發隱故食肉者明非誤食正指過也見而捨去如鷗去海翁之機是也問經稱食肉之人入於山林虎狼師子皆來集會今云捨去者何答捨去者驚其殺心而遠離也來集者嗅其同氣而相求也或去或來皆惡因緣也問求那跋摩之對宋主也曰王所修與匹夫異出一嘉言則士庶咸悅布一善政則神人以和刑不夭命役不勞力則風雨時百穀茂如此持齊齊亦大矣豈在輟半日之餐全一禽之命然後為宏濟耶斯言與戒似不相合答此隨緣順機變通不滯正大士之體也是故遇崇道之君則將順其美勢不可為則求那所言乃旁行曲運之微權默導潛移之妙術也楞伽經佛告大慧有無量因緣不應食肉如云衆生聞氣悉生恐怖如旃陀羅狗見驚吠故慈心不生故呪術不成故諸天所棄故夜多惡夢故虎狼聞香故文多不録楞嚴亦云食肉之人縱得心開似三摩地皆大羅剎問蠶之害亦慘矣制食肉不制衣帛者何答文互見故煮繭斷命十重殺中攝鑊湯繅車殺具中攝例養六畜損害衆生中攝為利資身邪命自活中攝而首楞嚴經亦禁綿絹是知僧號衲子士稱布衣無待論矣若夫王臣則惡衣服美黻冕自有古人之成訓在合注一切衆生皆有佛性與我同體而今食噉其肉殘慘之甚故云斷大慈悲佛性種子鴦掘經云若絲綿絹帛展轉傳來離殺者手施於比邱亦不應受受者非悲也此是遮業四緣成罪一是肉謂有情身分二肉想二重二輕二無犯三有食心正是業主四入口咽咽結罪開遮者或鹿角虎骨等製入藥中此應非犯若為藥故傷生命同得殺罪果報者楞伽經云為利殺衆生以財網諸肉二俱是惡業死墮呌呼獄佛頂經云死死生生互來相噉惡業俱生窮未來際第四食五辛戒疏葷臭妨法故制七衆大小如前菩薩小重發色故也發隱葷辛之氣能發色身諸欲小重少加重也若佛子不得食五辛大蒜茖𦵇慈𦵇蘭𦵇興渠是五辛一切食中不得食若故食者犯輕垢罪合注茖𦵇即韭慈𦵇即𦵇蘭𦵇即小蒜興渠此方所無一切食中雜有此辛亦不得食非但戒單食也此是遮業臭穢妨於淨法故制四緣成罪如食肉戒開遮者病非蒜等不愈須處僻靜別室食之不得入佛塔僧堂不得入僧浴室不得上都圊內俟斷食更七日後臭氣都盡沐浴浣衣香薰入衆具如律明果報者佛頂經云是五種辛熟食發淫生啖增恚縱能宣說十二部經十方天仙嫌其臭穢咸皆遠離諸餓鬼等䑛其唇吻福德日消長無利益修三摩地善神不護魔王得便命終自為魔王眷屬受魔福盡墮無間獄第五不教悔罪戒疏怙惡長過故制出家二衆全犯餘三衆及在家雖未有僧事利養見過不令悔亦犯輕垢大小同制若佛子見一切衆生犯八戒五戒十戒毀禁七逆八難一切犯戒罪應教懺悔而菩薩不教懺悔同住同僧利養而共布薩一衆說戒而不舉其罪不教悔過者犯輕垢罪合注八戒者八關齊法又地持八重五戒者清信士女所受十戒者十善戒沙彌十戒又此經十重毀禁者總明犯一切戒即毀三世諸佛明禁七逆現在下文八難乃犯戒果報一地獄二畜生三餓鬼四盲聾瘖啞諸根不具五生邪見家世智辨聰六佛前佛後七北洲八無想天一切犯戒罪者若大若小若重若輕若因若果皆教懺悔教懺悔者以見聞疑三根舉事令改往修來捨過遷善也梵語懺摩是此方請忍請恕之意即表除於往愆悔乃此方之語義稱惡作謂追責前來所作是惡決志改途易轍即表修於來善同住同利是共食味布薩說戒是共法味理應如法舉罪故不舉不教者犯也發隱布薩此云相向說罪半月舉罪懺悔如是住者皆清淨聚故云淨住合注此是遮業四緣成罪一有罪二有罪想若實謂無罪者非犯三不教心戒本經云瞋心不舉是染污犯懶惰懈怠非染污犯四默然同住不教悔是一罪同食味復一罪同法味又一罪隨事各結不犯者戒本經云若狂若知不說令彼調伏若護他心若護僧制又云見衆生造今世後世惡業以慊恨心不為正說是犯染污不犯者若自無智若無力若使有力者說若彼自有力若彼自有善知識若以方便令彼調伏若為正說於我憎恨若出惡言若顛倒為若無愛敬若復彼人性弊𢤱戾又自不悔過亦應此戒兼制不教人悔惟是遮業自過不悔兼得性業也七衆不全同比邱應舉七衆罪比邱尼得舉六衆罪不得舉比邱罪若與比邱親里知識私相勸諫無罪式叉摩那得舉五衆罪不得舉比邱比邱尼罪沙彌得舉四衆罪不得舉上三種罪沙彌尼得舉三衆罪不得舉上四衆罪在家二衆得舉自類罪不得舉出家五衆罪若親厚知識私相勸諫皆悉無罪又在家二衆無同利養事惟有不舉及同布薩二過開遮者僧祇律云若彼人凶暴若依王力大臣力凶惡人力或起奪命因緣傷梵行者應作是念彼罪行業必自有報彼自應知爾時但護根相應無罪又四分律云內有五法應舉他以時不以非時真實不以不實有益不以減損柔軟不以粗獷慈心不以瞋恚果報者大涅槃經云若善比邱見壞法者置不訶責驅遣舉處是人佛法中怨若能責遣當知得福無量不可稱計菩薩善戒經云旃陀羅等及以屠兒雖行惡業不能破壞如來正法不必定墮三惡道中為師不能教訶弟子則破佛法必墮地獄優婆塞戒經云寧受惡戒一日中斷無量命根終不畜養弊惡弟子不能調伏何以故是惡律儀殃齊自身畜惡弟子不能教誨乃令無量衆生作惡能謗無量善妙之法壞和合僧令多衆生作五無間是故劇於惡律儀罪發隱問教而不改應免罪否答世儒有言教訓不嚴師之惰也學問無成子之罪也教而不改教者何尤焉第六不供給請法戒疏喪染資神之益故制七衆同犯大小不全共合注小乘未滿五夏未諳律藏見有持律人來應請餘非所制大乘求法無厭一切應請若佛子見大乘法師大乘同學同見同行來入僧坊舍宅城邑若百里千里來者即起迎來送去禮拜供養日日三時供養日食三兩金百味飲食牀座醫藥供事法師一切所須盡給與之常請法師三時說法日日三時禮拜不生嗔心患惱之心為法滅身請法不懈若不爾者犯輕垢罪疏言大乘同見同行簡小乘發隱法師者不必是講經論師凡通達大乘法者皆是也大乘同學等者先言大乘師次言大乘友皆當供請合注日食三兩金者極勢之語三時者中前中後初夜瞋心者恚彼法師患惱者恐已侈費為法滅身者舉重況輕此是遮業四緣成罪一是法師二法師想若不知者不犯三不請心若瞋若惱是染污犯懈怠忘誤非染污犯四漠然空過隨事結罪又不受師教亦應此戒兼制戒本經云欲求定心慊恨憍慢不受師教是染污犯若懶惰懈怠非染污犯不犯者若病若無力若知彼人作顛倒說若自多聞有力若先已受法開遮者若知不請令彼調伏果報者不請則失聞薰益障智慧種請則常能不離正法第七不往聽法戒發隱制意同前但前屬菩薩詣我我請說法今屬菩薩在彼我往聽法若佛子一切處有講法毗尼經律大宅舍中有講法處是新學菩薩應持經律卷至法師所聽受咨問若山林樹下僧地房中一切說法處悉至聽受若不至彼聽受咨問者犯輕垢罪疏言毗尼經律者大乘毗尼經律非三藏中毗尼也大乘經有滅惡義故稱毗尼發隱經律併稱毗尼者以大乘經力能滅惡義同律也地持不開遠近優婆塞開由旬不犯則知出家制遠在家制近也蓋出家以聽法為事憚遠不往是慢法故在家者世法拘身遠聽不能亦非慢故合注一切處者通指僧坊俗地大舍宅別指俗地山林等別指僧地也法毗尼經律者法名軌持毗尼名滅意指所詮經律二字意指能詮然毗尼正翻為律經亦訓法訓常文言似復義則可明此法毗尼大小齊奉七衆同修非局在聲聞也此是遮業四緣成罪一是講法律二講法律想三不往心若瞋慢是染污犯若懈怠非染污犯四不往聽日日結罪善生經中制四十里內須往此亦應爾不犯者若不解若病若無力若彼顛倒說若護說者心若數數聞已受持已知義若修禪定不欲暫廢皆不犯開遮者佛藏經云若比邱說法雜外道義有善比邱勤求道者應從座去若不去者非善比邱亦復不名隨佛教者果報者地持經云菩薩於善知識聽受經法於說法人有五處不應憶念淨心專聽一者不念破戒謂不念言此犯律儀不應從彼聽受經法二者不念下性謂不念言我不從彼下性之人聽受經法三者不念醜陋謂不念言我不從此醜陋之人聽受經法四者不念壞味謂不念言我不從彼不正語人聽受經法但依於義不依於味五者不念壞美語謂不念言我不從彼粗言說人聽受經法如是五處不憶念者是菩薩勤攝正法於說法人不起嫌想若下根菩薩起人過心退不樂聽法當知是菩薩不能自度智慧退減不聽之失也能至心聽則如沙彌戲擲堪證四果況實說正法耶第八背大向小戒發隱背向未決猶屬輕背向已成則失菩薩戒又背向在心失惟屬己言辭外顯害及他人犯第十重若佛子心背大乘常住經律言非佛說而受持二乘聲聞外道惡見一切禁戒邪見經律者犯輕垢罪發隱背大乘言非佛說罪亦重矣云何入輕垢蓋心背而口未宣播此言字是內自評論也若有謗聲屬第十重合注言非佛說者意言分別計度受持者擬欲受持也此具性遮二業計二乘惟遮業計外道兼性業以是邪見故也直制猶豫未決是中下二邪見之方便以其計尚未成故且結輕若計成則失菩薩戒矣七衆同大小不全共小是本習故非犯計外得責心罪發心欲往步步結應懺罪聞外道說法不入其心悔還尚許懺除共住若片語入心奉行其法乃至一髮等失比邱戒成重難現身不復許入僧數惟遮不開果報者計外成邪見墮三塗計小障大菩提發隱昔天親菩薩造五百論明小斥大後遇無著悔悟己過欲自截舌無著教令以舌還讚大乘天親受教剋心向大宏傳廣演卒成聖果焉改過不吝真萬世法也菩薩善戒經云讀世典文頌書疏不犯者為破邪見故為知外典是虗妄佛法真實故為知世事不為世人所輕慢故第九不看病戒疏乖慈故制七衆同犯大小乘不全共大士一切應看聲聞止在師友同活共房及僧尼此外不制以其本不兼物故若佛子見一切疾病人常應供養如佛無異八福田中看病福田是第一福田若父母師僧弟子病諸根不具百種病苦惱皆供養令差而菩薩以瞋恨心不看乃至僧坊城邑曠野山林道路中見病不救濟者犯輕垢罪疏言供養病人如佛極敬為語此明在心不在田如阿難分飯與餓狗以此心明好故與佛一等菩薩見一切病人隨力所能皆應看視文中舉父母師弟子從近為始也末云城邑曠野凡是病皆救即知通一切也若瞋心捨置隨人結輕垢若力不及起慈念心不犯發隱八福田中諸佛最尊云何看病為第一蓋佛是敬田不兼乎悲惟茲病人佛囑我滅度後應好供養其中多有諸佛賢聖則是敬田百骸痛苦須人為命則是悲田況諸佛人天普供苦中之苦無越病人福中之福宜歸看病矣優婆塞戒經云行路之時見病人不住瞻視為作方便付囑所在而捨去者得罪蓋謂有力則自為救療無力則轉託他人邈然如不見聞慈悲之心安在故得罪也言瞋心者嫌病人不生慈念也力不及而有慈念心者不犯力不及而不起慈念心亦犯合注八福田一佛二聖人三和尚四阿闍黎五僧六父七母八病人七是敬田病兼悲敬故名第一此是遮業四緣成罪一有病二有病想三不看心瞋果是染污犯懈怠非染污犯四應看不看隨事結罪不犯者若自病若無力若教有力隨順病者若知彼人自有眷屬若彼有力自能經理若病數數發若長病若修勝業不欲暫廢開遮如不犯中說又復應知看病法則四分律云有五法能看病人一知病人可食不可食可食能與二不惡賤病人大小便吐唾三有慈愍心不為衣食四能經理湯藥乃至差若死五能為病人說法令歡喜律攝云若病人貧無藥直者師主知識等應為辦之或施主邊求或用僧伽物或塔物或幡蓋等莊嚴具依價賣之以供藥值病差應償若無力者不還無罪大師之子是父母財故若看病苾芻供給病者除性罪已餘皆應作果報者不看失慈心益失悲敬二田自有病苦亦無人看能看則成就第一福田第十畜殺衆生具戒疏以傷慈故制七衆同犯大小俱制若佛子不得畜一切刀杖弓箭矛斧鬬戰之具及惡羅網罥殺生之器一切不得畜而菩薩乃至殺父母尚不加報況殺一切衆生不得畜殺衆生具若故畜者犯輕垢罪疏罾繳羅網等道俗皆制刃槊弓箭舊開國王王子等發隱父母之讐不報詳見下文矛者長鎗罥者所以羈禽獸足繳者生絲繫矢而射罾繳羅網皆漁獵之具也槊亦鎗屬刃槊弓箭開國王者衛國以兵餘人無國不應合注此是性遮二業殺之方便且結輕垢隨害物時更結殺罪開遮者或勸人戒殺若買若化其器藏而舉之毀壞彌善果報如殺戒中說如是十戒應當學敬心奉持下六品中廣明疏此十戒總結如下六品所明發隱大本中六品廣明如上十戒今略之也後倣此合注此總結第一段十戒懸指廣文也第十一國使戒疏夫為敵國使命必覘候盈虗矯誑䇿略邀合戰陳情存勝負以乖本慈文云國賊七衆同犯大小俱制發隱覘候者窺伺也矯誑者奸欺也窺伺虗實以為進止奸欺謀策而後行事也言賊者如孟氏曰我能為君約與國戰必克今之所謂良臣古之所謂民賊也若佛子不得為利養惡心故通國使命軍陳合會興師相伐殺無量衆生而菩薩尚不得入軍中往來況故作國賊若故作者犯輕垢罪疏為利惡心揀除和合不得入軍中軍中喧雜非佛子所行處發隱通使有二鬬爭則損國殃民和合則安恤衆故應揀也問若爾衍儀秦代之屬各擅從衡果一善一惡歟答據彼本意則從人固犯興師衡者亦無善意同歸於罪而已細分則衡之為害正謂薄乎云爾必也談仁義而罷秦楚之兵却獻納而成南北之好如斯國使其所謂生多功德者乎合注不入軍中往來舉輕以況重此是性遮二業正制為利養故作此相害因緣隨事隨語結輕若瞋怒因緣自屬殺戒若貪奪寶物因緣自屬盜戒開遮者如隱峰飛錫止兵圖澄占鈴息難等果報者交扇失歡得上品兩舌惡口報殺戮取利得上品殺盜報按此戒當是指通使而尚不成事者言以其為利養惡心故而為使不計殺無量衆生雖不成事亦犯輕垢若已成事已殺無量衆生則罪大惡極又不止於輕垢而已故須權害之輕重以定罪之輕重也第十二販賣戒疏希利損物乖慈故制大小同犯七衆不全共發隱我利則人害故曰乖慈七衆不全共者貿易世俗之常在家當不禁也若佛子故販賣良人奴婢六畜市易棺材板木盛死之具尚不應自作況教人作若故自作教人作者犯輕垢罪合注販賣良人奴婢則有眷屬分離之苦販賣六畜則為殺害之緣市易棺材板木則必利人之死教人作者或為我作或令自作皆得罪也此亦性遮二業希利損物乖於慈心事事結罪若偷販生口賣畜令殺呪人令死以售棺材別犯盜罪殺罪在家畜耕牛非犯然據善生經須先作淨施然後受戒否則得失意罪若買畜放生施棺給貧其功則大果報者眷屬分張多病短命發隱言人畜棺材者明此道俗俱斷揀尋常貿易道俗不俱斷也俗亦斷棺材者制惡心希售也第十三謗毀戒疏陷沒前人傷慈故制大小乘俱制七衆同犯刪取天人以上同有菩薩戒者說其七逆十重或陷沒或治罰莫問有根無根但令向異法人說悉犯重前說四衆過戒已制若向同法人說莫問境高下有戒無戒陷沒人者此戒同犯輕垢發隱刪取猶截取也截取謗毀天人以上同有大戒者也或陷沒其名或治罰其身不問彼所謗有根無根但向異法人者彰播而禍無窮向同法人者隱密而害未廣故一屬重一屬輕也若佛子以惡心故無事謗他良人善人法師師僧國王貴人言犯七逆十重於父母兄弟六親中應生孝順心慈悲心而反更加於逆害墮不如意處者犯輕垢罪合注惡心者瞋惱之心欲前人陷沒也無事者無見聞疑三根父母兄弟六親者大士視一切人皆如父母兄弟六親也此是性遮二業六緣成罪一無罪二無罪想六句四犯二非犯三謗毀心正是業主四所說過七逆十重等五所向人向同法謗同法或向外人謗外人故輕若向外人謗同法自屬重戒中攝六前人領解隨語隨人結罪若說實非犯以惡心說亦犯輕垢惟遮不開果報如妄言惡口中說發隱無事本無實也前十重中毀他兼自讚成重今無自讚前謗三寶成重今止謗僧故輕孝順者不敢謗慈悲者不忍謗第十四放火焚燒戒疏傷損有識故制七衆同犯大小乘俱制發隱有識揀草木無情也雖本意燒山無心害物然物必被傷若佛子以惡心故放大火燒山林曠野四月乃至九月放火若燒他人家屋宅城邑僧坊田木及鬼神官物一切有生物不得故燒若故燒者犯輕垢罪疏有師言殺鬼畜犯重初戒已制此戒但不得燒林木遠損害義今釋殺鬼畜既不犯重今燒林木而死者與此戒同制四月至九月多生蟲類此時道俗同制不得燒林木遠有損害義在家菩薩為業燒者不制出家菩薩為妨害衆事亦應開許者若不慎燒犯輕垢發隱前十重明有命不得故殺今言殺鬼畜不犯重者以無心殺也燒林木而害生亦意在林木也故與前同制在家為生業出家為除害亦所不禁但應謹慎防護不爾者犯恐開此禁恣意焚燒故疏言慎問此中禁四月至九月則十月至三月不制明矣而十月未盡無蟲二月正當起蟄焉得無損答此為苦寒之地言也若東南溫暖恐非所宜止可臘月嚴凝霜雪屢降之後耳善會文者自應得意或云鬼畜不犯重取前十重中非道器也此順疏文未順經義合注惡心者恣情任意不知慎重也燒他屋宅者謂因不慎放火而誤及之若為損他故燒自屬盜戒等流罪攝一切有生物者放火非為燒生有必傷生之勢故須遠防殺緣若為殺故燒自屬殺戒中攝今結云若故燒者明非慎重而偶誤也此是遮業四緣成罪一非時二非時想三不慎心四正放火燒開遮者在家為業亦應慎燒出家除害并須擇時方可無犯果報者不慎則有誤殺之業第十五僻教戒疏使人失正道故制七衆同犯大小乘不共以所習異故發隱僻者偏也邪也二乘外道皆是私謂所習單指二乘不謂外道若佛子自佛弟子及外道惡人六親一切善知識應一一教受持大乘經律應教解義理使發菩提心十發趣心十長養心十金剛心於三十心中一一解其次第法用而菩薩以惡心瞋心橫教二乘聲聞經律外道邪見論等犯輕垢罪合注佛弟子單指內衆外道惡人單指外衆六親通內外衆善知識謂交遊往還素相親善者非得道善知識也由解義理始堪發心不同盲修瞎煉又解義不發心增長狂慧發心不解義增長無明教之使之令知真解真修也惡心者概欲令人人入於偏邪瞋心者偏惱此人不以正教橫者枉其性根不稱機宜明非應病與藥也教以外道性遮二業教以二乘惟是遮業惡心瞋心是染污犯無知根智非染污犯開遮者用隨情說逗彼機宜乃至示同外道等果報者以外教得邪見報以小教障大菩提以大乘教自他俱利第十六為利倒說戒疏乖訓授之道故制七衆同犯大小乘俱制發隱無私賄而不傳真法有所獲而方罄所知是商賈之道也豈大士宏度之心乎合注小乘依小法教人亦不得隱沒義理若佛子應好心先學大乘威儀經律廣開解義味見後新學菩薩有從百里千里來求大乘經律應如法為說一切苦行若燒身燒臂燒指若不燒身臂指供養諸佛非出家菩薩乃至餓虎狼師子一切餓鬼悉應捨身肉手足而供養之然後一一次第為說正法使心開意解而菩薩為利養故應答不答倒說經律文字無前無後謗三寶說者犯輕垢罪發隱好心者明始學之初即發上求下化之心絶希利故今才學佛法先懷利養非好心也先儒有言今人讀書自上大人時便錯了也意正如此合注好心者上求下化之心先學者自利利他之本威儀者化導之軌範經律者進修之門戶廣開解義味者致廣大而盡精微明非淺近粗疏而已燒身臂等者上求之極致也捨身肉等者下化之極致也先為說此如法苦行以大其心志堅其誓願然後一一次第為說正法謂隨問而說不顛倒說不邪謬說故能使其心開意解此誠先學菩薩之職任也應答不答則不一一說倒說則不次第謗三寶則非正法又倒說即名為謗所謂說法不當機所說為非量也此是遮業不先學是一過不正說又一過為利是染污犯無知機智非染污犯開遮者知機故不說或為斷邪命而訶苦行破愚執而談理行果報者為利則邪命所攝倒說則謗法等流發隱問謗三寶說云何不入十重答十重專言謗者是撥無三寶故重此則謬解妄論名為謗說非撥無也故輕第十七恃勢乞求戒疏惱他故制七衆同犯大小乘俱制若佛子自為飲食錢財利養名譽故親近國王王子大臣百官恃作形勢乞索打拍牽挽橫取錢物一切求利名為惡求多求教他人求都無慈心無孝順心者犯輕垢罪合注自為者明非為三寶等為飲食乃至名譽明非為道也惡求者威逼非善求多求者無厭非寡求教他者教人為我求如遣使作書之類此具性遮二業盜戒之等流也或將本求利或薦書強化皆屬此戒若非分陵奪自屬盜戒又戒本經云多欲不知足貪著財物是染污犯亦此戒攝開遮者為三寶為病人為衆生如法營求非犯果報者乞求則妨道惱他不乞則正命清淨自他俱利發隱乞索者乞索財物也打拍示威亦乞索財物也牽挽者牽繫挽曳皆威逼之而橫取也無慈心孝順心者慈則常思惠濟慮彼貧窮孝則供養衆生如己父母尚何忍橫取之耶第十八無解作解戒疏有誤人之失故制出家二衆同犯大小乘俱制三衆及在家無師範義未制發隱三衆者沙彌沙彌尼式叉摩那也沙彌未授具式叉學戒女無為人師義故不制若佛子應學十二部經誦戒者日日六時持菩薩戒解其義理佛性之性而菩薩不解一句一偈及戒律因緣詐言能解者即為自欺誑亦欺誑他人一一不解一切法不知而為他人作師授戒者犯輕垢罪疏日日六時晝夜各三一云誦未通利必須六時已通利未必恆爾二云恆應六時發隱言為戒師者先應廣學諸經熟誦戒律解戒中所說義理又窮原極本妙悟性宗言佛性之性者揀此性是佛性之性非聲聞外道所計性也即菩薩心地也一一指戒律一切法指諸經也合注大士以傳法度生為正務故應學十二部經以為度生之本而戒經尤大士之根本故應日日六時誦持令其精熟然不但誦文而已又必解其義理佛性之性謂先悟本源自性清淨為無作戒所依體性即依此無作戒還為成佛種子是知自性清淨者正因佛性也菩薩戒者緣了佛性也全一性以起二修全二修而成一性故名佛性之性猶云諸佛本源佛性種子也不解一句等舉輕況重設不解一句一偈及戒律少分因緣而詐言能解即為內乖己心而自欺外誤前人而誑他何況一一戒律皆不解一切佛法皆不知則自且從師求學之不暇豈可為他人作師授戒哉此是遮業受戒不學是一過欲作師又一過隨事結罪疏云餘五衆無作師事未制今按善生經在家菩薩亦得畜在家弟子似亦同制然在家雖畜弟子無授戒事故云不犯耳開遮者為白衣授終身五戒及六齊日授八戒法皆悉無犯然亦須知五戒八戒義趣又八戒法若無比邱比邱尼則式叉摩那沙彌沙彌尼亦得授之五戒法設無出家五衆則在家二衆亦得授之果報者佛藏經云身未證法而在高座身自不知而教人者法墮地獄第十九兩舌戒疏遘扇彼此乖和合故制七衆同犯大小俱制若佛子以惡心故見持戒比邱手捉香爐行菩薩行而鬬搆兩頭謗欺賢人無惡不造者犯輕垢罪合注惡心者瞋彼前人欲令鬬諍或嫉彼賢善欲為妨惱也手捉香爐聊舉善行之一事鬬搆兩頭謂交扇令造諍端此雖說實猶犯況謗欺耶此具性遮二業六緣成罪一衆生二衆生想應以持戒不持戒六句分別二稍重四稍輕也三兩舌心正是業主四說過無論實與不實五所向人若向無戒人自屬重戒若泛向同法非彼親友自屬第十三謗毀戒今正以鬬遘為念的向彼之親厚故實與不實皆犯若欲向此人誤向彼人結方便罪六前人領解語語結罪開遮者菩薩戒本云又如菩薩見諸有情為惡友朋之所攝受親愛不捨起憐愍心說離間語令離惡友捨相親愛勿令當受長夜無義無利如是以饒益心說離間語生多功德果報者如第六重戒中說發隱無惡不造者謗彼賢人為造惡也此戒不但鬬遘比邱推之則讒亂人君臣離間人骨肉者皆是類也第二十不行放救戒疏見危不濟乖慈故制七衆同犯大小乘不俱制大士一切普度聲聞止在眷屬此制自度發隱菩薩兼利故制自度言自度不顧他人則犯制也若佛子以慈心故行放生業一切男子是我父一切女人是我母我生生無不從之受生故六道衆生皆是我父母而殺而食者即殺我父母亦殺我故身一切地水是我先身一切火風是我本體故常行放生生生受生常住之法教人放生若見世人殺畜生時應方便救護解其苦難常教化講說菩薩戒救度衆生若父母兄弟死亡之日應請法師講菩薩戒經律福資亡者得見諸佛生人天上若不爾者犯輕垢罪疏前明想念如親即制令憶慈觀如大經明習九品七品等第一使上怨等於上親大士應與資身之益及資神之利發隱憶慈心觀習慈之品或七或九九則親冤各分三品第一上冤與上親平等者正慈觀之力也解難資身之益法乃資神也言講演之福得見諸佛者以此戒是三世諸佛之本源戒之所在即佛在故講之則重宣諸佛之光開闢人天之路未亡而歷彼耳根已死而導其冥識問墨子兼愛號為異端云何衆生皆我父母答儒道止談今世佛法乃論前身受生既歷多生託胎必遍諸趣六道衆生皆我父母豈不然乎惟拘近跡不審遠緣等之異端過矣生生受生等者以生生無不由此四大受生則生生當行放救此放生即是常住不易之法也合注以慈心故總修三種慈心也一生緣慈即觀六道皆我父母二法緣慈即觀地水火風是我身體三無緣慈即於生生受生之中而悟不生不滅常住之法教人放生者以此三慈開示於人救護則解其現在苦難教化講說則拔其未來苦因令不受未來苦難又救是苦度是與樂也得見諸佛生人天上者見佛聞法恆於天人類中修道永離畜生難處方名究竟放救也此是遮業四緣成罪一苦衆生二苦衆生想三無慈心若欲救而力不逮者至心為稱佛名或為說法以作救慧命之緣因不犯四坐視不救隨事結罪不救身命是一過不救慧命又一過惟遮不開果報者不救則失三慈法利救則成就三慈法門按四大是我之身體亦是衆生身體是我與衆生同一身體也故當放救我生生由四大受生衆生亦生生由四大受生故生生當行放救亦當教人放救所以為常住之法此雲棲解常住二字之義與蕅師異如是十戒應當學敬心奉持如滅罪品中廣明一一戒疏指滅罪品中廣明合注此總結第二段十戒懸指廣文也第二十一瞋打報讐戒疏既傷慈忍方復結冤故制也外書有二途一是禮之所許二是法之所禁漸教故也今內經悉禁七衆同犯大小俱制發隱禮許者記曰君父之讐不與共戴天兄弟之讐不反兵交遊之讐不同國禮應報也法禁者約始三章殺人者死律垂諸代斷命必償法應報也然此乃權漸之教未是真實故世道行之內經悉禁若佛子不得以瞋報瞋以打報打若殺父母兄弟六親不得加報若國主為他人殺者亦不得加報殺生報生不順孝道尚不畜奴婢打拍罵辱日日起三業口罪無量況故作七逆之罪而出家菩薩無慈心報讐乃至六親中故報者犯輕垢罪疏謂以瞋打報瞋打非謂應以德報怨也發隱言佛意止謂不當以瞋打還報瞋打非欲人更以恩德報瞋打也大般若經云菩薩當鬬爭瞋恚罵詈便自改悔我當忍受一切衆生履踐如橋梁如聾如啞云何以惡語報人我不應壞是甚深無上菩提是也殺生報生不順孝道者良由天地以生物為心彼傷吾親之生吾復傷彼親之生殺一生報一生於我之生無益於彼之生有損生彌寡而殺彌衆乖天地之和傷化育之原是焉得為孝乎又按疏概標七衆而經文明言出家菩薩是經意止制出家不禁臣民此或大師權巧故補經文然金口炳然理合依憑合注不順孝道者被他殺害必有夙因快意報讐重增未來怨結非所以愛死者也七逆罪者如孟氏云殺人之父人亦殺其父殺人之兄人亦殺其兄去自殺惟是一間今我為父報讐彼復結讐於我父又種將來害父之因故報讐即可名七逆也結云出家菩薩者意顯在家菩薩猶得兼用王法以直報怨出家斷不可矣尚不畜奴婢者舉輕況重然出家人總不得畜在家得畜但不應非理打罵發隱曰三業而止標口罪者罵辱已罪無量況打拍乎奴婢且然況作七逆乎皆舉輕況重也合注此是性遮二業既傷慈忍復結來怨故也五緣成罪一是讐二讐想有六句初二句輕謂讐作讐想讐疑而行瞋報二句稍重謂非讐而作讐想讐疑二句更重謂非讐非讐想讐非讐想而行瞋打即第九重戒攝也三有報復心四行瞋報事五前人領納謂受其打罵結輕若害命結歸第一殺戒在家菩薩以直報怨憑官依律決判不犯或私行報復或賄賂求託過分治罰一一刑辱結輕害命結重又戒本經云若於他起慊恨心執持不捨是染污犯亦可此戒兼制又菩薩怨不宜報恩則宜報故戒本經云受他恩惠以慊恨心不以若等若增酬答彼者是染污犯若懶惰懈怠非染污犯不犯者若作方便而無力若以方便令彼調伏若欲報恩而彼不受惟遮不開果報者報則相讐相害更無休息不報則解怨釋結永無讐對按解孝道處發隱與合注不同亦各明一義也第二十二憍慢不請法戒疏慢如高山法水不住有乖傳化之益故制七衆同犯大小不全共合注小乘於應請者而憍慢不請則犯餘惟不得憍慢不制悉請大乘求法為務一切應請一切不得憍慢發隱疏云此戒與前第六戒同制前懈怠不聽此憍慢不請若慢心不往聽應同此戒若佛子初始出家未有所解而自持聰明有智或恃高貴年宿或恃大姓高門大解大福大富饒財七寶以此憍慢而不咨受先學法師經律其法師者或小姓年少卑門貧窮下賤諸根不具而實有德一切經律盡解而新學菩薩不得觀法師種姓而不來咨受法師第一義諦者犯輕垢罪合注初始出家者明其染法未深未有所解者無佛法中正解既染法未深未開正解則更不宜憍慢也此是性遮二業四緣成罪一法師二法師想六句二重二輕二無犯三憍慢心正是業主與前第六瞋患為異四不咨受隨所應咨不咨結罪又戒本經云輕說法者不生恭敬嗤笑毀呰但著文字不依實義是染污犯亦此戒兼制惟遮不開果報者憍慢則失正法種頑愚陋劣重法則智慧開明菩提增長第二十三憍慢僻說戒疏乖教訓之道故制七衆同犯大小俱制初新學菩薩已受戒竟遠來聽法法主言非己師恃解恃勢生輕慢心不好答問使義理隱沒顛倒法相故犯發隱非己師言不於己師明是他人弟子也若佛子佛滅度後欲以好心受菩薩戒時於佛菩薩形像前自誓受戒當以七日佛前懺悔得見好相便得戒若不得好相應以二七三七乃至一年要得好相得好相已便得佛菩薩像前受戒若不得好相雖佛像前受戒不名得戒若先受菩薩戒法師前受戒時不須要見好相何以故是法師師師相授故不須好相是以法師前受戒時即得戒以生至重心故便得戒若千里內無能授戒師得佛菩薩形像前自誓受戒而要見好相若法師自倚解經律大乘學戒與國王太子百官以為善友而新學菩薩來問若經義律義輕心惡心慢心不一一好答問者犯輕垢罪發隱無師佛像前受得戒如此之難有師面面相承得戒如此之易則師之所係誠大而求師者當敬之如佛可也為師者宜體此意慈悲指示而待之如子可也乃內倚所學外挾所交起大憍慢不好答問耶不好答正前所謂隱沒顛倒也菩薩善戒經云不犯者若知前人是惡邪見求覓罪過若知不說令彼調伏若知前人不能敬順若知鈍根聞深義已生於邪見若知聞已向惡人宣說破壞正法等合注師師相授不須好相者以其展轉傳來即是如來嫡胤亦是法身常住故律藏云持律之人是人補佛處也生至重心者謂視師如佛也不得好相不名得戒明自誓受戒如此之難生至重心便乃得戒明從師受戒亦復不易既受得已請問先達先達豈可忽之而不好答乎輕心者忽彼來人惡心者慳吝嫉妬慢心者自恃福慧也此亦性遮二業乖接引教訓之道四緣成罪一求法人二求法想三憍慢心四僻說出口語語結罪惟遮不開果報者吝法則愚癡憍慢則陋劣不吝不憍則功德智慧以自莊嚴按發隱分難易合注言皆難各明一義而發隱為順第二十四不習學佛戒疏乖出要之道故制七衆同犯大小不全共發隱菩薩常學大乘故制他學聲聞則五歲未滿五法未明者制已滿已明者不制繇聲聞不學大乘惟以自修者自滿也五歲者經云五夏以前專修戒律五夏以後方乃聽教參禪況復他學也若佛子有佛經律大乘法正見正性正法身而不能勤學修習而捨七寶反學邪見二乘外道俗典阿毗曇雜論一切書記是斷佛性障道因緣非行菩薩道者若故作者犯輕垢罪合注經律大乘法者通指菩薩藏也正見者萬行之解正性者正因之性正法身者正果之性邪見者通指下文諸法二乘墮於偏空外道執其謬計俗典僅談世務阿毗曇即二乘論雜論即外道論一切書記即俗典世論也斷佛性者二乘焦菩提之芽外道刳正覺之種障道因緣者內惑正解之因外亂正修之緣也一向習小惟是遮業非染污犯二向習外性遮二業是染污犯不犯者若上聰明能速受學若久學不忘若思惟知義若於佛法具足觀察得不動智若於日日常以二分受學佛經一分外典又菩薩比邱比邱尼不學聲聞毗尼亦犯輕垢七衆同制者比邱先習此經及二部律尼先學此經及尼具戒式叉先習此經及二六法沙彌男女先習此經及十戒威儀在家先習此經及優婆塞戒餘力方許遍習大小不全共者同以本法為急亦同不得習外而大不學毗尼犯小不學此經非犯開遮者示同邪小以誘接之果報者一向習小障菩提習外墮愛見發隱七寶二義一者殊勝超出一切諸教偏駁下劣故二者利濟能與一切衆生功德法財故第二十五不善知衆戒疏自損損他故制出家二衆同犯大小俱制三衆及在家既未持衆不制發隱三衆謂沙彌沙彌尼式叉摩那若佛子佛滅度後為說法主為行法主為僧坊主教化主坐禪主行來主應生慈心善和鬬諍善守三寶物莫無度用如自已有而反亂衆鬬諍恣心用三寶物者犯輕垢罪合注說法主即今法師行法主主清規者亦可律師僧坊主知安居房舍等事即今值院教化主勸人作福業者坐禪主知習禪事如僧堂首座之類行來主知乍到客情事者今名知賓慈心者和諍守物能與一切人樂也此是遮業不善滅諍隨事結過不善守物隨用結過若三寶互用自屬盜戒若發起諍事別得性罪惟遮不開果報者不善滅諍得破僧方便罪不善守物招貧窮困苦報善和善守則統理大衆一切無礙發隱諍有四謂平論諍非言諍犯罪諍作事諍三寶物必應所當為之事而施用之固不可濫用亦不可差互用差互者如佛物不可僧用古人尚有以飯僧物作僧堂而墮火枷地獄者又如佛殿餘作佛像得佛像餘作佛供器得但不可以佛殿餘作菩薩殿佛像餘作菩薩像降下可知矣初津如自己有謂當如自己物之愛惜不得錯用一說不得當自己物隨意而用第二十六獨受利養戒疏僧次請僧不問客舊皆有分而舊人獨受不以分客乖施主心貪利故制此戒出家二衆同犯大小俱制三衆及在家未知僧事不制若佛子先在僧坊中住後見客菩薩比邱來入僧坊舍宅城邑若國王宅舍中乃至夏坐安居處及大會中先住僧應迎來送去飲食供養房舍臥具繩牀木牀事事給與若無物應賣自身及男女身割自身肉賣供給所須悉以與之若有檀越來請衆僧客僧有利養分僧坊主應次第差客僧受請而先住僧獨受請而不差客僧者僧坊主得無量罪畜生無異非沙門非釋種姓犯輕垢罪合注菩薩謂大士衆比邱謂聲聞衆皆應有利養分也國王宅舍謂王所造立安僧宅舍也應賣自身等者舉重況輕謂賣身割肉尚應供給況本皆有分之利養耶此俱性遮二業以僧次請僧時凡在界內者皆應有利養分而今不差客僧乖施主心貪利獨受是盜戒之等流也四緣成罪一有客謂應得利養分者來在界內二有客想六句二重二輕二無犯三獨受心正是業主四差竟據義疏云若知僧次的至彼人而不差者且犯輕垢以臨差時界外或更有來者尚未專有分故若差竟而別與餘人餘人自知未應受請而受得施主家食䞋五錢入手與差者同結重罪畜生無異又客來不與僧中物分不起迎接亦此戒兼制同犯輕垢餘五衆雖不犯或有時受差分食若偏厚偏薄偏有偏無皆犯輕垢善生經云僧中付食若偏為師選擇美好過分與者是優婆塞得失意罪惟遮不開果報如慈悲道場懺法廣明初津大會者或月初一日或初八日十五日此三日是西竺每月大會設食供僧又或無遮會或僧自恣會等但知我飽不顧他饑故曰畜生無異第二十七受別請戒疏各受別請則施主不請十方僧使施主失平等心功德十方僧失常利施故制出家五衆同犯在家二衆無此利未制大小乘不同發隱菩薩僧可受別請或請我為宏揚戒法或見此人機宜必得我乃能成就所作功德俱不犯若佛子一切不得受別請利養入己而此利養屬十方僧而別受請即是取十方僧物入己及八福田中諸佛聖人一一師僧父母病人物自己用故犯輕垢罪疏施主修福法應廣普當知利施本通十方繇汝別受故十方不得遠有奪十方之義是故不應八福田並有應得僧次義如佛應迹為僧等發隱及字承上此利養不但取十方僧物亦取八福田物也言此八人俱有入僧次之理如佛亦可應化為僧餘應例知也合注小乘遮別衆食若四人中有一人是僧次者不犯不遮別受請此是遮業三緣成罪一是別請若有僧次一人同受不犯二別請想六句二重二輕二無犯三受竟結罪善生經云若優婆塞受招提僧臥具牀坐得失意罪亦應此戒兼制開遮者戒本經云檀越來請若至自舍若至寺內若至餘家若施衣食種種衆具菩薩以瞋慢心不受不往是染污犯不犯者若病若無力若狂若遠處若道路恐怖難若知不受令彼調伏若先受請若修善法不欲暫廢為欲得聞未曾有法饒益之義及決定論若知請者為欺惱故若護多人嫌恨心故若護僧制解曰此乃率衆受供非別受也又云有檀越以金銀真珠摩尼琉璃種種寶物奉施菩薩若瞋慢心違逆不受是染污犯捨衆生故懶惰懈怠非染污犯不犯者若知受已必生貪著或施主生悔或施主生惑或施主生惱若知是三寶物是劫盜物若知受已多得苦惱所謂殺縛謫罰奪財訶責解曰此則受以為衆非自享也果報者既遠有奪取十方之義亦是盜戒等流第二十八別請僧戒疏分別是田非田如經德王品當知自心則為狹劣失平等心七衆同犯大小乘不全共道俗菩薩請僧齊會一云都不得別請悉應僧次的請一人便犯二云一食處莫問人數多少止請一僧次便不犯都無則制若悉請者益善若佛子有出家菩薩在家菩薩及一切檀越請僧福田求願之時應入僧坊問知事人今欲請僧求願知事報言次第請者即得十方賢聖僧而世人別請五百羅漢菩薩僧不如僧次一凡夫僧若別請僧者是外道法七佛無別請法不順孝道若故別請僧者犯輕垢罪疏五百羅漢不及一凡僧此就心邊不論田也發隱四十二章經自飯惡人乃至如來福德勝劣天壤此論田也今經所云是論心也隨時取重不相礙故然此論平等設供非論求師也求師則趨明捨暗親賢遠愚具眼參方何可不擇合注次第請即得十方賢聖僧者以凡聖難測不應妄生分別故引七佛證義以其並在此土又近在百小劫內長壽天皆曾見也不順孝道者不遵佛訓輕慢衆僧此是遮業據聲聞律若僧次中請得一人餘別指名請求非犯開遮者如親師取友則善須簡擇如欲說法授戒化導衆人擇其才德俱優者請之非犯果報者別請則違平等無相法門失廣大圓滿福德不別請則一滴投海頓同海體第二十九邪命自活戒疏大論云貪心發身口名為邪命乖淨命也發隱貪起於心本也發於身則妄為資身之䇿發於口則曲為糊口之計皆邪命自活也淨命者一深山草果二常行乞食三檀越送供四隨大衆食以此活命無所染污故曰淨命違背此法乖淨命也若佛子以惡心故為利養販賣男女色自手作食自磨自舂占相男女解夢吉凶是男是女呪術工巧調鷹方法和合百種毒藥千種毒藥蛇毒生金銀毒蠱毒都無慈愍心無孝順心若故作者犯輕垢罪疏揀非見機益物發隱明作此邪命者以何心為何事今言是以惡心為利養也則知以善心為善事者不犯矣一販賣女色二手自作食通制道俗三相吉凶俗人如相以自活不犯道一向制四呪術五工巧六調鷹方法此三事於物無侵如法自活在家不制出家悉斷若淨治救無所希望不犯出家亦開七和合毒藥殺人犯罪發隱慈憫則視物猶己何忍以活己身故而損物孝順則視衆生猶吾父母何忍以活子身故而傷親四邪命者一方口食謂干謁四方二維口食謂種種術數三仰口食謂仰觀星宿四下口食謂栽植田園皆非僧正命食也呪等三事於物無侵者蓋呪術通乎濟難工巧兼乎醫藥調鷹止是遊戲故云如法若以呪助邪以藥傷人以鷹畋獵則非法矣當有大過豈得不犯出家亦開者如上事清淨治救益物為務無求利心者亦開許也又智論云五種邪命以無漏智慧捨離是為正命一為利養故詐現奇特二為利養故自說功能三為利養故占相吉凶四為利養故高聲現威令人畏敬五為利養故稱說所得供養以動人心邪因緣活命是為邪命合注尚有八穢一田宅園林二種植生種三貯積穀帛四畜養人僕五養繫禽獸六錢寶貴物七氈褥釜鑊八象金飾牀及諸重物此是性遮二業然惟販色毒藥二事兼有性罪餘但遮罪又今時養鷹多為捕獵此亦性罪或屬損害衆生戒攝也毒藥且就和合時結輕若害物時隨結殺罪調鷹亦爾出家五衆全犯在家除販色調鷹毒藥三種其餘如法自活不犯又善生經云若優婆塞須田作者不求淨水及陸種處得失意罪亦可攝屬此戒淨水者謂無蟲水陸種者陸生穀麥等不須用水致傷蟲也開遮者出家人或偶用占相呪術工巧隨機誘物令入佛道非希利心亦復無犯呪術是治病救難所用故大小兩乘亦通有之果報者緇門警訓云今時講學專務利名不恥五邪多畜八穢日用所資無非穢物箱囊所積並是犯財慢法欺心自貽伊戚誰知報逐心成豈信果由因結現見袈裟離體當來鐵葉纏身為人則生處貧窮衣裳垢穢為畜則墮於不淨毛羽腥臊云云第三十不敬好時戒疏三齊六齊盡是鬼神得力之日此日修善福過餘日而今於好時虧慢更犯隨所犯事隨篇結罪此時此日不應不知加一戒一云七衆俱制皆應敬時二云但制在家年三長齊月六齊本為在家出家盡壽持齊不論節時發隱年三月者正五九也毗沙門天王分鎮南瞻部洲之月也月六日者初八二十三天王使者十四二十九天王太子月望月晦天王自身遞相巡狩之日也老較善惡良在於斯故云鬼神得力也好時不知忽慢之甚故加一戒又此戒本在家所持出家盡壽持齊何分月日合注此戒合標作經理白衣戒若佛子以惡心故自身謗三寶詐現親附口便說空行在有中經理白衣為白衣通致男女交會淫色作諸縛著於六齊日年三長齊月作殺生劫盜破齊犯戒者犯輕垢罪合注佛制在家男女不論但三歸者受五戒者受菩薩戒者遇六齊日悉應一晝夜受持八戒齊法以不非時食正名為齊以不殺等八戒共助成之故名八關戒齊謂以八戒及齊關閉情欲作出世正因也正五九為年三長齊月亦應盡此一月受持齊法如上此戒舊名不敬好時今觀經文語勢似從出家人邊結過故易科為經理白衣大意謂出家人法宜誘誨白衣令得解脫令持齊戒而反說空行有為其經理乃至六齊三齊好時不能使其作福修善反令作殺盜等事豈非以身謗三寶乎此是遮業但從經理白衣結罪所云殺生劫盜破齊犯戒自是俗人之事非出家人教其為之但既有通致男女等事未免為殺盜等而作遠緣故推極於此而顯其不應耳若實教其殺生劫盜兼得性業自屬殺盜戒攝出家五衆全犯一切時中不得經理白衣也在家二衆已受菩薩戒不敬好時亦犯善生經云若優婆塞一月之中不能六日受持八戒供養三寶得失意罪也若殺生劫盜破齊犯戒自隨事別結惟遮不開果報者經理白衣亦屬邪命如前說又不敬好時則諸天愁憂能招災異敬好時則諸天歡喜護國降祥如是十戒應當學敬心奉持制戒品中廣明合注此總結第三段十戒也第三十一不行救贖戒疏見有賣佛菩薩形像不救贖損辱之甚非大士行應隨力救贖不者犯罪故制七衆同犯大小乘不全共菩薩應贖聲聞見父母不贖犯第七聚經像不見制佛言佛子佛滅度後於惡世中若見外道一切惡人劫賊賣佛菩薩父母形像及賣經律販賣比邱比邱尼亦賣發菩提心菩薩道人或為官使與一切人作奴婢者而菩薩見是事已應生慈悲心方便救護處處教化取物贖佛菩薩形像及比邱比邱尼發心菩薩一切經律若不贖者犯輕垢罪發隱父母兼我人父母而言孝子敬其親及人之親況大士乎或疑父母之像賣與何人意古人或有以沉檀珍寶作像者故可賣教化取物者若己無能贖之資應廣勸他人發心不得坐視也合注此是遮業四緣成罪一應贖境謂尊像經律僧人等二應贖想六句二重二輕二無犯三無救贖心力不及者非犯四令彼褻辱隨事結過設力不及而漠不關心亦犯惟遮不開或如法流通經典不犯果報者不救則失於二利救則具足二嚴第三十二損害衆生戒疏此有六事遠妨損害乖慈故制七衆同犯大小乘俱制若佛子不得販賣刀杖弓箭畜輕稱小斗因官形勢取人財物害心繫縛破壞成功長養猫狸猪狗若故養者犯輕垢罪發隱稱斗垂戒他可例知因官者或用自官勢或假他官勢也畜猫狗者能傷他物畜猪者終歸損害優婆塞戒經云畜猫狸養猪羊及蠶者得罪俗制如是僧可知矣合注刀杖弓箭者損害之具輕稱小斗者欺誑之具然稱斗但約畜用故結輕耳若以之移換詐取自屬盜攝因官形勢者行於逼奪以威力傷慈結輕若取非其有亦是盜攝繫縛者不當其罪又意在索財也此具性遮二業隨事結罪惟遮不開果報者是殺盜等流初津猫狸猪狗等養生害生恩中具讐雖不殺他殺因具矣小乘律中畜狗為守住處故開第三十三邪業覺觀戒疏凡所運為皆非正業思想覺觀有亂真道故制大小同犯七衆不全同發隱覺觀有正有邪思維出世真道者正也思維世間雜事者邪也初心作思名覺細心沈思為觀若佛子以惡心故觀一切男女等鬬軍陳兵將劫賊等鬬亦不得聽吹貝鼓角琴瑟箏笛箜篌歌叫妓樂之聲不得摴蒱圍棋波羅塞戲彈棋六搏拍毱擲石投壺牽道八道行城爪鏡蓍草楊枝鉢盂髑髏而作卜筮不得作盜賊使命一一不得作若故作者犯輕垢罪疏初諍鬬男女軍陳等道俗同制二娛樂吹貝鼓角等若為自娛道俗同不得作不得聽若供養三寶道俗同開三雜戲摴蒱圍棋等四卜筮爪鏡蓍草等五作使通書道俗俱制合注此五皆為邪業惡心者明非見機益物直是邪思邪覺也貝者螺也七弦為琴二十五弦為瑟箏者竹身十三弦箜篌者竹身二十四弦摴蒱即今賻錢波羅塞戲即今象棋彈棋者漢宮人粧奩戲六搏即今雙陸拍毱即今踢毬擲石投壺者古用石今用矢牽道八道行城者縱橫各八路以棋子行之西域戲也爪鏡即圓光法蓍草即是易卦楊枝即樟柳神鉢盂即攪水碗法髑髏即耳報法盜賊使命性遮兩業餘惟遮罪隨事結輕又戒本經云若菩薩懶惰懈怠耽樂睡眠若非時不知量是染污犯不犯者若病若無力若遠行疲極若為斷彼故起欲方便攝受對治性利煩惱更數數起亦可此戒兼攝投壺本於禮記蓍龜本於易書在家應無犯開遮者或見機益物等又出家人欲決疑慮自有圓覺經拈取標記法占察經擲三輪相法及大灌頂經梵天神䇿百首可依用之果報者觀則妨廢正道失二世利不觀則離諸掉悔定慧易生發隱諍鬬起凶惡心娛樂起淫泆心雜戲起散亂心卜筮起惑著心使命起詐罔心事事亂道不應作也例而推之可之能詩而感白癩解之工畫而墮泥犁乃至貫休智永之輩皆邪業也可不戒歟蓍草並制者釋子委運大化宜莫留情世俗賴斯指迷固所不禁但貴斷以義命母膠執焉斯名達士矣第三十四暫念小乘戒疏乖本所習故制七衆同犯大小不共以習各異欲背大向小心計未成犯前第八背大向小戒計成失戒在第十重戒中說此戒所制不欲背大正言小乘易行且欲斷結然後化生發隱帶結而能利物大士之宏懷斷結而後化生小乘之淺計又前云向小泛舉所修之因今之念小專指所持之戒背向二字辭猶稍寬暫亦不宜意彌切矣若佛子護持禁戒行住坐臥日夜六時讀誦是戒猶如金剛如帶持浮囊欲度大海如草繫比邱常生大乘善信自知我是未成之佛諸佛是已成之佛發菩提心念念不去心若起一念二乘外道心者犯輕垢罪發隱金剛者萬物莫能碎而能碎萬物喻此戒諸惡莫能破而能破諸惡也浮囊者經言客持浮囊渡海羅剎從乞毅然不許乃至乞半乞一絲毫皆悉不與喻持戒者在生死海中遇煩惱羅剎欲壞重戒乃至輕垢一微塵許不可得也草繫者昔佛在世有諸比邱為賊劫掠恐其追獲以草繫之佛制比邱不壞生草繇此端坐不敢動作王過見之乃得解釋如是持戒所謂寧有戒死不無戒生也雖能護戒若無正信則戒止散善而已今知生佛本無二心衆生當定作佛特已成未成為別實先佛後佛何殊所謂能作如是信戒品已具足者也二乘繇無此信故無望作佛亦無望一切衆生作佛大士於此諦信不疑故能自度度人同成正覺心也雖有正信而不發心則信為徒信而已今知我心即諸佛心故上求諸佛無上菩提我心即衆生心故下化衆生同成正覺剎那心中不捨此念曰念念不去心也疏若起一念等者不應一念起自度之想外道者指二乘為外道若權入此道為化非所制也發隱二乘為外道者離菩提心捨菩提願即名外道故等二乘曰外道也權入為化者菩薩示現外道故與同事默行教化者非所制也合注起二乘心惟是遮業非染污犯起外道心性遮二業念念是染污犯開遮者若權入二乘外道為化彼故果報者一念二乘心亦障菩提一念外道心亦障出世惟念念菩提心能臻三種不退按合注分注二乘外道與疏異第三十五不發願戒疏菩薩常應願求勝事緣心善境將來因此克遂若不發願求善之心難遂故制七衆同大小異所習不同故若佛子常應發一切願孝順父母師僧願得好師同學善知識常教我大乘經律十發趣十長養十金剛十地使我開解如法修行堅持佛戒寧捨身命念念不去心若一切菩薩不發是願者犯輕垢罪合注常應發者所謂非是一發惟應數發令菩提心相續不斷也一切願者總指十願發隱好師謂智行雙備有智無行何以成吾德有行無智何以開吾迷故弟子雖具信心不逢良導美材拙匠遂成廢器誠可歎也故十願之中得師最要然無賢朋有聞乏辨難之資欲行鮮夾輔之益相觀無自德業安成臨濟激發於座元雪峯悟道於鰲山參師重矣取友急焉十發趣即十住發起大心趣入妙道有住義故十長養即十行滋培長養積纍日成有行義故十金剛即十回向順入法界堅固不動有回向義故從發趣至十地皆從師友而得也華嚴信解行證為入道始終今言開解修行而不及信證者以解必由信故行必終證故結願持戒者此經本旨惟戒是重戒匪堅持心地已失賢聖道果何由發生夫孝名為戒始乎孝順終乎持戒是戒乃貫諸願而成始成終者也若一切菩薩等者不發大願魔所攝持志既不堅行將墮落可不慎歟此是遮業應發不發隨時結過惟遮不開果報者不發則失決定勝益相續而發則能得佛滅罪如發趣心中說第三十六不發誓戒疏誓是必固之心願中之勇烈意始行心弱宜須防持若不發心作意易生違犯故制七衆同犯而用不必皆盡大小乘不共二乘不制心易防持發隱增一阿含三十八經云比邱不發誓者終不成佛道誓願之福不可稱計得至甘露滅盡之處故願後必須發誓也問聲聞執身今反云心易防持者何也答菩薩心大難持聲聞心小易治譬諸禦河海之滔天則金提千里止行潦之在地則捧土成崖其為難易審矣期其志而必到者願為之先導也堅其願而不退者誓為之後驅也故疏稱誓為願中勇烈意若佛子發是十大願已持佛禁戒作是誓言寧以此身投熾然猛火大坑刀山終不毀犯三世諸佛經律與一切女人作不淨行復作是願寧以熱鐵羅網千重周匝纏身終不以此破戒之身受於信心檀越一切衣服復作是願寧以此口吞熱鐵丸及大流猛火經百千劫終不以此破戒之口食於信心檀越百味飲食復作是願寧以此身臥大流猛火羅網熱鐵地上終不以此破戒之身受於信心檀越百種牀座復作是願寧以此身受三百矛刺身經一劫二劫終不以此破戒之身受於信心檀越百味醫藥復作是願寧以此身投熱鐵鑊經百千劫終不以此破戒之身受於信心檀越千種房舍屋宅園林田地復作是願寧以鐵鎚打碎此身從頭至足令如微塵終不以此破戒之身受於信心檀越恭敬禮拜復作是願寧以百千熱鐵刀矛挑其兩目終不以此破戒之心視他好色復作是願寧以百千鐵錐劖刺耳根終一劫二劫終不以此破戒之心聽好音聲復作是願寧以百千刃刀割去其鼻終不以此破戒之心貪嗅諸香復作是願寧以百千刃刀割斷其舌終不以此破戒之心食人百昧淨食復作是願寧以利斧斬破其身終不以此破戒之心貪著好觸復作是願願一切衆生悉得成佛而菩薩若不發是願者犯輕垢罪發隱首誓欲染者良以身生於欲欲成於女濬恩愛海牢生死根無過女色矣故首誓之寧以者輕量之辭良以紅爐白刃壞色身於一時花箭蜜鋒沈慧命於萬劫苦中較苦苦有重輕寧忍此而不為彼誓要決絶至極之語也其餘諸根染塵如猿得樹若非重誓自立良難問受食一節前後言之意似相濫答前以四事類說蓋主不堪應供而言後以六根類說蓋主不能制情而言故不相濫問六根止舉其五不及意根何也答五根皆含意字故文云破戒之心又意非形體不可等五為喻復作是願願一切衆生成佛者前四自度今一度人自利利他俱成正覺也若無此誓回向佛道前來諸誓止是人天福報或二乘小果而已合注經云劫初無男女二相因食蠲穢二相乃生展轉染愛遂為胎生之始減至壽五百歲時有非法淫起如男子相淫此淫一起罪惡斯劇頓減為二百歲律及阿含中佛因野火熾然為諸比邱說此諸誓其根熟者頓斷惑染其未熟者懼罪捨戒佛不止之誠不欲其壞法門也乃至二果聖人見惑已斷淫習現前還俗娶妻終不破戒蓋如法捨戒將來尚可出家倘根本一破則終非道品且何忍於聖賢幢相之中而作此鄙穢哉此誓出家菩薩之所全發在家菩薩惟於邪淫境發正淫非所斷也是故今時出家菩薩大須自審倘此習本輕或雖重而善自調制便可安處僧倫若煩惱習強不能自抑快哉捨戒慎莫破戒以捨戒還俗則現在雖失比邱沙彌之位尚為菩薩優婆塞將來亦尚可為沙彌比邱倘一破戒體則菩薩戒比邱戒沙彌戒優婆塞戒無不盡破乃至一日一夜八關戒齊皆悉不任更受縱令菩薩戒法得有見相重受之科而見相一事談何容易思之思之慎之慎之次五節為供養之誓信心檀越本為供修道人破戒受供苦報必劇此乃誓不破戒非誓不受供也有謂信施難消遂欲自營生業不思飲水踐土獨非國王之供養乎既無救於破戒之罪又更犯邪命之愆誠可悲也次一節為恭敬之誓此亦誓不破戒非誓不受拜也有謂戒德多虧遂乃低身答拜甚至禮天神敬白衣既無救於破戒之罪又為敗壞出家儀式亦愚惑也次五節為六根之誓約五根對五塵皆以破戒之心為主即意根為政也食人淨食者前以破戒受人供養而言此以邪心貪著滋味而言當知貪著滋味即名破戒心也此是遮業為防退心觸境不發隨事結過大小不全共同者同前四誓異者小乘不制第五度生誓也惟遮不開果報者不發則失決定不退之益隨發隨得堅固進趣之益第三十七冒難遊行戒疏始行菩薩業多不定且人身難得堪為道器不慎遊行致有夭逝在危生念所喪事重以不慎故制七衆同大小俱制發隱堪為道器者如裴丞相所謂六道之中可以整心慮趣菩提者惟人道為能耳是知染心所就雖號革囊聖道攸資實為重器應須貴之保之而乃不慎遊行甘心夭逝耶忍力未充臨危之際生大苦惱因墮惡處故曰所喪事重也今新學僧動云委命龍天實則毫無見處夭逝之禍疏有明文可不慎歟五戒堅持方得人身五戒不持人天路絶持戒難則人身不易明矣若佛子常應二時頭陀冬夏坐禪結夏安居常用楊枝澡豆三衣瓶鉢坐具錫杖香爐奩漉水囊手巾刀子火燧鑷子繩牀經律佛像菩薩形像而菩薩行頭陀時及遊方時行來百里千里此十八種物常隨其身頭陀者從正月十五日至三月十五日八月十五日至十月十五日是二時中此十八種物常隨其身如鳥二翼若布薩日新學菩薩半月半月常布薩誦十重四十八輕戒若誦戒時當於諸佛菩薩形像前誦一人布薩即一人誦若二人三人至百千人亦一人誦誦者高座聽者下座各各披九條七條五條袈裟若結夏安居時亦應一一如法若行頭陀時莫入難處若惡國界若惡國王土地高下草木深邃師子虎狼水火風難及以劫賊道路毒蛇一切難處悉不得入頭陀行道乃至夏坐安居是諸難處皆不得入若故入者犯輕垢罪合注常應二時頭陀者春秋調適遊行化物無妨損也頭陀或云杜多此翻抖擻有十二法皆是遠離勝行聖所稱歎一在阿蘭若處二常行乞食三次第乞食四受一食法五節量食六中後不飲果蜜等漿七糞掃衣八但三衣九冢間住十樹下止十一露地坐十二但坐不臥冬夏坐禪者大寒大熱常應靜坐結夏安居者夏行尤為妨道故須結制九旬也楊枝所以淨口澡豆所以潔身三衣者一僧伽梨名上衣二多羅僧名中衣三安陀會名下衣瓶有三種一淨瓶貯水供飲二隨用瓶貯水洗手三觸瓶貯水洗大小便處鉢者具云鉢多羅此翻應器謂體色量三皆應法體用瓦鐵二物不得用金銀銅木七寶等色以油麻熏成量則隨其腹量分上中下最大不過三升最小不過升半坐具者梵名尼師壇此云隨坐衣所以護身護衣護臥具也錫杖豎聖賢之標香爐修清淨之供漉囊為救物之具手巾為除垢所需刀子長不過三指闊不過一指所以便用火燧為防熱食兼為除冥鑷子為拔鼻毛繩牀隨處捿息皆百一所需中物也經契一心律規三業佛像標心極果菩薩形像托志真因既皆切於日用亦可即事表法故以如鳥二翼喻之彼不知法義惟汲汲以十八物為務者固非大士宏規倘竟高談名理而脫略事相恐亦非佛本意必事理俱備庶二翼無損耳布薩但舉新學者久學菩薩自不待言也披九條等者九條即僧伽黎七條即多羅僧五條即安陀會此但指比邱比邱尼言之若式叉摩那沙彌沙彌尼止許用縵條衣名為無縫袈裟在家二衆於誦戒及入壇時亦得用無縫衣餘時不得然善生經云若優婆塞不儲畜僧伽黎衣鉢錫杖得失意罪此特制令儲畜非制令日用又僧伽黎等即縵條之服加以三種法號所謂無縫三衣不同比邱之九條七條五條也一一如法者如法具十八物及如法誦戒等此是遮業正制冒難遊行兼制備十八物如法誦戒蓋冒難遊行恐致夭逝在危生念所喪事重大士雖宜為法忘身豈應不慎招損譬如儒者雖有殺生成仁之事亦云知命者不立巖牆下也三緣成罪一難處謂惡國界等二難處想六句二重二輕二無犯三正遊行處步步結輕垢罪或先非難處正遊行難事忽起此亦非犯又善生經云若優婆塞險難之處無伴獨行得失意罪准此則設有事緣多伴同往非犯又云優婆塞若犯國制得失意罪亦應此戒兼攝也大小不全共同者同不得冒難遊行異者大士制十八物聲聞惟制六物隨身謂三衣坐具鉢及漉囊餘非所制大士一人布薩即一人誦聲聞須有四人以上方差一人高坐而誦若三人二人即相向布薩若惟一人即心念布薩具如律中未受具者不宜先知故不委明開遮者或為求法或為度生冒難非犯果報者遇難多作退道因緣不遊堪使身心進道附有出家優婆塞夷有在家優婆塞夷出家者名近住在家者名近事與比邱比邱尼式叉摩那沙彌沙彌尼共稱九衆也發隱春秋遊行無妨損有二一則慎時不傷己身二則護生不傷他命也四受一食法疏云一坐食謂一坐食畢不二坐也阿蘭即阿練此云遠離處也結夏安居不言結冬者省文也袈裟此云間色服即壞色衣也此因色立名又云去穢又云離著又云消瘦服等此從義立名一切難處云者兼例其餘也第三十八乖尊卑次序戒疏乖亂失儀故制七衆同大小俱制若佛子應如法次第坐先受戒者在前坐後受戒者在後坐不問老少比邱比邱尼貴人國王王子乃至黃門奴婢皆應先受戒者在前坐後受戒者次第而坐莫如外道癡人若老若少無前無後坐無次第如兵奴之法我佛法中先者先坐後者後坐而菩薩一一不如法次第坐者犯輕垢罪合注如法有二種一通論七衆二別論戒次坐有二時一誦戒時二平時皆不得紊亂也不問老少亦二義一即通論七衆義二即別論戒次義一通論者謂百臘比邱尼不得於初夏比邱前坐設比邱尼受菩薩戒亦經百臘猶故不得於初夏小乘比邱前坐況是菩薩比邱以比邱是上衆故式叉摩那雖生年百歲或菩薩戒已經百臘總不得於大小乘比邱比邱尼前坐以未是僧數故沙彌雖生年百歲或菩薩戒已經百臘乃至不得於小乘式叉摩那前坐沙彌尼雖生年百歲或菩薩戒亦經百臘乃至不得於小乘沙彌前坐優婆塞雖生年百歲受菩薩戒亦經百臘乃至不得於小乘驅烏沙彌尼前而坐況復沙彌及比邱等故善生經云優婆塞若在比邱沙彌前行得失意罪當知彼約行結坐亦有罪此約坐結行亦有罪也二別論者如比邱比邱尼衆皆須兼論大小二種戒次在大則大在小則小萬萬不得以大奪小故文殊應闍王之請尚須固遜迦葉然後暫居其先則平時之不亂戒次明矣其餘五衆惟各自論菩薩戒次不論生年斯易可知言比邱比邱尼貴人等者謂先敘七衆尊卑定分後乃各就其類自敘戒次也比邱敘戒次竟然後尼敘戒次不言餘三衆者省文耳貴人即通指國王王子等對黃門奴婢賤人言之此等雖則同名在家二衆又須各以類分即如王子雖受菩薩大戒既未出家仍不得居君父之先故亦自為一類也乃至者超略之辭意顯長者宰官婆羅門居士等別為一類以此輩人就世法中或敘爵敘齒敘德原無定局故今惟當敘戒然西域復有國王師事婆羅門者又當別論今則通約未出家人固不得紊亂君臣名位也其或此國王子與彼國之王相為師友或王子未登王位亦與婆羅門長者居士等相為師友皆當別論耳黃門奴婢又必自為一類不得混在貴人類中蓋黃門於出家法屬重難攝斷不得入比邱沙彌之列奴婢屬輕遮攝若主人與姓得受比邱沙彌等戒入比邱沙彌位中便在國王前坐今雖受菩薩大戒仍未脫於奴婢故須別為一類不得紊亂主僕貴賤之名分也問君臣父子主僕既同受菩薩戒猶須各為一類何故律中臣先受具王後受具便為下座子先受具父後受具便為下座僕先受具主後受具便為下座耶答比邱戒法現出世相非世法之所攝故君若不聽則臣不得出家父母不聽則子不得出家主人不聽則奴不得出家既君父主人聽許出家一出家時便永捨臣子名位故君父主人後設受具即以彼為上座若君父王人在家亦即以彼為尊者福田故五天竺法出家人設見君父主人均稱檀越無答拜之儀若夫菩薩戒法通於世出世間不壞俗諦君仍是君臣原是臣父子主僕亦復如是若欲去其名位而統敘戒次則世法不成安立矣問若一出家永捨臣子奴婢名位豈非無父無君正被儒者所譏答但捨名位不捨恩義故律制比邱應盡心盡力孝養父母若不孝養則得重罪乃至佛母涅槃佛尚親手舉柩又比邱身處山林無事君之禮倘受王供養與王親善亦須隨事納忠此即不廢世間忠孝而況如法修行宏通至教令天龍歡喜護國護民令過現父母同離苦海此更成就出世忠孝然則大忠大孝孰過出家有此大義必不容更論小小虗名虗位矣總之論廣大則莫若菩薩戒法故在家亦可頂受而不許亂世間名位論尊重則莫如出家律儀蓋是聖賢幢相出世芳標僧輪所繫佛法所關開遮者如文殊迦葉應闍王請文殊始讓迦葉不敢違古佛之恆規迦葉終遜文殊所以順請主之本意又下座或沙彌等說法則登法座果報者不敬戒律遠離正法依戒相敬出生勝益如往昔雛猴及象因緣具在經律第三十九不修福慧戒疏福慧二嚴如鳥二翼不可不修垂出要之道故制七衆同大小乘不全共菩薩攝一切善應修聲聞夏分自誓應修福業餘時不制發隱出要之道者福慧雙修出離生死捷要之道也福輕則恆罹障緣慧淺則多行錯路故曰乖出要之道夏分自誓者坐夏則修修則有限非若菩薩無時不修也若佛子常應教化一切衆生建立僧坊山林園田立作佛塔冬夏安居坐禪處所一切行道處皆應立之而菩薩應為一切衆生講說大乘經律若疾病國難賊難父母兄弟和尚阿闍梨亡滅之日及三七日四五七日乃至七七日亦應講說大乘經律一切齊會求願行來治生大火所燒大水所漂黑風所漂船舫江湖大海羅叉之難亦讀誦講說此經律乃至一切罪報三惡八難七逆杻械枷鎖繫縛其身多淫多瞋多愚癡多疾病皆應講此經律而新學菩薩若不爾者犯輕垢罪疏修福自作教他文中略序七事一僧坊二山林三園四田五塔六冬夏坐禪安居處七一切行道處凡此流類悉應建立力若不及者不犯修智慧亦自作教人發隱自作教他者作此七事並教化衆生令作此七事也按要集第十經云佛言爾時道俗訛替競興齊講強抑求財營修塔寺依經不合反招前罪蓋言非理募化而自附營修以公濟私誣因昧果所謂天堂未就地獄先成如是修福不如避罪學者又不可不明辨也合注建立僧坊等制令修福講說大乘等制令修慧此是遮業隨力應修遇緣當為而不為一一結罪除力不及者無犯此即戒本經所謂住少利少作少方便也若慊恨心是染污犯懶惰懈怠非染污犯大小不全共聲聞夏安居時應修房舍餘時不制大士一切時中應修福業開遮者或常修禪誦等一切勝業無暇他營果報者不修則失二種莊嚴修則菩提資糧任運增長如是九戒應當學敬心奉持梵壇品當廣明合注此總結第四段九戒也第四十揀擇受戒戒疏有心樂受悉皆應與若瞋惡揀棄乖於勸獎故制出家二衆同犯餘無師範者未制大小不全共菩薩本兼物聲聞若許而中悔是犯不許不犯若佛子與人受戒時不得揀擇一切國王王子大臣百官比邱比邱尼信男信女淫男淫女十八梵天六欲天子無根二根黃門奴婢一切鬼神盡得受戒應教身所著袈裟皆使壞色與道相應皆染使青黃赤黑紫色一切染衣乃至臥具盡以壞色身所著衣一切染色若一切國土中國人所著衣服比邱皆應與其俗服有異若欲受戒時師應問言汝現身不作七逆罪不菩薩法師不得與七逆人現身受戒七逆者出佛身血殺父殺母殺和尚殺阿闍梨破羯磨轉法輪僧殺聖人若具七逆即現身不得戒餘一切人盡得受戒出家人法不向國王禮拜不向父母禮拜六親不敬鬼神不禮但解法師語有百里千里來求法者而菩薩法師以惡心瞋心而不即與授一切衆生戒犯輕垢罪合注不得揀擇者不應揀於品類謂國王乃至鬼神盡有佛性盡可隨類行菩薩道故盡得受戒也而亦有二事應揀一是形儀二是業障應教身所著袈裟等者教令揀形儀也梵語袈裟此云染衣亦云壞色亦云臥具乃出家衣服之都名律制三種壞色謂青黑木蘭今制五種比邱皆應與俗服有異者正明比邱及比邱尼體是僧寶故特為制三種田衣永異凡俗其式叉摩那等五衆惟須壞色不得濫同比邱也應問現身不作七逆罪等者教令揀業障也七逆業成定墮無間所以正障戒品前生非復可知亦復不為戒障故但問現身也和尚者比邱有二種一十戒和尚二具戒和尚比邱尼有三種一十戒和尚尼二式叉摩那受六法和尚尼三具戒和尚尼皆不得以比邱為之式叉摩那有二種一十戒和尚尼二六法和尚尼沙彌沙彌尼皆一種即授與十戒者也阿闍梨者比邱有五種一十戒闍梨二受具時教授闍梨三受具時羯磨闍梨四依止闍梨乃至與依止僅一夜五教讀闍梨乃至從受一四句偈或說其義比邱尼有七種加受具時比邱僧中羯磨闍梨及六法闍梨尼式叉摩那有三種一十戒闍梨二六法闍梨三教讀闍梨沙彌沙彌尼各二種一十戒二教讀優婆塞優婆夷各三種一受五戒闍梨二受八關戒齊闍梨三教讀闍梨又若并取受菩薩戒闍梨則七衆各加一種破羯磨僧者極少有八人同住皆是比邱四人四人各自為黨於一大界之中別說戒別作種種羯磨破轉法輪僧者下至九人一人自稱佛誘彼四比邱別從其教餘四比邱守正不從分作二部不論界內界外但令非法說法如提婆達多等名破法輪聖人者小乘四果大乘法趣以上也夫不拜父母國王不敬六親鬼神百里千里而來則其求法之心何切此而不授辜負當機不太甚乎惡心瞋心者明非見機益物之心一切衆生戒者明此大戒本是一切衆生所應同受不似比邱及沙彌戒須擇品類授也此是遮業四緣成罪一是受戒器謂非七逆又形儀如法二堪受想六句二重二輕二無犯三有揀擇心謂或惡其下賤瞋其貧乏等正是業主四令不得受隨所拒人結罪若知不堪受者非犯菩薩戒羯磨文云若諸菩薩欲受菩薩戒時先應為說菩薩法藏摩怛理迦菩薩學處及犯處相令其聽受以慧觀察自所意樂堪能思擇受菩薩戒非惟他勸非為勝他當知是名堅固菩薩堪受菩薩淨戒律儀又云無淨信者不應從受謂於如是所受淨戒初無信解不能趣入不善思惟有慳貪者慳貪蔽者有大欲者無喜足者不應從受毀淨戒者於諸學處無恭敬者於戒律儀有慢緩者不應從受有忿恨者多不忍者於他違犯不堪耐者不應從受有懶惰者有懈怠者多分耽著日夜睡眠樂倚樂臥樂好合徒侶樂嬉談者不應從受心散亂者下至不能𤚲牛乳頃善心一緣住修習者不應從受有暗昧者愚癡類者極劣心者誹謗菩薩素怛羅藏及摩怛迦者不應從受解曰此皆揀非法器也豈可漫云無揀擇耶又前人本不欲受強令受戒亦犯輕垢開遮者見機利益先不為授雖示大怒非惡心瞋心也如曇無讖之於沙門道進是也果報者妄揀則得吝法之罪失於二利善揀則莊嚴眷屬光顯法門發隱此心地中非尊非卑非道非俗非男非女非穢非淨非天非人非全非缺非良非賤非顯非幽一味平等無二無別何所去取而生揀擇皆染使青黃等真諦云青銅青也黑雜泥也舍利弗問經云摩訶僧祇部勤學衆經宣說其義處本居中應著黃色曇無德部通遠理味表法殊勝應著赤色薩婆多部博通敏達善能化道應著黑色迦舍部勇猛護生應著木蘭色彌沙塞部禪思入玄究暢幽密應著青色據此則成五彩云何名壞然彼文中有青非東方之青等句則知就壞色中自有五別以表五部非世間五麗色也如上青黃赤黑等不必確定分別但與俗服有別則已道俗受戒皆須服壞色可作壞色處僧俗俱宜同作不可壞色處俗即隨便惟僧則必以壞色不可壞色者或土地所不便是也法滅盡經云法欲滅時袈裟自然變白當知衣白法滅之相此中制白衣高座則知道俗以緇白別不可不慎也羯磨轉法輪者集衆布薩代佛揚化正所謂和合僧也破此人則佛法滅豈不犯逆非漫爾羣居情識相比可冒和合之名也又凡能宏法利生者皆名轉法輪也經中重逆二字有別有犯重不犯逆者有兼重與逆者聲聞害師已犯重特不云逆耳蓋逆是重上復加逆罪也問下弒上皆逆也云何聲聞害師非逆答佛法中重對世法逆佛法中逆加世法逆一等聲聞害師犯重已是世間逆罪而菩薩所謂逆者則更加重故疏云菩薩重重於聲聞重也君親天地等不禮敬者言出家之法已於國王父母六親鬼神不修世間禮儀恭敬則今日授戒不當復問其是貴是賤是親是疏是人是神惟觀意之誠否耳遠來求法誠意可知止除七逆餘但解法師語者即當與戒何得起惡心瞋心而不即與竟拒曰不與遲延曰不即與若此者苟非圖利養而販賣佛法必其乏慈悲而獨善己身是以得罪若察其意未誠而不即與欲成就彼如無讖之於道進則大權化導功德無量勿等視也問六親鬼神且置弗論云何君父而不禮敬答出家之人禮拜君父非恭敬故所以者何帝釋天主尚不欲五戒者禮拜慮或損福故出家者當精進行道報君父恩不當以擎跽匍匐小節為恭敬也斯乃忠臣孝子愛其君父而不禮拜是名大恭敬豈曰桀驁乎哉問沙彌未受比邱戒不得受菩薩戒則沙彌不及鬼畜等及在家二衆歟何彼得受此反不得答在家與出家體制自別而意亦略同在家者必受五戒方得受菩薩戒出家剃染者必受比邱戒方得受菩薩戒鬼畜男女等得受者是已有五戒者也夫三寶之名因比邱戒而成沙彌未得與三寶流也若沙彌俱直受大戒則比邱之戒廢而僧寶廢三寶缺矣其失可勝言哉問經云淫男淫女豈非白衣不受五戒之直受耶答亦必一會之頃先受五戒而隨受菩薩戒則不次第而未嘗不次第也第四十一為利作師戒疏內無實解外為名利輒爾強為有誤人之失故制出家二衆同大小不俱制三衆及在家無師範義不制若佛子教化人起信心時菩薩與他人作教誡法師者見欲受戒人應教請二師和尚阿闍梨二師應問言汝有七遮罪不若現身有七遮罪者師不應與受戒若無七遮者得與受戒若有犯十戒者應教懺悔在佛菩薩形像前日夜六時誦十重四十八輕戒苦到禮三世千佛得見好相若一七日二三七日乃至一年要見好相好相者佛來摩頂見光見華種種異相便得滅罪若無好相雖懺無益是人現身亦不得戒而得增益受戒若犯四十八輕戒者對首懺悔罪便得滅不同七遮而教誡師於是法中一一好解若不解大乘經律若輕若重是非之相不解第一義諦習種性長養性性種性不可壞性道種性正法性其中多少觀行出入十禪支一切行法一一不得此法中意而菩薩為利養故為名聞故惡求多求貪利弟子而詐現解一切經律為供養故是自欺詐亦欺詐他人故與人授戒者犯輕垢罪合注教誡法師即教授阿闍梨也比邱戒法於僧中受故和尚及羯磨闍梨皆須現在比邱為之菩薩戒法於十方諸佛菩薩前受故現在法師但得為教授闍梨應教請二師者謂請本尊佛為和尚此土即是釋迦請補處大士為阿闍梨此時即是彌勒是名為二師也文中以和尚阿闍梨二師為句應問言者即是教誡師應問此謂未請二師之前先應問其遮難知無七遮方教請二師耳故菩薩善戒經云十方諸佛菩薩大德聽今某甲三說時已從十方諸佛及菩薩僧得菩薩戒說者我是受者某甲是我為某甲證人大師者十方無量諸佛菩薩僧是小師者我身是也又受菩薩戒既以本佛為和尚補處為闍梨亦即以十方佛為同壇尊證十方菩薩為同學善友今不言請尊證同學者亦如比邱受戒但請二師也他經亦有備請五位聖師者隨機廣略故不同耳犯十戒者謂曾受此菩薩大戒而毀犯之或曾受比邱沙彌及五戒等而破於本根故須得見好相若本未受戒時作殺盜等業止有世間性罪不名犯戒亦不須問惟七逆須問耳現身亦不得戒者謂不許重受大戒而得增益受戒者謂作來生受戒勝因對首懺悔者謂對清淨大小乘衆自首其罪誓不更造即所謂作法懺也若輕若重是非之相者輕則易懺重則難懺是犯須懺非犯則不須懺倘輕罪說重重罪說輕犯謂非犯非犯謂犯不能使人決疑出罪也第一義諦者即是戒之體性亦即心地之正因常住之極果習種性長養性者謂妍習空觀漸次增長即十發趣心性種性不可壞性者謂分別假性俗諦建立故不可壞即十長養心道種性者謂中道能通即十金剛心正法性者謂證入聖位即十地及等妙二覺多少觀行出入者謂發趣則從假入空長養則從空入假金剛則回二邊入中道十地則從凡入聖又習種性則空觀尚少長養性則空觀乃多性種性則假觀尚少不可壞性則假觀乃多道種性則中觀尚少正法性則中觀乃多又三觀次第修習則少若一心中修習則多也十禪支者即四禪所用喜樂等十支也不解輕重是非則昧於戒相不解第一義諦則昧於戒理不解習種性等則昧於道共定共種種差別昧戒相則不能決疑出罪昧戒理則不能啓迪真信真解昧道定差別則不能令人修證趣入可謂一盲引衆盲矣此是遮業而深壞法化二緣成罪一是為利心二攝受徒竟戒本經云為貪奉事畜養眷屬是染污犯亦此兼制前之無解作師過在好名今則正在好利名利皆生死根本菩提大障其罪是均故皆結云自欺欺他而為利者其心益陋劣矣餘五衆無授戒事但令為利攝受徒衆亦犯惟遮不開果報者破壞法門劇於惡律儀罪第四十二為惡人說戒戒疏凡未受菩薩戒者皆曰惡人若預為說後受不能殷重故制七衆同大小俱制發隱渴而後飲則水之味甘暗而後燈則燈之用顯故云預說則心輕也若佛子不得為利養故於未受菩薩戒者前若外道惡人前說此千佛大戒邪見人前亦不得說除國王餘一切不得說是惡人輩不受佛戒名為畜生生生之處不見三寶如木石無心名為外道邪見人輩木頭無異而菩薩於是惡人前說七佛教戒者犯輕垢罪合注說戒者半月半月誦戒也除國王者佛法付囑國王故也虗生浪死故名畜生頑然罔覺故如木石背覺合塵故名外道此是遮業預向人說則後受不能殷重故半月說戒時必先遣未受大戒者出也四緣成罪一未受戒人謂未受此菩薩戒者二未受人想六句二重二輕二無犯三有為說心謂或為利養等四前人得聞從此時結罪七衆同犯大小乘不全共小乘一切時中不得向沙彌等說五篇罪名以彼若解五篇名義便成盜法重難故也大乘惟半月誦戒時須遣未受者出餘時不論如前文云一切時中皆應講此經律後文云見一切衆生應勸受三皈十戒等故知不同毗尼藏也又菩薩比邱比邱尼一切時中亦不得以五篇罪名向未受具戒者說而菩薩沙彌等亦不得預知五篇名義致成重難永障此生受具戒也惟遮不開果報者說則輕褻正法不說則屏翰正教發隱前戒揀擇今戒惡人若執不揀甚非所宜應須生重法心慎勿示之以易令彼愚頑倍增藐忽初津如來法水但潤有根之苗故法雖平等說要當機施者不尊受者不敬或反增疑議致成謗法故不應也第四十三無慚受施戒疏出家五衆同大小俱制以枉當福田故文云信心出家毀正戒者在家未當田任未制發隱在家未當福田之任無受施事也合注標此戒為故起犯戒心戒若佛子信心出家受佛正戒故起心毀犯聖戒者不得受一切檀越供養亦不得國王地上行不得飲國王水五千大鬼常遮其前鬼言大賊若入房舍城邑宅中鬼復常掃其腳迹一切世人皆罵言佛法中賊一切衆生眼不欲見犯戒之人畜生無異木頭無異若故毀正戒者犯輕垢罪合注謂出家菩薩本以信心受戒故堪受一切供養堪受人天鬼神恭敬若受而故毀便不得受一切供養便為鬼及世人所賤可見戒之不可毀犯如此奈何起心故欲毀之雖尚未毀先已從心結罪矣此是性遮二業輕視戒律故三緣成罪一是犯二犯想三起心欲犯念念輕垢又戒本經云起五蓋心不開覺者是染污犯亦此兼攝大小俱制小乘即所謂輕戒罪也隨所犯罪更加一輕戒罪大乘亦應例此又大士執心嚴於聲聞也若本無故毀心者但隨事結本罪不加此罪若直起此心未犯事者小但責心大亦應懺惟遮不開果報者任其故起則障增上戒障增上心障增上慧得輕戒罪若能開覺則戒根堅固定慧可尅發隱地水者舉況也地水且然況他物乎阿毗達磨俱舍釋論云犯根本罪者於大衆食及住處佛不許此人噉一段食踐一腳根地觀此則知破戒比邱天地雖寬無處可著檀那雖衆滴水難消可不懼哉持戒之人善神衛體破戒之輩惡鬼隨身何也善惡氣分自然相感如世貴人輿馬僕從之所衛護如世囚犯杻械兵卒之所防禁也此諸惡鬼存日障其前途故威德日消所作不利死時引入地獄故身心痛苦神識昏迷又掃其腳迹者經言賢聖誦經行道之處其地皆為金剛今此惡人遊行之處其地皆悉穢染鬼安得不掃其腳迹耶佛法中賊者破戒惡人所謂偷佛衣盜佛飯在佛法中反害佛法非大賊而何寶積經云自知犯戒受信施是名第四微細煩惱出家之人具此煩惱如負重擔入於地獄第四十四不供養經典戒疏三寶皆應供養若不修者乖於敬謹之心故制七衆同大小不全共菩薩應修五事聲聞五篇輕重法應誦持餘事不制發隱菩薩五事具後聲聞五篇第一四重第二僧殘第三合尼薩波逸第四提舍尼第五突吉羅若佛子常應一心受持讀誦大乘經律剝皮為紙刺血為墨以髓為水析骨為筆書寫佛戒木皮榖紙絹素竹帛亦悉書持常以七寶無價香華一切雜寶為香囊盛經律卷若不如法供養者犯輕垢罪合注供養有五事一受持二讀三誦四書寫五香華雜寶供養剝皮為紙等舉重況輕此是遮業無敬法心故得罪也又不供養三寶亦犯罪戒本經云於一日一夜中若佛在世若佛塔廟若法若經卷若菩薩修多羅藏摩得勒伽藏若比邱僧若十方世界大菩薩衆若不少多供養乃至一禮乃至不以一偈讚歎三寶功德乃至不能一念淨心若不恭敬懶惰懈怠是染污犯若忘誤非染污犯不犯者入淨心地菩薩如得不壞淨比邱常法供養一切三寶善生經云若得新穀果蓏菜茹不先奉獻三寶先自受者是優婆塞得失意罪若以殘食施於比邱比邱尼優婆塞優婆夷是優婆塞得失意罪惟遮不開果報者慢法則遠離正法失智慧種敬法則生生處處常遇妙法發隱榖字從𣪊從木乃楮樹皮可造紙從𣪊從禾者非第四十五不化衆生戒疏乖大士之行故制七衆同犯大小不共大士化衆生是正行小乘自度不化非犯若佛子常起大悲心若入一切城邑舍宅見一切衆生應當唱言汝等衆生應盡受三歸十戒若見牛馬猪羊一切畜生應心念口言汝是畜生發菩提心而菩薩入一切處山林川野皆使一切衆生發菩提心是菩薩若不發教化衆生心者犯輕垢罪合注大悲心者知一切衆生及三世諸佛與我身心無二無別欲拔其性德之苦而與以性德之樂也心念口言者了達同體法性之力冀令感通開悟也此是遮業乖於宏誓故制四緣成罪一衆生二衆生想三教化心四不行教化遇可化而不化隨事結過然大士化度衆生不出四攝一者布施即財法無畏三種如慳瞋殺盜等戒所制二者愛語即此戒制三者利益四者同事戒本經中別制此經亦屬此戒所攝戒本經云以慊恨心不隨他者是染污犯懶惰懈怠非染污犯不犯者若彼欲為不如法事若病若無力若護僧制若彼雖如法能令多人起非法事若伏外道故若以方便令彼調伏解曰此即利益攝也又云見衆生所作不與同事所謂思量諸事若行路若如法興利若田業若牧牛若和諍若吉會若福業不與同者瞋恨心是染污犯懶惰懈怠非染污犯不犯者若病若無力若彼自能辦若彼自有多伴若彼所作事非法非義若以方便令彼調伏若先許他若彼有怨若自修善業不欲暫廢若性暗鈍若護多人意若護僧制解曰此即同事攝也果報者不化則失二利化則二利增長發隱衆生該乎六道先就人言次就畜言其餘非凡眼所見故不言及然山林川野寂寞之處意亦兼鬼神等按菩薩善戒經云菩薩至白衣家不能說法開示令供養三寶者得罪不曰五戒而曰十戒者五戒人天之因十戒菩薩之道也汝是畜生者先示其果報之名發菩提心者後教以出離之要菩提心者廣大清淨本然之覺體即自性三歸心地十戒是也迷此心故隱而不發輪轉三途無有窮已發起此心靈覺洞然暗蔽愚癡倐爾消滅焉有所謂畜生者哉問說法對人人猶未信發心向畜畜則何知答性在含靈不可思議安知畜類終無覺心蛤之生天鵬之敬律虎之弭耳避地蟒之垂淚革心海魚之再世而興崇法門飛鳥之次生而還為弟子如斯比類枚舉曷勝縱彼業重無知行者自當獲福故應教化無間人畜也第四十六說法不如法戒疏強為解說彼此有慢法之失故制出家五衆同大小俱制在家不全為法主止說一句一偈不如法亦犯若佛子常應教化起大悲心若入檀越貴人家一切衆中不得立為白衣說法應在白衣衆前高座上坐法師比邱不得地立為四衆說法若說法時法師高座香花供養四衆聽者下坐如孝順父母敬順師教如事火婆羅門其說法者若不如法說犯輕垢罪疏為白衣說不得倚立法應同坐若相與立亦非過為四衆說亦不得立莫言僧尼有道而倚立為說亦是輕法為犯也合注高座者以高卑言上座者以上下言不如法說謂不順說法儀式非謂顛倒謬說也此是遮業三緣成罪一不如法二不如法想三正說法若為名利是染污犯若忘誤非染污犯又此且據坐言若准律中則人臥己坐不得為說人坐己立人在座己在非座人在高坐己在下坐人在前行己在後行人在高經行處己在下經行處人在道己在非道皆不得為說又衣纏頸者覆頭者裹頭者叉腰者著革屣者著木屐者騎乘者持杖者持劒者持矛盾者持刀者持蓋者皆不得為說惟除為病人說法一切不犯七衆同犯以沙彌等亦許登高座故以白衣說一句一偈義亦應如法故又善生經云僧若不聽說法讚歎輒自作者是優婆塞得失意罪亦此兼制開遮者僧祇律云若比邱為塔事僧事詣王及地主時彼言比邱為我說法不得語令起恐生疑故若邊有立人者即作意為立人說王雖聽比邱無罪又比邱患眼前人捉杖牽前為說無罪又比邱在怖畏險道時防衛人言尊者為我說法雖持刀杖為說無罪果報者不如法則令彼此皆招慢法之罪如法則令彼此皆有敬法之益第四十七非法制限戒疏既見善事法應隨喜而今制網障閡乖助善之義故制在家二衆同犯出家五衆無其自在之制脫立閡善制限亦同此制大小同犯發隱脫倘也出家雖無自在權勢倘即衆中立為制限不容修福作善亦與在家同罪如僧雲欲廢女薩即其事也若佛子皆已信心受佛戒者若國王太子百官四部弟子自恃高貴破滅佛法戒律明作制法制我四部弟子不聽出家行道亦復不聽造立形像佛塔經律立統官制衆使安籍記僧菩薩比邱地立白衣高座廣行非法如兵奴事主而菩薩正應受一切人供養而反為官走使非法非律若國王百官好心受佛戒者莫作是破三寶之罪若故作破法者犯輕垢罪疏不聽出家斷僧寶也不聽四部出家者謂居士居士婦童男童女不聽造立形像斷佛寶也不聽書寫經律斷法寶也發隱安籍記僧者安設簿書記僧名字使多寡有數不得增益夫僧遊世外宜放令自如而乃定之版圖擬諸編氓可乎惜乎末世少見為王官者入僧寺故造僧籍多見為僧尼者置民産自入民籍耳悲哉至於地立走使亦僧之過非王官過也翹首而高參鳥窠泥塗迥絶三詔而不回信祖趣步無踪地立走使非僧自取而何哉問會昌沙汰宣和改更破法之愆誠不免矣然或僧尼背佛違法暴橫無禁則將任之乎答貞觀九年詔天下諸州有寺之處各度僧尼務取德行精明者其有溺於流俗或假託鬼神妄傳妖怪或謬稱醫巫左道求利或灼鑽膚體駭俗驚愚或造詣官曹囑致贓賄凡此等類大虧聖教朕情在護持必無寬貸宜令所司依附內律參以金科明為條制此則雖有所制不犯今戒所以者何僧尼暴橫滅法之由司世道者從而抑之佛法乃得久存而無弊是正以安僧非以病僧也況詔以內律金科參用則非純任王法也如文皇者真可謂得大士之善權而非凡量可測矣嗟乎使為僧者人人奉佛明誨精心力行王官豈不加敬聖天子賢宰相文武百執事必不負靈山之囑也唯在吾徒勉之合注此具性遮二業障善法故四緣成罪一是三寶事二三寶事想三有制限心四制限得成隨事結罪開遮者如彌勒昔為國王假設非法制限以興正法果報者制限則得斷滅三寶大罪不制能招宏護三寶功德第四十八破法戒疏內衆有過依內法治問乃向白衣外人說罪令彼王法治罰鄙辱清化故名破法乖護法之心故制出家五衆同犯大小乘俱制發隱依內法治問者僧內俗外僧有過依僧法罰治責問不宜用外刑辱內衆也唐書顯慶元年五月敕天下僧尼有犯法者以僧律治之不得與民同科王官護法如此而僧反破法可乎若佛子以好心出家而為名聞利養於國王百官前說佛戒者橫與比邱比邱尼菩薩戒弟子作繫縛事如獄囚法如兵奴之法如師子身中蟲自食師子肉非餘外蟲如是佛子自破佛法非外道天魔能破若受佛戒者應護佛戒如念一子如事父母不可毀破而菩薩聞外道惡人以惡言謗破佛戒之聲如三百矛刺心千刀萬杖打拍其身等無有異寧自入地獄經於百劫而不一聞惡人以惡言謗破佛戒之聲而況自破佛戒教人破法因緣亦無孝順之心若故作者犯輕垢罪發隱一本作不以好心出家據文勢無不字為順言出家受佛大戒初本好心而後為名利失其本志良由此中犯者俱是先曾受戒後乃犯故於國王百官前說佛戒者蓋是王官素所崇敬凡有言說彼皆聽用威福自在故得作繫縛事言師子者師子出而百獸伏則百獸不能食師子食師子者內身之蟲耳佛法立而羣魔消則羣魔不能破佛法破佛法者內教之人耳興言至此可不悲哉如念一子一者等也如父母以等一視子無二心也問待子待父母云何等喻答此特舉極親極愛為言不必以上下尊卑泥之又上句即慈悲心下句即孝順心也云何專以教人破法結罪以此戒是令彼王臣治辱僧故不知護法而反破法忤逆三寶孝順安在故得罪也問有惡僧焉顯諫之則不從默擯之則不喻千世綱常冒國憲典不可以內法治者則如之何答此在權其事宜不可執一執於護法反至滅法者有矣與其全一人而殃連三寶孰若全三寶而殃止一人況文中橫與比邱比邱尼等橫之一字明無辜也若真罪人應所不制合注國王百官指已受佛戒者雖是同法之人得於彼前說菩薩戒而不得於彼前橫作非法治罪也弟子有過但應如法治罰不應作繫縛事如獄囚兵奴以傷出家軌式如念一子喻愛之極如事父母喻敬之極此具性遮二業以毀辱法門故五緣成罪一是佛弟子謂大小乘七衆不犯邊罪不捨戒者二佛弟子想六句二重四輕雖非佛弟子亦不應作繫縛事故但其事稍稀故不特制或復攝入瞋損戒中三有治罰心欲令前人受辱正是業主四所對人謂國王百官等同有戒者故僅結輕若向未受戒人治罰自屬第六重戒五正行治罰隨事結過出家五衆同犯在家二衆若治罰佛之弟子自屬前戒兼制厥罪彌甚具如地藏十輪經中廣訶開遮者惡濁世中護持正法比邱得藉王大臣力兵杖自衛如大涅槃所明然不得非法治罰他人果報者作則有破壞法門損辱僧侶之罪不作則令衆僧增益安樂初津於國王百官前說佛戒等者謂內無實行外現威儀誑說佛戒張其行德惑彼聽信而令作世間治罰使內衆弟子無辜受罪故曰橫也作繫縛事者或扭鎖手足禁閉身形故云如獄囚法也或無禮輕賤訶責毀辱故云如兵奴之法也大集經時大梵天王白佛言若為佛出家剃鬚髮著袈裟不受戒受已毀犯其國王與作惱亂罵辱打縛者得幾許罪佛言大梵我今為汝且略說之若有人於萬億佛所出其身血於意云何是人得罪寧為多不梵王白言若人但出一佛身血得無間罪尚多無量不可算數墮於阿鼻大地獄中何況具出萬億諸佛身血終無有人廣說彼人罪業果報惟除如來佛言大梵若有惱亂罵辱打縛剃鬚髮著袈裟片不受戒受而犯者得罪多於彼何以故是人猶能為諸人天示涅槃道是人已於三寶中心得敬信勝於一切九十五種外道其人必速能入涅槃勝於一切在家俗人唯除在家得忍者是故人天應當供養何況具能持戒三業相應者其有王臣見有於佛法中出家者作大罪業但擯出國不得鞭打何況鞭打出家具持戒者十輪經云佛言若有破戒比邱如敗膿血退失墮落聖道果證為諸煩惱結使所壞猶能開示一切天龍人非人等無量功德珍寶伏藏是以出家若持戒若破戒我悉不聽國王大臣宰官謫罰繫閉鞭杖乃至斷命況復餘輕犯小威儀破戒比邱雖是死人有戒餘力猶如牛黃是牛雖死人故取之亦如麝香死後有用能大利益一切衆生惡行比邱雖犯禁戒其戒勢力猶能利益無量人天譬如燒香香體雖壞熏他令香破戒比邱亦復如是自墮惡道能令衆生增長善根以是因緣一切白衣不應侵毀輕蔑破戒比邱皆當尊重守護按經云毀犯禁戒猶能為諸人天示涅槃道者謂其雖為煩惱所逼毀犯於一時然戒破而正見不破恆說正法時懷慚愧故云其已於三寶中心得敬信故瓔珞經云捨戒不捨大願破戒不破正見斯人終得還復清淨如是九戒應當學敬心奉持合注此總結第五段九戒也別釋四十八輕竟諸佛子是四十八輕戒汝等受持疏秉持在心過去諸菩薩已誦未來諸菩薩當誦現在諸菩薩今誦疏舉三世菩薩誦為勸發隱上明四十八輕垢竟合注此總結四十八輕戒也列重輕戒相大科竟諸佛子聽十重四十八輕戒三世諸佛已誦當誦今誦我今亦如是誦合注勸大衆奉行共五此舉所誦法汝等一切大衆若國王王子百官比邱比邱尼信男信女受持菩薩戒者應受持讀誦解說書寫佛性常住戒卷流通三世一切衆生化化不絶合注此囑流通人前勸受中備列淫男淫女黃門鬼畜等今但言信男信女者正顯既受得戒皆名第一清淨也佛性常住戒卷者此戒卷在世則佛性因緣之義不滅得見千佛為千佛授手世世不墮惡道八難常生人道天中合注此明流通益略舉三益一見聖二離苦三得樂義疏云授手者明秉戒人與佛相鄰次不遠也發隱鄰近比次不隔遠故授手猶言聯手非必實舉手授我也世世不墮常生人天所離所得豈止於此且舉凡情所欣厭以之為勸耳極而言之究竟所離則離三塗離六道離二乘離權位菩薩究竟所得則得人得天得羅漢得菩薩得如來如是乃至離無所離得無所得本來心地了無苦樂之相又何所容其離與得哉我今在此樹下略開七佛法戒汝等大衆當一心學波羅提木叉歡喜奉行如無相天王品勸學中一一廣明合注此重勸奉行發隱略開具二義一者能說之人不止七佛所謂三世諸佛所同說也二者所說之戒非止十重四十八輕所謂如毛頭許者是也三千學士時坐聽者聞佛自誦心心頂戴歡喜受持合注此時衆歡喜爾時釋迦牟尼佛說上蓮華臺藏世界盧舍那佛所說心地法門品中十無盡戒法品竟千百億釋迦亦如是說合注是中先結此釋迦說竟次結餘釋迦說竟也發隱舉十重不舉四十八輕此十戒義含無盡舉十則一切戒悉皆攝盡況四十八耶千百億釋迦亦如是說者如王渙汗大號從於一郡歷於百郡一郡喻此釋迦百郡喻餘釋迦也從摩醘首羅天王宮至此道樹下十住處說法品為一切菩薩不可說大衆受持讀誦解說其義亦如是千百億世界蓮華藏世界微塵世界合注是中亦先結此釋迦十處說法竟次結餘釋迦十處說法竟也微塵世界下闕亦如是說四字一切佛心藏地藏戒藏無量行願藏因果佛性常住藏如是一切佛說無量一切法藏竟合注前五句為別後一句為總就五別中又各具通別二義心藏者通則一切諸法皆屬於心別則指三十心地藏者通則一切諸法皆名為地別則指於十地戒藏者通則一切諸法皆名為戒別則指十重衆輕無量行願藏者通亦收一切法別指六度萬行十大願王等因果佛性常住藏者佛性非因非果而因果不離佛性故曰大乘因者諸法實相大乘果者亦諸法實相實相即佛性異名今因亦佛性果亦佛性佛性常住則因果亦皆常住通則一切諸法皆名因果佛性常住之藏別則如佛性本源品等發隱心藏者本覺心體含裹虗空包羅法界一切萬法悉備其中如寶藏然故云藏也地藏者心體本等不二名地而出生一切諸善功德故云藏也千百億世界中一切衆生受持歡喜奉行若廣開心地相相如佛華光王七行品中說疏佛華光王品應是大本中也本不同三千者是菩薩應學三千威儀三年者聲聞五年菩薩三年三事者戒定慧耳發隱略說百億如上若廣說餘處則如光王品中而今無此品故云應是大本也相相者戒是心地之相戒相總別重重無盡故云相相今品所明舉概而已追疏前文言本不同者三千學士有作三千者三年者三事者隨文解之各有一義義俱通也千年事如鳥焉馬傳寫易訛故五年三年學戒期也合注相相者心地無相具一切相重重無盡總別難思明人忍慧強能持如是法未成佛道間安獲五種利一者十方佛憫念常守護二者命終時正見心歡喜三者生生處為諸菩薩友四者功德聚戒度悉成就五者今後世性戒福慧滿此是諸佛子發隱明人者言此大戒非愚人所能持也以具忍慧故曰明忍者心之操守其忍至堅曰忍強慧者心之靈通其慧至利曰慧強忍強則能永持而終始不移慧強則能善持而圓融不滯如是之人英敏特達超出凡夫二乘非明人而何未成獲利者能持此法決定成佛然不待成佛於其中間先獲五利極贊持戒之益以勸導令持也安獲者五種勝利任運自得非強求也一諸佛護持利此戒是一切諸佛之心地衆生持戒則佛法興衆生毀戒則佛法滅持戒之人佛豈不以慈悲憫念威神加護令彼所作畢竟成辦二臨終歡喜利毀戒之人死墮惡道心生怖懼持戒之人正見炳然自知己死必生佛前豈不歡喜三伴侶菩薩利此戒一切菩薩所持持戒者即菩薩儔類也生生世世在在處處豈不與諸大菩薩偕行共住於菩提中同為眷屬四衆善成就利戒為諸善功德之本持戒則一切功德集聚不遺如功德有無量波羅蜜門試舉其一持戒度毀犯如是戒度今已成就餘度成就可例知矣五福慧雙修利心地之戒即佛性也佛性本體離過絶非故名性戒此性戒福慧皆具繇性善故萬行齊修繇性靈故萬法俱朗曰福慧滿也問福慧兩足此佛果也今未成佛焉得云滿答文中曰今後世則今生植其勝因後世成其極果也如是持戒獲五利者真是佛子當紹佛位即前受佛戒入佛位之意也合注明人者能知如來祕密之藏雖是肉眼名為佛眼也忍是安忍即指定力謂有慧無忍是名狂慧有忍無慧是名愚定又二乘定多慧少不見佛性權位菩薩慧多定少雖見佛性而不了了故須忍慧俱強方為明人方能持如是法也命終正見歡喜者已具佛眼則假使鐵輪頂上旋定慧圓明終不失也功德戒度悉成就者戒為一切功德之聚如地悉能生養萬物也性戒福慧滿者達此性戒則全性起修全修在性全性起修故福由慧滿全修顯性故慧由福滿又性戒即正因理體當法身德持性之戒即緣因福善當解脫德悟戒之性即了因智慧當般若德今後世滿者從觀行滿乃至究竟滿也智者善思量計我著相者不能生是法滅壽取證者亦非下種處欲長菩提苗光明照世間應當靜觀察諸法真實相不生亦不滅不常復不斷不一亦不異不來亦不去如是一心中方便勤莊嚴菩薩所應作應當次第學於學於無學勿生分別想是名第一道亦名摩訶衍一切戲論惡悉從是處滅諸佛薩婆若悉由是處出發隱是法即此戒法也以此戒是衆生本源心地而此心地不屬有無計我身而著於幻相執有者也滅壽命而取證寂滅執無者也斯皆焦芽敗種妙善戒法何由而生故令智者善思之也智者即前明人迎之莫知其所自至不來也追之莫知其所向往不去也無分別處中道宛然是名第一道才有分別即二義故亦是摩訶衍才有分別即二乘故又此實相心地如大火聚世間所謂執有執無計彼計我萬類千家諸戲論薪至於此中消滅無餘又此實相心地如大滄海如來所有智慧辨才神通三昧一切種智功德法財皆於此中出生無盡至是則由菩提苗結菩提果智光慧焰普照何窮三世古今十方世界一切衆生莫不如盲得視如暗得燈故曰光明照世間也非大明人何能善思心地之中如是妙義合注心地法門十無盡戒皆如理而證稱性而修所謂中道了義無戲論法凡夫著有二乘著空皆背真因故非種子應當靜觀察者靜是止之異名察即觀之審細止觀不二方是真修諸法真實相者諸法即十界十如權實之法觀相元妄無可指陳則幻惑非真虗假不實觀性元真本如來藏則無相不相名真實相清淨本然故不生循業發現故不滅又循業發現故生即不生清淨本然故滅亦不滅不變隨緣故不常隨緣不變故不斷理隨於事故不一事隨於理故不異如是諸法即是一心如是一心即三十心十地及重輕諸戒之體性也悟此體性然後方便勤莊嚴之一心是正因理性靜觀是了因慧性方便是緣因善性也持戒即方便莊嚴又勤方便而不靜觀察則有為有漏無所莊嚴靜觀察而不勤方便則枯槁空寂無能莊嚴故須於一心中方便莊嚴此是菩薩所應作事應當次第學之勿謂此是學事墮在第二門頭不知稱性之修學即無學於無學道中而熾然習學雖云次第直如空中鳥跡不同漸次法門還與極圓極頓之理毫無分別故誡令勿生分別想也無作妙修全同理性名第一道無學妙性起於真修名摩訶衍摩訶衍此翻大乘謂運載自他同入大涅槃城也以是第一道故能滅凡外二乘種種戲論以是摩訶衍故能出諸佛薩婆若果薩婆若此翻一切智智乃一心三智究竟極果之總名也繇第一道堪運摩訶衍乘繇摩訶衍堪到薩婆若地梵網心地果徹因該理趣至此極矣是故諸佛子宜發大勇猛於諸佛淨戒護持如明珠過去諸菩薩已於是中學未來者當學現在者今學此是佛行處聖主所稱歎發隱承上繇此實相心地而出淨戒故不可不持而戒品難持易失故持之不可不勇猛也明珠三義一者潔淨義護持弗使污染二者圓滿義護持弗使殘缺三者光明義護持弗使昏暗淨滿光明即盧舍那惡盡善周而生無不度也此非但三世菩薩之所共學亦復恆沙諸佛之所同行聖主稱歎豈偶然而已哉聖主即佛也聖中之聖云聖主也合注欲歸一心實相須修心地法門欲修心地法門須持諸佛淨戒故結勸護持戒相以為入道進修之本也我已隨順說福德無量聚回以施衆生共向一切智願聞是法者悉得成佛道發隱隨者不背順者不逆從上諸佛菩薩皆崇此心地大戒我亦隨順而說此戒所集福德廣大無量矣然此福德不為自求盡以回施一切衆生然此回施不向二乘盡以回向一切智智又願但聞此法者無一不成佛一歷耳根永為道種依法修行終成正覺也至是則若重若輕無量無邊之戒品同會心源若道若俗無窮無盡之衆生咸歸一性然後知我今盧舍那不是外來佛心地法門極於是矣問講者曰佛旨元奧在修多羅楞嚴謂持犯但束身非身何所束則戒為淺也然歟否歟答楞嚴論四根本戒而懇懇乎蒸砂漏巵律云五夏以前專精戒律五夏以後方乃聽教參禪則戒宜先而教宜後也毀戒而談教是猶身膺五本口誦六經脫罪辜而未能何文藝之足道問禪者曰古德云戒急乘緩不如戒緩乘急然歟否歟答爾知取乘急而戒緩者何不取乘戒俱急者曹溪謂心地無非自性戒則乘即戒也溈山謂毗尼法席曾未叨陪了義上乘豈能通曉則戒在先而乘在後也棄戒而言乘是猶生從負販出駕鑾輿不旋踵而刑誅尚何論乎榮寵且夫戒者佛及衆生本源之心地也教所以明此世尊一期說法說心地也乘所以證此達磨西來付法付心地也既云心地則奧淺緩急俱不可得戒相教相禪相亦不可得併所謂心地者亦不可得也尚何諍哉合注本繇發菩提心方受此戒今誦此戒仍回向菩提也附合注跋語夫本源心地含生共有無染性戒日用不知目翳而花舞太空夢蟻而尋羶階下晴虗之體依然輪王之身如故哀哉妄惑枉受幻輪勞我慈尊現身同患示成不倦於八千垂化無偏於塵剎一滴之心地既敷積劫之沈迷立醒而琅函久錮半珠僅呈繄我愚蒙得探全寶竭思殫機塵培泰嶽思法緣之匪易輒涕泗以滂沱願我同人深思力學解行同遵自他俱利庶得上報佛恩不負己生矣時崇禎丁丑地藏大士誕日菩薩沙彌智旭閣筆故記
